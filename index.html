    // Firestore helpers — compat API
    // doc(db, 'col', 'docId') or doc(db, 'col', 'docId', 'subCol', 'subDocId')
    doc: (db, ...segments) => {
      // segments: col, doc, col, doc, ...  (always even length → doc ref)
      let ref = db;
      for (let i = 0; i < segments.length; i++) {
        if (i % 2 === 0) ref = ref.collection(segments[i]);
        else ref = ref.doc(segments[i]);
      }
      return ref; // doc reference
    },
    // collection(db, 'col') or collection(db, 'col', 'docId', 'subCol')
    collection: (db, ...segments) => {
      // segments: col, doc, col, doc, col ...  (always odd length → collection ref)
      let ref = db;
      for (let i = 0; i < segments.length; i++) {
        if (i % 2 === 0) ref = ref.collection(segments[i]);
        else ref = ref.doc(segments[i]);
      }
      return ref; // collection reference
    },
    getDoc: (ref) => ref.get(),
    setDoc: (ref, data, opts) => opts?.merge ? ref.set(data, {merge:true}) : ref.set(data),
    updateDoc: (ref, data) => ref.update(data),
    onSnapshot: (ref, cb) => ref.onSnapshot(cb),
    addDoc: (ref, data) => ref.add(data),
    deleteDoc: (ref) => ref.delete(),
    serverTimestamp: () => firebase.firestore.FieldValue.serverTimestamp(),
  };
  window._firebaseReady = true;
  window.dispatchEvent(new Event('firebaseReady'));

function useLocalStorage(key, init) {
  const [val, setVal] = React.useState(() => {
    try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch { return init; }
  });
  React.useEffect(() => { try { localStorage.setItem(key,JSON.stringify(val)); } catch{} }, [key,val]);
  return [val, setVal];
}
function calcDaysLeft(d) {
  const t=new Date(); t.setHours(0,0,0,0);
  const e=new Date(d); e.setHours(0,0,0,0);
  return Math.ceil((e-t)/(864e5));
}
function getFoodStatus(dl) {
  if(dl<0)  return {label:'기간 초과',color:'#ef4444',bg:'#fef2f2',border:'#fecaca'};
  if(dl===0)return {label:'오늘 마감',color:'#ef4444',bg:'#fef2f2',border:'#fecaca'};
  if(dl<=3) return {label:`D-${dl}`,color:'#f97316',bg:'#fff7ed',border:'#fed7aa'};
  if(dl<=7) return {label:`D-${dl}`,color:'#eab308',bg:'#fefce8',border:'#fef08a'};
  return      {label:`D-${dl}`,color:'#22c55e',bg:'#f0fdf4',border:'#bbf7d0'};
}
function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayLabel() {
  const d=new Date(), days=['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}
function daysSince(s) {
  if(!s) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(s); d.setHours(0,0,0,0);
  return Math.floor((t-d)/(864e5));
}
function addDays(s,n) {
  const d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getAchievLevel(done, total) {
  if(total === 0) return null;
  if(done === total) return {level:'perfect', emoji:'🔥', label:'완벽', cardBg:'linear-gradient(135deg,#fff7ed,#ffedd5)', gaugeBg:'#fed7aa', gaugeStroke:'#f97316', badgeBg:'#fff7ed', badgeColor:'#ea580c', badgeBorder:'#fed7aa'};
  if(done / total >= 0.5) return {level:'effort', emoji:'💪', label:'노력', cardBg:'linear-gradient(135deg,#eff6ff,#dbeafe)', gaugeBg:'#bfdbfe', gaugeStroke:'#3b82f6', badgeBg:'#eff6ff', badgeColor:'#2563eb', badgeBorder:'#bfdbfe'};
  if(done >= 1) return {level:'start', emoji:'🌱', label:'시작', cardBg:'linear-gradient(135deg,#f0fdf4,#dcfce7)', gaugeBg:'#bbf7d0', gaugeStroke:'#22c55e', badgeBg:'#f0fdf4', badgeColor:'#16a34a', badgeBorder:'#bbf7d0'};
  return null;
}

const REPEAT_TYPES=[
  {value:'daily',label:'매일'},
  {value:'weekdays',label:'평일마다'},
  {value:'weekend',label:'주말마다'},
  {value:'weekly',label:'매주 특정 요일'},
  {value:'interval',label:'N일마다'},
  {value:'monthly',label:'매월 특정 날'},
  {value:'none',label:'한 번만'},
];
const DAY_KR=['일','월','화','수','목','금','토'];

function getRepeatLabel(r) {
  if(!r) return '';
  if(r.freq==='daily')    return '매일';
  if(r.freq==='weekdays') return '평일 (월~금)';
  if(r.freq==='weekend')  return '주말 (토·일)';
  if(r.freq==='weekly')   return r.freqDays?.length?`매주 ${r.freqDays.map(d=>DAY_KR[d]).join('·')}요일`:'매주';
  if(r.freq==='interval') return r.intervalDays?`${r.intervalDays}일마다`:'N일마다';
  if(r.freq==='monthly')  return r.monthDay?`매월 ${r.monthDay}일`:'매월';
  return '한 번만';
}
function isTodayItem(r, dateStr) {
  const ref = dateStr ? new Date(dateStr) : new Date();
  const d = ref.getDay();
  if(r.freq==='daily')    return true;
  if(r.freq==='weekdays') return d>=1&&d<=5;
  if(r.freq==='weekend')  return d===0||d===6;
  if(r.freq==='weekly')   return (r.freqDays||[]).includes(d);
  if(r.freq==='interval') {
    if(!r.createdAt||!r.intervalDays) return false;
    const c=new Date(r.createdAt); c.setHours(0,0,0,0);
    const n=new Date(ref); n.setHours(0,0,0,0);
    return Math.floor((n-c)/864e5)%r.intervalDays===0;
  }
  if(r.freq==='monthly') return ref.getDate()===(r.monthDay||1);
  return true;
}

function isDoneOn(item, dateStr) {
  return item.lastDone === dateStr;
}

function isDueOn(item, viewDate) {
  if(item.section === '루틴') return isTodayItem(item, viewDate);
  if(!item.lastDone) return true;
  const sinceMs = new Date(viewDate+'T00:00:00') - new Date(item.lastDone+'T00:00:00');
  const sinceDays = Math.floor(sinceMs / 864e5);
  return sinceDays >= (item.intervalDays || 7);
}
function getNextItemDate(r) {
  const today=new Date(); today.setHours(0,0,0,0);
  const d=today.getDay();
  if(isTodayItem(r)) return null;
  if(r.freq==='weekdays') { const n=new Date(today); n.setDate(today.getDate()+(d===0?1:2)); return n; }
  if(r.freq==='weekend')  { const n=new Date(today); n.setDate(today.getDate()+(6-d||7)); return n; }
  if(r.freq==='weekly'&&r.freqDays?.length) {
    let min=7;
    r.freqDays.forEach(fd=>{ let diff=fd-d; if(diff<=0)diff+=7; if(diff<min)min=diff; });
    const n=new Date(today); n.setDate(today.getDate()+min); return n;
  }
  if(r.freq==='interval'&&r.intervalDays) {
    const c=new Date(r.createdAt||today); c.setHours(0,0,0,0);
    const diff=Math.floor((today-c)/864e5);
    const rem=r.intervalDays-(diff%r.intervalDays);
    const n=new Date(today); n.setDate(today.getDate()+rem); return n;
  }
  if(r.freq==='monthly'&&r.monthDay) {
    const n=new Date(today); n.setDate(r.monthDay);
    if(n<=today) n.setMonth(n.getMonth()+1); return n;
  }
  return null;
}
function formatNextDate(nd) {
  if(!nd) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.ceil((nd-today)/864e5);
  if(diff===1) return '내일';
  if(diff===2) return '모레';
  if(diff<=7)  return `${diff}일 후`;
  return `${nd.getMonth()+1}/${nd.getDate()}`;
}

function useResponsive() {
  const [width, setWidth] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const fn = () => setWidth(window.innerWidth);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return { isMob: width < 768, isTablet: width >= 768 && width < 1024, isDesktop: width >= 1024, width };
}

function CircleGauge({pct,size=80,color='#7c3aed',label,sub}) {
  const r=(size-10)/2, circ=2*Math.PI*r, dash=circ*(pct/100);
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <div style={{position:'relative',width:size,height:size}}>
        <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f3f4f6" strokeWidth={8}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={8}
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            style={{transition:'stroke-dasharray 0.6s ease'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:size>70?15:12,fontWeight:800,color:C.text}}>{pct}%</span>
        </div>
      </div>
      {label&&<div style={{fontSize:12,fontWeight:700,color:C.text2}}>{label}</div>}
      {sub&&<div style={{fontSize:11,color:C.muted}}>{sub}</div>}
    </div>
  );
}

// HOME PAGE — 버그 수정 (⑦ 이번 주 블록 return 안으로)

function getGreeting() {
  const h = new Date().getHours();
  if(h < 6)  return {msg:'아직 늦은 시간이에요 🌙', sub:'충분한 휴식도 생활 관리예요'};
  if(h < 12) return {msg:'좋은 아침이에요 ☀️', sub:'오늘도 상쾌하게 시작해봐요'};
  if(h < 18) return {msg:'오후도 잘 보내고 있죠? 🌤️', sub:'오늘 할 일을 하나씩 정리해봐요'};
  if(h < 22) return {msg:'오늘 하루도 수고했어요 🌇', sub:'저녁 루틴을 챙겨봐요'};
  return {msg:'오늘도 고생했어요 🌙', sub:'내일을 위해 미리 준비해요'};
}

function QuickActionBtn({emoji, label, onClick}) {
  const theme = useTheme();
  return (
    <button onClick={onClick} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'12px 6px',borderRadius:14,border:'1.5px solid '+theme.mid,background:C.card,cursor:'pointer',width:'auto',margin:0,flex:1,transition:'all 0.15s',minWidth:0}}
      onMouseEnter={e=>{e.currentTarget.style.background=theme.light;e.currentTarget.style.borderColor=theme.primary;}}
      onMouseLeave={e=>{e.currentTarget.style.background='#fff';e.currentTarget.style.borderColor=theme.mid;}}>
      <span style={{fontSize:22}}>{emoji}</span>
      <span style={{fontSize:10,fontWeight:600,color:C.text3,textAlign:'center',lineHeight:1.3,wordBreak:'keep-all'}}>{label}</span>
    </button>
  );
}

function HomePage({foods,lifeItems,streak,weeklyLog,onNav,userName,onQuickAdd,onQuickCheck}) {
  const theme = useTheme();
  const todayDay = new Date().getDay();
  const greeting = getGreeting();

  const alerts = [];
  const allFoodsWithDl = foods.map(f=>({...f,dl:calcDaysLeft(f.expiryDate)}));
  const expiredFoods = allFoodsWithDl.filter(f=>f.dl<0);
  const todayDeadline = allFoodsWithDl.filter(f=>f.dl===0);
  const urgentFoods2 = allFoodsWithDl.filter(f=>f.dl===1).sort((a,b)=>a.dl-b.dl);

  if(expiredFoods.length > 0) alerts.push({
    id:'expired', emoji:'⚠️', level:'danger',
    title: `기간 초과 식재료 ${expiredFoods.length}개`,

    action:()=>onNav('food'),
    bg:'#fef2f2', border:'#fecaca', accent:'#ef4444', btnLabel:'확인'
  });
  if(alerts.length < 3 && todayDeadline.length > 0) alerts.push({
    id:'today-food', emoji:todayDeadline[0].emoji, level:'danger',
    title: todayDeadline.length===1?`${todayDeadline[0].name} 오늘이 마감이에요`:`오늘 마감 ${todayDeadline.length}개`,
    sub: '냉장고에서 먼저 꺼내요',
    action:()=>onNav('food'),
    bg:'#fef2f2', border:'#fecaca', accent:'#ef4444', btnLabel:'확인'
  });
  if(alerts.length < 3 && urgentFoods2.length > 0 && expiredFoods.length === 0) alerts.push({
    id:'food-tmr', emoji:urgentFoods2[0].emoji, level:'warn',
    title:`${urgentFoods2[0].name}${urgentFoods2.length>1?` 등 ${urgentFoods2.length}개`:''}가 내일까지예요`,
    sub:'먼저 드세요!', action:()=>onNav('food'),
    bg:'#fff7ed', border:'#fed7aa', accent:'#f97316', btnLabel:'확인'
  });

  const overdueItems = lifeItems.filter(c=>c.section!=='루틴'&&c.lastDone&&daysSince(c.lastDone)>c.intervalDays&&!isDoneOn(c,getToday()))
    .sort((a,b)=>(daysSince(b.lastDone)-b.intervalDays)-(daysSince(a.lastDone)-a.intervalDays));
  if(alerts.length < 3 && overdueItems.length > 0) {
    const worst = overdueItems[0];
    alerts.push({
      id:`life-${worst.id}`, emoji:worst.emoji, level:'warn',
      title:`${worst.text} ${daysSince(worst.lastDone)-worst.intervalDays}일 지났어요`,
      sub:`마지막: ${daysSince(worst.lastDone)}일 전 · ${worst.intervalDays}일 주기${overdueItems.length>1?` · 외 ${overdueItems.length-1}개 더`:''}`,
      action:()=>onNav('life'),
      bg:'#fefce8', border:'#fef08a', accent:'#ca8a04', btnLabel:'하러가기'
    });

  const todayRoutines = lifeItems.filter(c=>c.section==='루틴'&&isTodayItem(c));
  const undoneRoutines = todayRoutines.filter(c=>!isDoneOn(c,getToday()));
  const doneRoutines = todayRoutines.filter(c=>isDoneOn(c,getToday()));
  if(alerts.length < 3 && undoneRoutines.length > 0) alerts.push({
    id:'routine', emoji:'🌀', level:'info',
    title:`오늘 루틴 ${undoneRoutines.length}개 남았어요`,
    sub:`${doneRoutines.length}/${todayRoutines.length} 완료${doneRoutines.length>0?' · 잘 하고 있어요 👍':''}`,
    action:()=>onNav('life'),
    bg:theme.bg, border:theme.mid, accent:theme.primary, btnLabel:'하러가기'
  });

  const allDone = alerts.length===0;

  const urgentList = foods.map(f=>({...f,dl:calcDaysLeft(f.expiryDate)})).filter(f=>f.dl<=5&&f.dl>=0).sort((a,b)=>a.dl-b.dl).slice(0,4);

  const todayStr = getToday();

  const doneLife = todayDueItems.filter(c => isDoneOn(c, todayStr)).length;

      </div>

      {/* ③ 생활 상태 요약 */}

        <div style={{fontSize:13,fontWeight:700,color:C.text2,marginBottom:10}}>이번 주 달성 현황</div>
        <div style={{display:'flex',gap:5}}>
          {['일','월','화','수','목','금','토'].map((d,i)=>{
            const dateObj=new Date(); dateObj.setDate(dateObj.getDate()-(new Date().getDay()-i));
            const dateStr=dateObj.getFullYear()+'-'+String(dateObj.getMonth()+1).padStart(2,'0')+'-'+String(dateObj.getDate()).padStart(2,'0');
            const isCurrentDay=i===todayDay;
            const logVal=(weeklyLog||{})[dateStr];
            const dayAchiev = logVal>=100?{bg:'#fff7ed',border:'#fed7aa',color:'#ea580c',emoji:'🔥'}
              : logVal>=50?{bg:'#eff6ff',border:'#bfdbfe',color:'#2563eb',emoji:'💪'}
              : logVal>0?{bg:'#f0fdf4',border:'#bbf7d0',color:'#16a34a',emoji:'🌱'}
              : null;
            return (
              <div key={i} style={{flex:1,height:42,borderRadius:10,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,gap:1,
                background:isCurrentDay?theme.primary:dayAchiev?.bg||'#f9fafb',
                color:isCurrentDay?'#fff':dayAchiev?.color||'#9ca3af',
                border:isCurrentDay?'none':dayAchiev?`1.5px solid ${dayAchiev.border}`:`1px solid #f3f4f6`}}>
                {d}
                {dayAchiev&&!isCurrentDay&&<span style={{fontSize:9,lineHeight:1}}>{dayAchiev.emoji}</span>}
                {isCurrentDay&&<div style={{width:4,height:4,borderRadius:'50%',background:'rgba(255,255,255,0.7)',marginTop:1}}/>}
              </div>
            );
          })}
        </div>
        <div style={{fontSize:11,color:C.muted,marginTop:8,textAlign:'center'}}>연속 {streakCount}일째 생활 관리 중 🔥</div>
      </div>

    </div>
  );
}

function DateModal({food,onConfirm,onClose}) {
  const def=(()=>{const d=new Date();d.setDate(d.getDate()+(food?.days||7));return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
  const [date,setDate]=React.useState(def);
  return (
    <Modal title={`${food?.emoji} ${food?.name} 추가`} sub="유통기한을 선택해 주세요" onClose={onClose}>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <input type="date" value={date} min={getToday()} onChange={e=>setDate(e.target.value)} style={inp()}/>
        <div style={{display:'flex',gap:8}}>
          <Btn onClick={()=>onConfirm(date)} style={{flex:1}}>추가하기</Btn>
          <Btn onClick={onClose} variant="outline" style={{flex:1}}>취소</Btn>
        </div>
      </div>
    </Modal>
  );
}

function dateStrToObj(s) { return new Date(s+'T00:00:00'); }
function getWeekDates() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay();
  return Array.from({length:7}, (_, i) => {
    const d = new Date(today); d.setDate(today.getDate() - dow + i);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  });
}

function MonthlyCalendar({weeklyLog, lifeItems, onSelectDate, viewDate}) {
  const theme = useTheme();
  const [calYear, setCalYear] = React.useState(() => new Date().getFullYear());
  const [calMonth, setCalMonth] = React.useState(() => new Date().getMonth());

  const todayStr = getToday();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth+1, 0);
  const startDow = firstDay.getDay();
  const daysInMonth = lastDay.getDate();

  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  function getCellAchiev(dateStr) {
    const log = (weeklyLog||{})[dateStr];
    if(log === undefined || log === null) return null;
    if(log >= 100) return {emoji:'🔥',bg:'#fff7ed',border:'#fed7aa',color:'#ea580c'};
    if(log >= 50) return {emoji:'💪',bg:'#eff6ff',border:'#bfdbfe',color:'#2563eb'};
    if(log > 0) return {emoji:'🌱',bg:'#f0fdf4',border:'#bbf7d0',color:'#16a34a'};
    return {emoji:'',bg:'#f9fafb',border:'#f3f4f6',color:C.muted};
  }

  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  return (
    <div style={{background:C.card,borderRadius:18,padding:'16px',border:`1.5px solid #f3f4f6`,marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1);}} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:theme.primary,padding:'4px 8px',width:'auto',margin:0}}>‹</button>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>{calYear}년 {monthNames[calMonth]}</span>
        <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1);}} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:theme.primary,padding:'4px 8px',width:'auto',margin:0}}>›</button>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
        {[{bg:'#f0fdf4',border:'#bbf7d0',color:'#16a34a',label:'🌱 시작'},{bg:'#eff6ff',border:'#bfdbfe',color:'#2563eb',label:'💪 노력'},{bg:'#fff7ed',border:'#fed7aa',color:'#ea580c',label:'🔥 완벽'},{bg:'#f9fafb',border:'#f3f4f6',color:C.muted,label:'기록없음'}].map(s=>(
          <div key={s.label} style={{display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:14,height:14,borderRadius:4,background:s.bg,border:`1.5px solid ${s.border}`}}/>
            <span style={{fontSize:10,color:s.color,fontWeight:600}}>{s.label}</span>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:4}}>
        {['일','월','화','수','목','금','토'].map((d,i)=>(
          <div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:i===0?'#ef4444':i===6?'#3b82f6':'#9ca3af',padding:'3px 0'}}>{d}</div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
        {cells.map((d,i)=>{
          if(!d) return <div key={`empty-${i}`}/>;
          const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const achiev=getCellAchiev(ds);
          const isToday=ds===todayStr;
          const isSelected=ds===viewDate;
          return (
            <button key={ds} onClick={()=>{onSelectDate(ds);}} style={{
              aspectRatio:'1',borderRadius:8,fontSize:11,fontWeight:isToday||isSelected?800:500,
              border:`1.5px solid ${isSelected?theme.primary:isToday?theme.border:achiev?.border||'#f3f4f6'}`,
              background:isSelected?theme.primary:achiev?.bg||C.card,
              color:isSelected?'#fff':isToday?theme.primary:achiev?.color||C.text2,
              cursor:'pointer',padding:0,margin:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1,
              boxShadow:isToday?`0 0 0 2px ${theme.light}`:'none',
              transition:'all 0.15s',
            }}>
              <span>{d}</span>
              {achiev?.emoji&&!isSelected&&<span style={{fontSize:9,lineHeight:1}}>{achiev.emoji}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function LifePage({lifeItems,onAdd,onToggle,onDelete,onEdit,streak,weeklyLog,updateStreak,fb,user}) {
  const theme=useTheme();
  const todayStr = getToday();
  const [lifeTab, setLifeTab] = React.useState('today');
  const [viewDate, setViewDate] = React.useState(todayStr);
  const [showAddModal,setShowAddModal]=React.useState(false);
  const [editTarget,setEditTarget]=React.useState(null);
  const [showPackModal,setShowPackModal]=React.useState(false);
  const [showCalendar, setShowCalendar] = React.useState(false);
  const [scheduledOpen, setScheduledOpen] = React.useState(true);
  const [sortMode, setSortMode] = React.useState(false);
  const emptyForm={text:'',emoji:'💧',section:'루틴',freq:'daily',freqDays:[],intervalDays:7,monthDay:1,guide:''};
  const [form,setForm]=React.useState(emptyForm);

  const isToday = viewDate === todayStr;
  const isFuture = viewDate > todayStr;
  const isPast = viewDate < todayStr;

  const todayItems = lifeItems.filter(c => isDueOn(c, viewDate));
  const scheduledItems = lifeItems.filter(c => !isDueOn(c, viewDate));

  const todayUndone = todayItems
    .filter(c => !isDoneOn(c, viewDate))
    .sort((a,b) => (a.order||0) - (b.order||0));
  const todayDone = todayItems.filter(c => isDoneOn(c, viewDate));

  function handleMoveUp(id) {
    const idx = todayUndone.findIndex(c=>c.id===id);
    if(idx <= 0) return;
    const above = todayUndone[idx-1];
    const current = todayUndone[idx];
    const curOrder = current.order ?? idx;
    const aboveOrder = above.order ?? (idx-1);
    onEdit(current.id, {order: aboveOrder});
    onEdit(above.id, {order: curOrder});
  }
  function handleMoveDown(id) {
    const idx = todayUndone.findIndex(c=>c.id===id);
    if(idx >= todayUndone.length-1) return;
    const below = todayUndone[idx+1];
    const current = todayUndone[idx];
    const curOrder = current.order ?? idx;
    const belowOrder = below.order ?? (idx+1);
    onEdit(current.id, {order: belowOrder});
    onEdit(below.id, {order: curOrder});
  }

  const totalToday = todayItems.length;
  const doneToday = todayDone.length;
  const pct = totalToday ? Math.round(doneToday/totalToday*100) : 0;
  const achievLevel = getAchievLevel(doneToday, totalToday);

  const cardBg = achievLevel?.cardBg || `linear-gradient(135deg,${theme.primary},${theme.border})`;
  const gaugeStroke = achievLevel?.gaugeStroke || '#fff';
  const badgeBg = achievLevel?.badgeBg || theme.light;
  const badgeColor = achievLevel?.badgeColor || theme.primary;
  const badgeBorder = achievLevel?.badgeBorder || theme.mid;

    const d = new Date(viewDate); d.setDate(d.getDate()+dir);

    setShowCalendar(false);
  }
  function goToday() { setViewDate(todayStr); setShowCalendar(false); }

  function dateLabel(ds) {
    const d = new Date(ds+'T00:00:00');
    const days=['일','월','화','수','목','금','토'];
    return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;

    setForm({...emptyForm,section:section||'루틴'});

          <Btn variant="outline" size="sm" onClick={()=>setShowPackModal(true)} style={{display:'flex',alignItems:'center',gap:4}}>

                    const bdLeft = b.section!=='루틴'&&b.lastDone ? calcDaysLeft(addDays(b.lastDone,b.intervalDays)) : 999;
                    return adLeft - bdLeft;
                  })
                  .map(c=>(
                    <ScheduledItemCard key={c.id} c={c} onDelete={onDelete} openEdit={openEdit} viewDate={viewDate}/>
                ))}
              </div>
            )}

        )}

      )}

      {showAddModal&&(
        <Modal title={editTarget?'항목 수정':'+ 생활 관리 추가'} sub="루틴·생활·청소를 주기로 관리해요" onClose={()=>setShowAddModal(false)} maxWidth={440}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'grid',gridTemplateColumns:'50px 1fr',gap:7}}>
              <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>이모지</div><input placeholder="💧" value={form.emoji} onChange={e=>setForm(p=>({...p,emoji:e.target.value}))} maxLength={2} style={inp({textAlign:'center',fontSize:20})}/></div>
              <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>내용 *</div><input placeholder="예: 빨래 돌리기" value={form.text} onChange={e=>setForm(p=>({...p,text:e.target.value}))} style={inp()} autoFocus/></div>
            </div>
            <div>
              <div style={{fontSize:11,color:C.muted,marginBottom:5}}>종류</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
                {Object.entries(LIFE_SECTIONS).map(([s,sec])=>(
                  <button key={s} onClick={()=>setForm(p=>({...p,section:s,freq:s==='루틴'?'daily':'interval'}))} style={{padding:'10px 5px',borderRadius:11,border:`1.5px solid ${form.section===s?sec.color:sec.border}`,background:form.section===s?sec.bg:C.card,cursor:'pointer',width:'auto',margin:0,textAlign:'center'}}>
                    <div style={{fontSize:16,marginBottom:2}}>{sec.icon}</div>
                    <div style={{fontSize:11,fontWeight:700,color:form.section===s?sec.color:C.text2}}>{sec.label}</div>
                  </button>
                ))}
              </div>
            </div>
            <div style={{background:C.card2,borderRadius:12,padding:'13px',border:`1px solid ${C.border}`}}>
              {form.section==='루틴'?(
                <RepeatPicker form={form} setForm={setForm}/>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <div style={{fontSize:11,color:C.muted,fontWeight:600}}>반복 주기</div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:12,color:C.muted,whiteSpace:'nowrap'}}>매</span>
                    <input type="number" min={1} max={365} value={form.intervalDays||7} onChange={e=>setForm(p=>({...p,intervalDays:Number(e.target.value)}))} style={inp({width:80,textAlign:'center'})}/>
                    <span style={{fontSize:12,color:C.muted,whiteSpace:'nowrap'}}>일마다</span>
                  </div>
                  <div style={{fontSize:11,color:theme.primary,background:theme.light,padding:'6px 10px',borderRadius:8,fontWeight:600}}>⏱ {form.intervalDays||7}일마다 한 번</div>
                </div>
              )}
            </div>
            {(form.section==='청소'||form.section==='생활')&&(
              <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>메모 (선택)</div>

            <div style={{display:'flex',gap:8,marginTop:2}}>
              <Btn onClick={submitForm} style={{flex:1}}>{editTarget?'수정하기':'추가하기'}</Btn>
              <Btn onClick={()=>setShowAddModal(false)} variant="outline" style={{flex:1}}>취소</Btn>
            </div>
          </div>
        </Modal>

      {showPackModal&&(
        <Modal title="✨ 추천 생활 관리" sub="자취 생활에 맞는 항목을 추가해보세요" onClose={()=>setShowPackModal(false)} maxWidth={440}>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {Object.entries(ONBOARDING_PRESETS).map(([label,items])=>(
              <div key={label} style={{background:C.card2,borderRadius:14,padding:'14px 16px',border:`1.5px solid ${C.border}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.text}}>{label}</div>
                  <Btn size="sm" onClick={()=>{items.forEach(item=>{if(!lifeItems.some(c=>c.text===item.text))onAdd({id:Date.now()+Math.random(),...item,done:false,lastDone:null,freqDays:[],createdAt:new Date().toISOString()});});setShowPackModal(false);}}>전체 추가</Btn>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:5}}>
                  {items.map((item,idx)=>{
                    const already=lifeItems.some(c=>c.text===item.text);
                    const sec=LIFE_SECTIONS[item.section];
                    return <div key={idx} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:9,background:C.card,border:`1px solid ${C.border2}`}}>
                      <span style={{fontSize:15}}>{item.emoji}</span>
                      <span style={{flex:1,fontSize:13,color:C.text2}}>{item.text}</span>
                      <span style={{fontSize:10,color:sec.color,background:sec.bg,padding:'1px 6px',borderRadius:20,border:`1px solid ${sec.border}`,fontWeight:600}}>{sec.icon} {item.section}</span>

}

function TipsPage() {
  const theme=useTheme();
  const [activeCat,setActiveCat]=React.useState('전체');
  const [search,setSearch]=React.useState('');
  const [openId,setOpenId]=React.useState(null);
  const [showModal,setShowModal]=React.useState(false);
  const [editTarget,setEditTarget]=React.useState(null);
  const [myTips,setMyTips]=useLocalStorage('mylife_v3_mytips',[]);
  const [form,setForm]=React.useState({emoji:'✏️',title:'',category:'나만의팁',summary:'',content:'',time:''});
  const ALL=['전체','청소','세탁','식재료','자취팁','나만의팁'];
  const allGuides=[...LIFE_GUIDES,...myTips.map((t,i)=>({...t,...MY_TIP_COLORS[i%MY_TIP_COLORS.length],isMine:true}))];
  const filtered=allGuides.filter(g=>{
    const matchCat=activeCat==='전체'||g.category===activeCat;
    const q=search.trim().toLowerCase();
    const matchSearch=!q||(g.title+g.summary+g.content+g.category).toLowerCase().includes(q);
    return matchCat&&matchSearch;
  });
  function openAdd(){setEditTarget(null);setForm({emoji:'✏️',title:'',category:'나만의팁',summary:'',content:'',time:''});setShowModal(true);}
  function openEdit(g,e){e.stopPropagation();setEditTarget(g);setForm({emoji:g.emoji,title:g.title,category:g.category,summary:g.summary||'',content:g.content||'',time:g.time||''});setShowModal(true);}
  function submitForm(){if(!form.title.trim())return;editTarget?setMyTips(p=>p.map(t=>t.id===editTarget.id?{...t,...form}:t)):setMyTips(p=>[...p,{id:Date.now(),...form}]);setShowModal(false);}
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:16}}>
        <div><div style={{fontSize:21,fontWeight:800,color:C.text,marginBottom:3}}>💡 생활 가이드</div><div style={{fontSize:13,color:C.muted}}>자취 초보를 위한 생활 꿀팁</div></div>
        <Btn size="sm" onClick={openAdd}>+ 나만의 팁</Btn>
      </div>
      <div style={{position:'relative',marginBottom:12}}>
        <span style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',fontSize:14,color:C.muted,pointerEvents:'none'}}>🔍</span>
        <input type="text" placeholder="팁 검색..." value={search} onChange={e=>setSearch(e.target.value)} style={inp({paddingLeft:38,borderRadius:14,background:C.card})}
          onFocus={e=>e.target.style.borderColor='#7c3aed'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
        {search&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:11,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:15,padding:0,width:'auto',margin:0}}>✕</button>}
      </div>
      <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
        {ALL.map(c=><button key={c} onClick={()=>setActiveCat(c)} style={{padding:'5px 13px',borderRadius:20,border:`1.5px solid ${activeCat===c?'#7c3aed':'#e5e7eb'}`,background:activeCat===c?'#ede9fe':'#fff',color:activeCat===c?'#7c3aed':'#6b7280',fontSize:12,fontWeight:activeCat===c?700:500,cursor:'pointer',width:'auto',margin:0,display:'flex',alignItems:'center',gap:4}}>
          {c}{c==='나만의팁'&&myTips.length>0&&<span style={{fontSize:10,fontWeight:700,color:'#fff',background:'#7c3aed',padding:'0 5px',borderRadius:10}}>{myTips.length}</span>}
        </button>)}
      </div>
      {filtered.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:C.muted}}><div style={{fontSize:32,marginBottom:8}}>{search?'🔍':'📭'}</div><div style={{fontSize:14,fontWeight:600}}>{search?`"${search}" 결과가 없어요`:'팁이 없어요'}</div></div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:13}}>
        {filtered.map(g=>(
          <div key={g.id} style={{background:g.color,borderRadius:18,padding:'19px',border:`1.5px solid ${g.isMine?'#ddd6fe':`${g.textColor}22`}`,cursor:'pointer',transition:'transform 0.15s',position:'relative'}} onClick={()=>setOpenId(openId===g.id?null:g.id)} onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
            {g.isMine&&(
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
                <span style={{fontSize:10,fontWeight:700,color:'#7c3aed',background:'#ede9fe',padding:'2px 7px',borderRadius:20,border:'1px solid #ddd6fe'}}>✏️ 나만의 팁</span>
                <div style={{display:'flex',gap:4}} onClick={e=>e.stopPropagation()}>
                  <button onClick={e=>openEdit(g,e)} style={{fontSize:10,color:'#7c3aed',background:'#f5f3ff',border:'1px solid #ddd6fe',borderRadius:7,padding:'2px 7px',cursor:'pointer',width:'auto',margin:0}}>수정</button>
                  <button onClick={e=>{e.stopPropagation();setMyTips(p=>p.filter(t=>t.id!==g.id));}} style={{fontSize:10,color:'#ef4444',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:7,padding:'2px 7px',cursor:'pointer',width:'auto',margin:0}}>삭제</button>
                </div>
              </div>
            )}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}>
              <div style={{fontSize:26}}>{g.emoji}</div>
              {!g.isMine&&<div style={{fontSize:10,fontWeight:700,color:g.textColor,opacity:0.7,background:`${g.textColor}15`,padding:'2px 8px',borderRadius:20}}>{g.category}</div>}
            </div>
            <div style={{fontSize:14,fontWeight:800,color:g.textColor,marginBottom:3}}>{g.title}</div>
            {g.summary&&<div style={{fontSize:12,color:g.textColor,opacity:0.75,marginBottom:9}}>{g.summary}</div>}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              {g.time?<div style={{fontSize:10,color:g.textColor,opacity:0.6}}>🕐 {g.time}</div>:<div/>}
              <div style={{fontSize:10,color:g.textColor,fontWeight:700}}>{openId===g.id?'접기 ↑':'더보기 ↓'}</div>
            </div>
            {openId===g.id&&g.content&&<div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${g.textColor}22`,fontSize:12,color:g.textColor,lineHeight:1.8,whiteSpace:'pre-wrap'}}>{g.content}</div>}
          </div>
        ))}
      </div>
      {showModal&&(
        <Modal title={editTarget?'팁 수정':'✏️ 나만의 팁 추가'} sub="나만의 생활 노하우를 기록해보세요" onClose={()=>setShowModal(false)} maxWidth={420}>
          <div style={{display:'flex',flexDirection:'column',gap:11}}>
            <div style={{display:'grid',gridTemplateColumns:'54px 1fr',gap:7}}>
              <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>이모지</div><input placeholder="✏️" value={form.emoji} onChange={e=>setForm(p=>({...p,emoji:e.target.value}))} maxLength={2} style={inp({textAlign:'center',fontSize:22})}/></div>
              <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>제목 *</div><input placeholder="팁 제목" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} style={inp()} autoFocus/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
              <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>카테고리</div>
                <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))} style={inp()}>
                  {['나만의팁','청소','세탁','식재료','자취팁'].map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>주기</div><input placeholder="예: 주 1회" value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))} style={inp()}/></div>
            </div>
            <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>한 줄 요약</div><input placeholder="짧게 요약해주세요" value={form.summary} onChange={e=>setForm(p=>({...p,summary:e.target.value}))} style={inp()}/></div>
            <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>내용</div><textarea placeholder="자유롭게 작성하세요" value={form.content} onChange={e=>setForm(p=>({...p,content:e.target.value}))} rows={4} style={inp({resize:'vertical',lineHeight:1.6})}/></div>
            <div style={{display:'flex',gap:8,marginTop:2}}>
              <Btn onClick={submitForm} style={{flex:1}}>{editTarget?'수정하기':'추가하기'}</Btn>
              <Btn onClick={()=>setShowModal(false)} variant="outline" style={{flex:1}}>취소</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

const SHOP_CATEGORIES = ['과일/채소','정육/수산','유제품','가공식품','양념/소스','생활용품','기타'];

const RECIPE_PRESETS = [
  {name:'계란볶음밥',emoji:'🍳',ingredients:['계란','대파','당근','밥','참기름']},
  {name:'된장찌개',emoji:'🍲',ingredients:['두부','대파','감자','된장','애호박']},
  {name:'삼겹살 구이',emoji:'🥩',ingredients:['삼겹살','쌈채소','마늘','쌈장']},
  {name:'파스타',emoji:'🍝',ingredients:['파스타면','마늘','올리브오일','토마토','베이컨']},
  {name:'비빔밥',emoji:'🥗',ingredients:['시금치','당근','버섯','계란','고추장','참기름']},
  {name:'순두부찌개',emoji:'🍜',ingredients:['순두부','대파','계란','고추장','참기름']},
  {name:'제육볶음',emoji:'🥘',ingredients:['돼지고기','양파','대파','고추장','마늘']},
  {name:'감자볶음',emoji:'🥔',ingredients:['감자','대파','양파','마늘','참기름']},
];

function ShoppingPage({foods, fb, user}) {
  const theme = useTheme();
  const [items, setItems] = React.useState([]);
  const [input, setInput] = React.useState('');
  const [category, setCategory] = React.useState('기타');
  const [recipeOpen, setRecipeOpen] = React.useState(null);

  React.useEffect(() => {
    if(!fb||!user) return;
    const unsub = fb.onSnapshot(fb.collection(fb.db,'users',user.uid,'shoppingItems'), snap => {
      setItems(snap.docs.map(d => ({...d.data(), id:d.id})));
    });
    return () => unsub();
  }, [fb, user]);

  async function addItem(text, cat, emoji) {
    const t = (text || input).trim();
    if(!t||!fb||!user) return;
    await fb.addDoc(fb.collection(fb.db,'users',user.uid,'shoppingItems'), {
      text: t, category: cat||category, done: false, createdAt: new Date().toISOString(), emoji: emoji||''
    });
    if(!text) setInput('');
  }
  async function toggleItem(id, done) {
    if(!fb||!user) return;
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'shoppingItems',id), {done:!done});
  }
  async function deleteItem(id) {
    if(!fb||!user) return;
    await fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'shoppingItems',id));
  }
  async function clearDone() {
    if(!fb||!user) return;
    const donelist = items.filter(i=>i.done);
    await Promise.all(donelist.map(i => fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'shoppingItems',i.id))));
  }
  async function addRecipeIngredients(recipe) {
    if(!fb||!user) return;
    for(const ing of recipe.ingredients) {
      if(!items.some(i=>i.text===ing)) {
        await fb.addDoc(fb.collection(fb.db,'users',user.uid,'shoppingItems'), {
          text:ing, category:'기타', done:false, createdAt:new Date().toISOString(), emoji:'', recipeTag:recipe.name
        });
      }
    }
    setRecipeOpen(null);
  }

  const repurchaseSuggestions = foods
    .map(f=>({...f, dl:calcDaysLeft(f.expiryDate)}))
    .filter(f=>f.dl<=5&&f.dl>=0)
    .filter(f=>!items.some(i=>i.text===f.name))
    .sort((a,b)=>a.dl-b.dl);

  const undone = items.filter(i=>!i.done).sort((a,b)=>SHOP_CATEGORIES.indexOf(a.category)-SHOP_CATEGORIES.indexOf(b.category));
  const done = items.filter(i=>i.done);
  const byCategory = SHOP_CATEGORIES.map(cat=>({cat, items: undone.filter(i=>i.category===cat)})).filter(g=>g.items.length>0);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontSize:13,color:C.muted}}>필요한 것들을 미리 정리해요</div>
        {done.length>0&&<button onClick={clearDone} style={{fontSize:12,color:C.muted,background:'none',border:'none',cursor:'pointer',fontWeight:600,width:'auto',margin:0}}>완료 삭제</button>}
      </div>
      <div style={{background:C.card,borderRadius:16,padding:'14px 16px',marginBottom:14,border:`1.5px solid ${C.border}`}}>
        <div style={{display:'flex',gap:7,marginBottom:8}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addItem()}
            placeholder="항목 입력 후 Enter"
            style={{flex:1,padding:'10px 13px',border:`1.5px solid ${theme.mid}`,borderRadius:11,fontSize:14,outline:'none',background:C.input}}
            onFocus={e=>e.target.style.borderColor=theme.primary}
            onBlur={e=>e.target.style.borderColor=theme.mid}
          />
          <button onClick={()=>addItem()} style={{padding:'10px 16px',borderRadius:11,border:'none',background:theme.primary,color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',width:'auto',margin:0}}>추가</button>
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {SHOP_CATEGORIES.map(c=>(
            <button key={c} onClick={()=>setCategory(c)} style={{padding:'4px 10px',borderRadius:20,border:`1.5px solid ${category===c?theme.primary:'#e5e7eb'}`,background:category===c?theme.light:C.card,color:category===c?theme.primary:'#6b7280',fontSize:11,fontWeight:category===c?700:400,cursor:'pointer',width:'auto',margin:0}}>{c}</button>
          ))}
        </div>
      </div>
      {undone.length===0&&done.length===0&&(
        <div style={{background:C.card,borderRadius:16,padding:'28px',textAlign:'center',color:C.muted,border:`1.5px solid ${C.border}`,marginBottom:14}}>
          <div style={{fontSize:36,marginBottom:8}}>🛒</div>
          <div style={{fontSize:14,fontWeight:600}}>장보기 목록이 비어있어요</div>
          <div style={{fontSize:12,marginTop:4}}>필요한 것들을 추가하거나 아래 추천을 활용해봐요</div>
        </div>
      )}
      {byCategory.map(({cat,items:catItems})=>(
        <div key={cat} style={{background:C.card,borderRadius:16,padding:'14px 16px',marginBottom:10,border:`1.5px solid ${C.border}`}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text2,marginBottom:8}}>{cat} <span style={{color:C.muted,fontWeight:400}}>({catItems.length})</span></div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {catItems.map(item=>(
              <div key={item.id} style={{display:'flex',alignItems:'center',gap:10}}>
                <div onClick={()=>toggleItem(item.id,item.done)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:'pointer',background:'transparent',border:'2px solid #d1d5db',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}/>
                <span style={{flex:1,fontSize:14,color:C.text}}>{item.emoji||''} {item.text}</span>
                {item.recipeTag&&<span style={{fontSize:10,color:theme.primary,background:theme.light,padding:'1px 7px',borderRadius:20,border:`1px solid ${theme.mid}`,whiteSpace:'nowrap'}}>{item.recipeTag}</span>}
                <button onClick={()=>deleteItem(item.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:14,padding:0,width:'auto',margin:0}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>✕</button>
              </div>
            ))}
          </div>
        </div>
      ))}
      {done.length>0&&(
        <div style={{background:C.card2,borderRadius:16,padding:'14px 16px',border:`1.5px solid ${C.border}`,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8}}>✓ 완료 ({done.length})</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {done.map(item=>(
              <div key={item.id} style={{display:'flex',alignItems:'center',gap:10,opacity:0.55}}>
                <div onClick={()=>toggleItem(item.id,item.done)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:'pointer',background:theme.primary,border:`2px solid ${theme.primary}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span style={{color:'#fff',fontSize:10,fontWeight:700}}>✓</span>
                </div>
                <span style={{flex:1,fontSize:14,color:C.muted,textDecoration:'line-through'}}>{item.text}</span>
                <button onClick={()=>deleteItem(item.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:14,padding:0,width:'auto',margin:0}}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{display:'flex',alignItems:'center',gap:10,margin:'20px 0 16px'}}>
        <div style={{flex:1,height:1,background:C.border2}}/>
        <span style={{fontSize:12,color:C.muted,fontWeight:600,whiteSpace:'nowrap'}}>✨ 스마트 추천</span>
        <div style={{flex:1,height:1,background:C.border2}}/>
      </div>
      {repurchaseSuggestions.length>0&&(
        <div style={{background:'linear-gradient(135deg,#fff7ed,#ffedd5)',borderRadius:18,padding:'16px 18px',marginBottom:14,border:'1.5px solid #fed7aa'}}>
          <div style={{fontSize:13,fontWeight:700,color:'#ea580c',marginBottom:10}}>🔄 유통기한 임박 — 재구매 추천</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {repurchaseSuggestions.map(f=>{
              const dlColor = f.dl<=1?'#ef4444':f.dl<=3?'#f97316':'#eab308';
              const dlBg = f.dl<=1?'#fef2f2':f.dl<=3?'#fff7ed':'#fefce8';
              return (
                <div key={f.id} style={{background:'rgba(255,255,255,0.7)',borderRadius:12,padding:'10px 13px',display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:20,flexShrink:0}}>{f.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#1f2937'}}>{f.name}</div>
                    <div style={{display:'flex',gap:5,marginTop:2,alignItems:'center'}}>
                      <span style={{fontSize:10,fontWeight:700,color:dlColor,background:dlBg,padding:'1px 6px',borderRadius:20}}>D-{f.dl}</span>
                      <span style={{fontSize:10,color:'#6b7280'}}>{f.storage}</span>
                    </div>
                  </div>
                  <button onClick={()=>addItem(f.name,'기타',f.emoji)} style={{
                    padding:'6px 12px',borderRadius:20,border:'1.5px solid #fed7aa',
                    background:'#fff',color:'#ea580c',fontSize:11,fontWeight:700,cursor:'pointer',width:'auto',margin:0,whiteSpace:'nowrap'
                  }}>+ 추가</button>
                </div>
              );
            })}
          </div>
        </div>
      )}
      <div style={{background:C.card,borderRadius:18,padding:'16px 18px',border:`1.5px solid ${C.border}`}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>🍽️ 레시피 기반 자동 추가</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
          {RECIPE_PRESETS.map(recipe=>{
            const missingCount = recipe.ingredients.filter(ing=>
              !foods.some(f=>f.name.includes(ing)&&calcDaysLeft(f.expiryDate)>0)
            ).length;
            const isOpen = recipeOpen===recipe.name;
            return (
              <div key={recipe.name} style={{borderRadius:14,border:`1.5px solid ${isOpen?theme.primary:C.border2}`,overflow:'hidden',transition:'all 0.15s',cursor:'pointer',background:isOpen?theme.bg:C.card}} onClick={()=>setRecipeOpen(isOpen?null:recipe.name)}>
                <div style={{padding:'12px 13px',display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:22,flexShrink:0}}>{recipe.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,color:C.text}}>{recipe.name}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:1}}>{recipe.ingredients.length}가지</div>
                    {missingCount>0&&<div style={{fontSize:9,fontWeight:700,color:'#ea580c',marginTop:2}}>부족 {missingCount}개</div>}
                  </div>
                </div>
                {isOpen&&(
                  <div style={{borderTop:`1px solid ${C.border}`,padding:'10px 13px',background:theme.bg}} onClick={e=>e.stopPropagation()}>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>
                      {recipe.ingredients.map(ing=>{
                        const have = foods.some(f=>f.name.includes(ing)&&calcDaysLeft(f.expiryDate)>0);
                        const inCart = items.some(i=>i.text===ing);
                        return (
                          <span key={ing} style={{fontSize:10,padding:'2px 7px',borderRadius:20,fontWeight:600,
                            background:have?'#f0fdf4':inCart?theme.light:'#fef2f2',
                            color:have?'#16a34a':inCart?theme.primary:'#ef4444',
                            border:`1px solid ${have?'#bbf7d0':inCart?theme.mid:'#fecaca'}`
                          }}>
                            {have?'✓':inCart?'🛒':'✕'} {ing}
                          </span>
                        );
                      })}
                    </div>
                    <button onClick={()=>addRecipeIngredients(recipe)} style={{
                      width:'100%',padding:'8px',borderRadius:10,border:'none',
                      background:theme.primary,color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',margin:0,
                    }}>없는 재료 목록에 추가</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ReportPage({weeklyLog, lifeItems, foods, streak}) {
  const theme = useTheme();
  const now = new Date();
  const [reportMonth, setReportMonth] = React.useState(now.getMonth());
  const [reportYear, setReportYear] = React.useState(now.getFullYear());

  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const daysInMonth = new Date(reportYear, reportMonth+1, 0).getDate();

  const monthDays = Array.from({length:daysInMonth},(_,i)=>{
    const d = i+1;
    const ds = `${reportYear}-${String(reportMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const log = (weeklyLog||{})[ds];
    return {d, ds, log};
  });

  const activeDays = monthDays.filter(d=>d.log>0).length;
  const perfectDays = monthDays.filter(d=>d.log>=100).length;
  const effortDays = monthDays.filter(d=>d.log>=50&&d.log<100).length;
  const startDays = monthDays.filter(d=>d.log>0&&d.log<50).length;
  const avgLog = activeDays ? Math.round(monthDays.filter(d=>d.log>0).reduce((s,d)=>s+(d.log||0),0)/activeDays) : 0;

  let maxStreak=0, curStreak=0;
  monthDays.forEach(d=>{
    if(d.log>0) { curStreak++; maxStreak=Math.max(maxStreak,curStreak); }
    else curStreak=0;
  });

  const routines = lifeItems.filter(c=>c.section==='루틴');

  function prevMonth(){ if(reportMonth===0){setReportMonth(11);setReportYear(y=>y-1);}else setReportMonth(m=>m-1); }
  function nextMonth(){ if(reportMonth===11){setReportMonth(0);setReportYear(y=>y+1);}else setReportMonth(m=>m+1); }

  const getAchievBg=(log)=>{
    if(!log&&log!==0) return '#f9fafb';
    if(log>=100) return '#fff7ed';
    if(log>=50) return '#eff6ff';
    if(log>0) return '#f0fdf4';
    return '#f9fafb';
  };
  const getAchievColor=(log)=>{
    if(!log&&log!==0) return '#e5e7eb';
    if(log>=100) return '#f97316';
    if(log>=50) return '#3b82f6';
    if(log>0) return '#22c55e';
    return '#e5e7eb';
  };

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:18}}>
        <div>
          <div style={{fontSize:21,fontWeight:800,color:C.text,marginBottom:3}}>📊 월간 리포트</div>
          <div style={{fontSize:13,color:C.muted}}>한 달을 돌아봐요</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={prevMonth} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:theme.primary,padding:'2px 6px',width:'auto',margin:0}}>‹</button>
          <span style={{fontSize:13,fontWeight:700,color:C.text}}>{reportYear}년 {monthNames[reportMonth]}</span>

function DiaryPage({fb, user}) {
  const theme = useTheme();
  const [memos, setMemos] = React.useState([]);
  const [selectedDate, setSelectedDate] = React.useState(getToday());
  const [content, setContent] = React.useState('');
  const [mood, setMood] = React.useState('😊');
  const [saving, setSaving] = React.useState(false);
  const [viewMode, setViewMode] = React.useState('write');

  const MOODS = ['😊','😄','😐','😔','😴','🔥','💪','🥺','😤','🌟'];

  React.useEffect(()=>{
    if(!fb||!user) return;
    const unsub = fb.onSnapshot(fb.collection(fb.db,'users',user.uid,'diaries'), snap=>{
      setMemos(snap.docs.map(d=>({...d.data(),id:d.id})).sort((a,b)=>b.date.localeCompare(a.date)));
    });
    return ()=>unsub();
  },[fb,user]);

  React.useEffect(()=>{
    const existing = memos.find(m=>m.date===selectedDate);
    setContent(existing?.content||'');
    setMood(existing?.mood||'😊');
  },[selectedDate, memos]);

  async function saveMemo() {
    if(!fb||!user||!content.trim()) return;
    setSaving(true);
    const existing = memos.find(m=>m.date===selectedDate);
    if(existing) {
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'diaries',existing.id), {content:content.trim(),mood,updatedAt:new Date().toISOString()});
    } else {
      await fb.addDoc(fb.collection(fb.db,'users',user.uid,'diaries'), {date:selectedDate,content:content.trim(),mood,createdAt:new Date().toISOString()});
    }
    setSaving(false);
  }

  async function deleteMemo(id) {
    if(!fb||!user) return;
    await fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'diaries',id));
  }

  function dateLabel2(ds) {
    const d=new Date(ds+'T00:00:00');
    const days=['일','월','화','수','목','금','토'];
    return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  }

  const hasMemo = memos.some(m=>m.date===selectedDate);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:18}}>
        <div>
          <div style={{fontSize:21,fontWeight:800,color:C.text,marginBottom:3}}>📔 하루 기록</div>
          <div style={{fontSize:13,color:C.muted}}>오늘을 기억해요 ✍️</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setViewMode('write')} style={{padding:'6px 12px',borderRadius:20,border:`1.5px solid ${viewMode==='write'?theme.primary:'#e5e7eb'}`,background:viewMode==='write'?theme.light:'#fff',color:viewMode==='write'?theme.primary:'#9ca3af',fontSize:12,fontWeight:700,cursor:'pointer',width:'auto',margin:0}}>✏️ 쓰기</button>
          <button onClick={()=>setViewMode('list')} style={{padding:'6px 12px',borderRadius:20,border:`1.5px solid ${viewMode==='list'?theme.primary:'#e5e7eb'}`,background:viewMode==='list'?theme.light:'#fff',color:viewMode==='list'?theme.primary:'#9ca3af',fontSize:12,fontWeight:700,cursor:'pointer',width:'auto',margin:0}}>📖 목록</button>
        </div>
      </div>

      {viewMode==='write'&&(
        <div>
          <div style={{background:C.card,borderRadius:16,padding:'12px 16px',marginBottom:12,border:`1.5px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
            <input type="date" value={selectedDate} max={getToday()} onChange={e=>setSelectedDate(e.target.value)}
              style={{border:'none',background:'transparent',fontSize:14,fontWeight:700,color:C.text,outline:'none',cursor:'pointer'}}/>
            {hasMemo&&<span style={{fontSize:11,color:theme.primary,background:theme.light,padding:'2px 8px',borderRadius:20,fontWeight:700}}>기록 있음</span>}
          </div>
          <div style={{background:C.card,borderRadius:16,padding:'14px 16px',marginBottom:12,border:`1.5px solid ${C.border}`}}>
            <div style={{fontSize:12,color:C.muted,fontWeight:600,marginBottom:8}}>오늘 기분은?</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {MOODS.map(m=>(
                <button key={m} onClick={()=>setMood(m)} style={{
                  width:38,height:38,borderRadius:10,fontSize:20,border:`2px solid ${mood===m?theme.primary:'#f3f4f6'}`,
                  background:mood===m?theme.light:C.card,cursor:'pointer',margin:0,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'
                }}>{m}</button>
              ))}
            </div>
          </div>
          <div style={{background:C.card,borderRadius:16,padding:'14px 16px',marginBottom:12,border:`1.5px solid ${C.border}`}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{fontSize:20}}>{mood}</span>
              <span style={{fontSize:13,fontWeight:700,color:C.text2}}>{dateLabel2(selectedDate)}</span>
            </div>
            <textarea value={content} onChange={e=>setContent(e.target.value)}
              placeholder="오늘 어땠나요? 자유롭게 기록해보세요 ✍️"
              rows={6}
              style={{width:'100%',border:'none',resize:'none',fontSize:14,color:C.text,lineHeight:1.7,outline:'none',background:'transparent',fontFamily:'inherit'}}
            />
          </div>
          <button onClick={saveMemo} disabled={saving||!content.trim()} style={{
            width:'100%',padding:'14px',borderRadius:14,border:'none',
            background:content.trim()?(saving?theme.mid:theme.primary):'#f3f4f6',
            color:content.trim()?'#fff':'#9ca3af',fontSize:15,fontWeight:700,cursor:content.trim()?'pointer':'default',marginBottom:10,
          }}>{saving?'저장 중...':'저장하기'}</button>
        </div>
      )}

      {viewMode==='list'&&(
        <div>
          {memos.length===0?(
            <div style={{background:C.card,borderRadius:16,padding:'40px',textAlign:'center',color:C.muted,border:`1.5px solid ${C.border}`}}>
              <div style={{fontSize:36,marginBottom:8}}>📔</div>
              <div style={{fontSize:14,fontWeight:600}}>아직 기록이 없어요</div>
            </div>
          ):memos.map(m=>(
            <div key={m.id} style={{background:C.card,borderRadius:16,padding:'16px',marginBottom:10,border:`1.5px solid ${C.border}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:18}}>{m.mood}</span>
                  <span style={{fontSize:13,fontWeight:700,color:C.text2}}>{dateLabel2(m.date)}</span>
                </div>
                <button onClick={()=>deleteMemo(m.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:14,padding:0,width:'auto',margin:0}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>✕</button>
              </div>
              <div style={{fontSize:13,color:C.text2,lineHeight:1.7,whiteSpace:'pre-wrap'}}>{m.content}</div>
              <button onClick={()=>{setSelectedDate(m.date);setViewMode('write');}} style={{marginTop:8,fontSize:11,color:theme.primary,background:'none',border:'none',cursor:'pointer',padding:0,fontWeight:600,width:'auto'}}>수정하기 →</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  {id:'m8', emoji:'💧', title:'물 마시기 챔피언', desc:'물 마시기 루틴을 30번 완료하세요', target:30, type:'water_count', reward:'수분 배지'},
];

function MissionPage({streak, lifeItems, foods, missionProgress}) {
  const theme = useTheme();
  const streakCount = (streak||{count:0}).count;

  function getProgress(m) {
    if(m.type==='streak') return Math.min(streakCount, m.target);
    if(m.type==='food_count') return Math.min(foods.length, m.target);
    if(m.type==='clean_count') return Math.min(missionProgress?.cleanCount||0, m.target);
    if(m.type==='water_count') return Math.min(missionProgress?.waterCount||0, m.target);
    return 0;
  }

  const growth = getCharacterGrowth(streakCount);
  const nextLevelDays = [3,7,14,30,30][growth.level-1]||30;
  const progressPct = Math.min(100, Math.round((streakCount % nextLevelDays) / nextLevelDays * 100));

  return (
    <div>
      <div style={{marginBottom:18}}>
        <div style={{fontSize:21,fontWeight:800,color:C.text,marginBottom:3}}>🎯 미션 &amp; 성장</div>
        <div style={{fontSize:13,color:C.muted}}>꾸준함이 나를 성장시켜요</div>
      </div>

      <div style={{background:`linear-gradient(135deg,${theme.primary},${theme.border})`,borderRadius:22,padding:'22px',marginBottom:18,color:'#fff',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',right:-20,top:-20,fontSize:100,opacity:0.08,lineHeight:1}}>🌟</div>
        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:14}}>
          <div style={{position:'relative'}}>
            <div style={{fontSize:56,lineHeight:1,fontFamily:"'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif"}}>🐻</div>
            <div style={{position:'absolute',bottom:-6,right:-8,fontSize:22,lineHeight:1}}>{growth.badge}</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,opacity:0.8,marginBottom:2}}>현재 레벨</div>
            <div style={{fontSize:22,fontWeight:800,marginBottom:2}}>{growth.badge} {growth.name}</div>
            <div style={{fontSize:12,opacity:0.8}}>{growth.desc}</div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:32,fontWeight:800}}>🔥{streakCount}</div>
            <div style={{fontSize:11,opacity:0.75}}>일 연속</div>
          </div>
        </div>
        <div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,opacity:0.85,marginBottom:4}}>
            <span>다음 레벨까지</span>
            <span>{streakCount % nextLevelDays}/{nextLevelDays}일</span>
          </div>
          <div style={{height:7,background:'rgba(255,255,255,0.25)',borderRadius:10,overflow:'hidden'}}>
            <div style={{width:`${progressPct}%`,height:'100%',background:'rgba(255,255,255,0.85)',borderRadius:10,transition:'width 0.6s'}}/>
          </div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,marginBottom:18}}>
        {[
          {level:1,name:'시작',badge:'🥚',color:'#9ca3af',bg:'#f9fafb'},
          {level:2,name:'새싹',badge:'🌱',color:'#16a34a',bg:'#f0fdf4'},
          {level:3,name:'노력가',badge:'⭐',color:'#2563eb',bg:'#eff6ff'},
          {level:4,name:'고수',badge:'💎',color:'#7c3aed',bg:'#f5f3ff'},
          {level:5,name:'전설',badge:'👑',color:'#f97316',bg:'#fff7ed'},
        ].map(l=>{
          const unlocked = growth.level >= l.level;
          return (
            <div key={l.level} style={{
              background:unlocked?l.bg:'#f9fafb',
              borderRadius:14,padding:'12px 8px',
              textAlign:'center',
              border:`1.5px solid ${unlocked?l.color+'44':'#e5e7eb'}`,
              opacity:unlocked?1:0.5,
              transition:'all 0.2s',
            }}>
              <div style={{fontSize:26,marginBottom:4,filter:unlocked?'none':'grayscale(1)'}}>{l.badge}</div>
              <div style={{fontSize:10,fontWeight:700,color:unlocked?l.color:'#9ca3af'}}>{l.name}</div>
            </div>
          );
        })}
      </div>

      <div style={{fontSize:15,fontWeight:800,color:C.text,marginBottom:12}}>🏆 미션</div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {MISSIONS.map(m=>{
          const prog = getProgress(m);
          const done = prog >= m.target;
          const pct = Math.round(prog/m.target*100);
          return (
            <div key={m.id} style={{
              background:done?'linear-gradient(135deg,#f0fdf4,#dcfce7)':C.card,
              borderRadius:16,padding:'15px 16px',
              border:`1.5px solid ${done?'#bbf7d0':C.border}`,
              transition:'all 0.2s',

              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                <div style={{width:44,height:44,borderRadius:14,background:done?'#f0fdf4':theme.light,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0,border:`1.5px solid ${done?'#bbf7d0':theme.mid}`}}>
                  {done?'✅':m.emoji}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:done?'#16a34a':C.text}}>{m.title}</div>
                  <div style={{fontSize:11,color:C.muted}}>{m.desc}</div>
                </div>
                {done&&<div style={{fontSize:11,fontWeight:700,color:'#16a34a',background:'#f0fdf4',padding:'3px 10px',borderRadius:20,border:'1px solid #bbf7d0',flexShrink:0}}>완료! 🎉</div>}
                {!done&&<div style={{fontSize:12,fontWeight:700,color:theme.primary,flexShrink:0}}>{prog}/{m.target}</div>}

              <div>

                </div>
                <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>

function getSituationalRecs(foods, lifeItems) {
  const recs = [];
  const now = new Date();
  const hour = now.getHours();
  const todayStr = getToday();
  const todayDay = now.getDay();

  const urgentFoods = foods.map(f=>({...f,dl:calcDaysLeft(f.expiryDate)})).filter(f=>f.dl>=0&&f.dl<=3).sort((a,b)=>a.dl-b.dl);
  if(urgentFoods.length>0) {
    const f = urgentFoods[0];
    recs.push({
      type:'food', emoji:f.emoji, title:`${f.name} 오늘 먹어요!`,
      desc:`D-${f.dl} · 빨리 드세요`, action:'food',
      bg:'#fff7ed', border:'#fed7aa', accent:'#ea580c'
    });
  }

  const overdueItems = lifeItems.filter(c=>c.section!=='루틴'&&c.lastDone&&daysSince(c.lastDone)>c.intervalDays&&!isDoneOn(c,todayStr))
    .sort((a,b)=>(daysSince(b.lastDone)-b.intervalDays)-(daysSince(a.lastDone)-a.intervalDays));
  if(overdueItems.length>0) {
    const c = overdueItems[0];
    recs.push({
      type:'life', emoji:c.emoji, title:`${c.text} 지금 하면 좋아요`,
      desc:`${daysSince(c.lastDone)-c.intervalDays}일 지남 · ${c.section}`,
      action:'life', bg:'#fefce8', border:'#fef08a', accent:'#ca8a04'
    });
  }

  const undoneRoutines = lifeItems.filter(c=>c.section==='루틴'&&isTodayItem(c)&&!isDoneOn(c,todayStr));
  if(undoneRoutines.length>0) {
    recs.push({
      type:'routine', emoji:'🌀', title:`오늘 루틴 ${undoneRoutines.length}개 남았어요`,
      desc:undoneRoutines.slice(0,2).map(c=>c.text).join(', ')+(undoneRoutines.length>2?` 외 ${undoneRoutines.length-2}개`:''),
      action:'life', bg:'#f5f3ff', border:'#ddd6fe', accent:'#7c3aed'
    });
  }

  if(hour>=6&&hour<9) recs.push({type:'time',emoji:'☀️',title:'아침 루틴 체크!',desc:'오늘 하루를 상쾌하게 시작해요',action:'life',bg:'#fefce8',border:'#fef08a',accent:'#ca8a04'});
  else if(hour>=12&&hour<14) recs.push({type:'time',emoji:'🌤️',title:'점심 후 환기 어때요?',desc:'식사 후 환기하면 기분이 좋아져요',action:'life',bg:'#ecfeff',border:'#a5f3fc',accent:'#0891b2'});
  else if(hour>=21) recs.push({type:'time',emoji:'🌙',title:'자기 전 마무리 루틴',desc:'내일을 위해 가볍게 정리해봐요',action:'life',bg:'#f5f3ff',border:'#ddd6fe',accent:'#7c3aed'});

  if(todayDay===0||todayDay===6) recs.push({type:'weekend',emoji:'🧹',title:'주말 청소 추천',desc:'주말에 청소하면 개운해요!',action:'life',bg:'#f0fdf4',border:'#bbf7d0',accent:'#16a34a'});

  const expiredFoods = foods.filter(f=>calcDaysLeft(f.expiryDate)<0);
  if(expiredFoods.length>0) recs.push({type:'expired',emoji:'⚠️',title:`기간 지난 식재료 ${expiredFoods.length}개`,desc:'냉장고를 정리해봐요',action:'food',bg:'#fef2f2',border:'#fecaca',accent:'#ef4444'});

  if(foods.length===0) recs.push({type:'empty',emoji:'🥕',title:'식재료를 등록해봐요',desc:'유통기한 알림을 받을 수 있어요',action:'food',bg:'#f0fdf4',border:'#bbf7d0',accent:'#16a34a'});
  if(lifeItems.length===0) recs.push({type:'empty_life',emoji:'🌀',title:'생활 관리 항목을 추가해봐요',desc:'루틴을 만들면 습관이 돼요',action:'life',bg:'#f5f3ff',border:'#ddd6fe',accent:'#7c3aed'});

  if(recs.length===0) recs.push({type:'cheer',emoji:'🎉',title:'오늘 정말 잘 하고 있어요!',desc:'모든 걸 챙겼어요 👍',bg:'#f0fdf4',border:'#bbf7d0',accent:'#16a34a'});

  return recs;
}

function OnboardingPage({onComplete}) {
  const [step, setStep] = React.useState(0);
  const [name, setName] = React.useState('');
  const [animal, setAnimal] = React.useState('🐻');
  const [period, setPeriod] = React.useState(null);
  const [themeId, setThemeId] = React.useState('purple');

  const theme = getTheme(themeId);

  const steps = [
    {title:'LifeFit에 오신 것을 환영해요 🏠', sub:'자취 생활을 더 똑똑하게 관리해요'},
    {title:'닉네임을 알려주세요 👋', sub:'나만의 공간을 만들어봐요'},
    {title:'캐릭터를 선택해요', sub:'나를 대표할 친구를 골라봐요'},
    {title:'자취 기간이 어떻게 되나요?', sub:'맞춤 추천을 드릴게요'},
    {title:'테마 색상을 고르세요 🎨', sub:'좋아하는 색으로 꾸며봐요'},

  function next() {

    else onComplete({name:name.trim()||'자취인', animal, period, themeId});

  return (
    <div style={{minHeight:'100vh',background:`linear-gradient(135deg,${theme.primary}11,${theme.bg})`,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:28,padding:'32px 28px',maxWidth:380,width:'100%',boxShadow:'0 24px 64px rgba(0,0,0,0.12)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>

            </div>
          </div>
        )}

        {step===1&&(
          <div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="예: 민지, 철수 ..." style={{...inp(),fontSize:18,padding:'14px 16px',textAlign:'center',fontWeight:700}} autoFocus onKeyDown={e=>e.key==='Enter'&&name.trim()&&next()}/>

            </div>

        )}

        {step===2&&(

            {ANIMALS.map(a=>(
              <button key={a} onClick={()=>setAnimal(a)} style={{width:52,height:52,borderRadius:14,fontSize:28,border:`2px solid ${animal===a?theme.primary:'#e5e7eb'}`,background:animal===a?theme.light:'#fff',cursor:'pointer',padding:0,margin:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif",transition:'all 0.15s'}}>{a}</button>

        </button>
      </div>
    </div>
  );
}

function AuthScreen({onAuth}) {
  const [mode, setMode] = React.useState('login');
  const [email, setEmail] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [name, setName] = React.useState('');
  const [err, setErr] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const theme = getTheme('purple');

  async function handleEmail() {
    if(!email||!pw) return setErr('이메일과 비밀번호를 입력해주세요');
    setLoading(true); setErr('');
    const fb = window._firebase;
    try {
      let result;
      if(mode==='signup') {
        result = await fb.createUserWithEmailAndPassword(fb.auth, email, pw);
        if(name) await fb.updateProfile(result.user, {displayName:name});
      } else {
        result = await fb.signInWithEmailAndPassword(fb.auth, email, pw);
      }
      onAuth(result.user);
    } catch(e) {
      const msgs={'auth/email-already-in-use':'이미 사용 중인 이메일이에요','auth/wrong-password':'비밀번호가 틀렸어요','auth/user-not-found':'가입되지 않은 이메일이에요','auth/weak-password':'비밀번호는 6자 이상이에요','auth/invalid-email':'올바른 이메일을 입력해주세요','auth/invalid-credential':'이메일 또는 비밀번호가 맞지 않아요'};
      setErr(msgs[e.code]||'오류가 발생했어요. 다시 시도해주세요');
    }
    setLoading(false);
  }

  async function handleGoogle() {
    setLoading(true); setErr('');
    const fb = window._firebase;
    try {
      const result = await fb.signInWithPopup(fb.auth, fb.googleProvider);
      onAuth(result.user);
    } catch(e) {
      if(e.code==='auth/popup-blocked'||e.code==='auth/popup-closed-by-user') {
        try { await fb.signInWithRedirect(fb.auth, fb.googleProvider); }
        catch(e2) { setErr('구글 로그인에 실패했어요. 팝업을 허용해주세요'); }
      } else setErr('구글 로그인에 실패했어요');
    }
    setLoading(false);
  }

  return (
    <div style={{minHeight:'100vh',background:`linear-gradient(135deg,${theme.primary}15,${theme.bg})`,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:28,padding:'32px 28px',maxWidth:380,width:'100%',boxShadow:'0 24px 64px rgba(0,0,0,0.12)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:10}}>🏠</div>
          <div style={{fontSize:22,fontWeight:900,color:theme.primary,marginBottom:4}}>LifeFit</div>
          <div style={{fontSize:13,color:'#9ca3af'}}>{mode==='login'?'로그인해서 시작해요':'계정을 만들어보세요'}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:11}}>
          {mode==='signup'&&(
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="닉네임 (선택)" style={inp({borderRadius:13,padding:'12px 14px'})}/>
          )}
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="이메일" style={inp({borderRadius:13,padding:'12px 14px'})} onKeyDown={e=>e.key==='Enter'&&handleEmail()}/>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="비밀번호" style={inp({borderRadius:13,padding:'12px 14px'})} onKeyDown={e=>e.key==='Enter'&&handleEmail()}/>
          {err&&<div style={{fontSize:12,color:'#ef4444',background:'#fef2f2',padding:'8px 12px',borderRadius:10,border:'1px solid #fecaca'}}>{err}</div>}
          <button onClick={handleEmail} disabled={loading} style={{width:'100%',padding:'14px',borderRadius:14,border:'none',background:loading?'#e5e7eb':theme.primary,color:loading?'#9ca3af':'#fff',fontSize:15,fontWeight:700,cursor:loading?'default':'pointer',margin:0,boxShadow:`0 6px 20px ${theme.primary}44`,transition:'all 0.2s'}}>
            {loading?'처리 중...':(mode==='login'?'로그인':'회원가입')}
          </button>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{flex:1,height:1,background:'#f3f4f6'}}/>
            <span style={{fontSize:11,color:'#9ca3af',fontWeight:600}}>또는</span>
            <div style={{flex:1,height:1,background:'#f3f4f6'}}/>
          </div>
          <button onClick={handleGoogle} disabled={loading} style={{width:'100%',padding:'13px',borderRadius:14,border:'1.5px solid #e5e7eb',background:'#fff',color:'#374151',fontSize:14,fontWeight:700,cursor:loading?'default':'pointer',margin:0,display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
            Google로 계속하기
          </button>
          <button onClick={()=>{setMode(mode==='login'?'signup':'login');setErr('');}} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:13,padding:'6px 0',width:'100%',margin:0,textDecoration:'underline'}}>
            {mode==='login'?'계정이 없나요? 회원가입':'이미 계정이 있나요? 로그인'}

        </div>
      </div>

  );
