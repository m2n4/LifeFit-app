function useLocalStorage(key, init) {
  const [val, setVal] = React.useState(() => {
    try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch { return init; }
  });
  React.useEffect(() => { try { localStorage.setItem(key,JSON.stringify(val)); } catch{} }, [key,val]);
  return [val, setVal];
}
function calcDaysLeft(d) {
  const t=new Date(); t.setHours(0,0,0,0);
  const e=new Date(d); e.setHours(0,0,0,0);
  return Math.ceil((e-t)/(864e5));
}
function getFoodStatus(dl) {
  if(dl<0)  return {label:'기간 초과',color:'#ef4444',bg:'#fef2f2',border:'#fecaca'};
  if(dl===0)return {label:'오늘 마감',color:'#ef4444',bg:'#fef2f2',border:'#fecaca'};
  if(dl<=3) return {label:`D-${dl}`,color:'#f97316',bg:'#fff7ed',border:'#fed7aa'};
  if(dl<=7) return {label:`D-${dl}`,color:'#eab308',bg:'#fefce8',border:'#fef08a'};
  return      {label:`D-${dl}`,color:'#22c55e',bg:'#f0fdf4',border:'#bbf7d0'};
}
function getToday() { return new Date().toISOString().split('T')[0]; }
function todayLabel() {
  const d=new Date(), days=['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}
function daysSince(s) {
  if(!s) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(s); d.setHours(0,0,0,0);
  return Math.floor((t-d)/(864e5));
}
function addDays(s,n) {
  const d=new Date(s); d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}

// REPEAT SYSTEM
// ============================================================
const REPEAT_TYPES=[
  {value:'daily',label:'매일'},
  {value:'weekdays',label:'평일마다'},
  {value:'weekend',label:'주말마다'},
  {value:'weekly',label:'매주 특정 요일'},
  {value:'interval',label:'N일마다'},
  {value:'monthly',label:'매월 특정 날'},
  {value:'none',label:'한 번만'},
];
const DAY_KR=['일','월','화','수','목','금','토'];

function getRepeatLabel(r) {
  if(!r) return '';
  if(r.freq==='daily')    return '매일';
  if(r.freq==='weekdays') return '평일 (월~금)';
  if(r.freq==='weekend')  return '주말 (토·일)';
  if(r.freq==='weekly')   return r.freqDays?.length?`매주 ${r.freqDays.map(d=>DAY_KR[d]).join('·')}요일`:'매주';
  if(r.freq==='interval') return r.intervalDays?`${r.intervalDays}일마다`:'N일마다';
  if(r.freq==='monthly')  return r.monthDay?`매월 ${r.monthDay}일`:'매월';
  return '한 번만';
}
function isTodayItem(r) {
  const today=new Date(); today.setHours(0,0,0,0);
  const d=today.getDay();
  if(r.freq==='daily')    return true;
  if(r.freq==='weekdays') return d>=1&&d<=5;
  if(r.freq==='weekend')  return d===0||d===6;
  if(r.freq==='weekly')   return (r.freqDays||[]).includes(d);
  if(r.freq==='interval') {
    if(!r.intervalDays) return false;
    // 마지막 완료일이 있으면 그 날 기준으로 다음 날짜 계산
    const base = r.doneDate ? new Date(r.doneDate) : (r.createdAt ? new Date(r.createdAt) : today);
    base.setHours(0,0,0,0);
    const diff = Math.floor((today-base)/864e5);
    if(diff<0) return false;
    // 완료한 당일은 표시 X (diff===0이면 오늘 이미 한 것)
    if(r.doneDate===getToday()) return false;
    return diff>=r.intervalDays;
  }
  if(r.freq==='monthly') {
    const targetDay = r.monthDay||1;
    if(today.getDate()!==targetDay) return false;
    // 이번 달에 이미 완료했으면 제외
    if(r.doneDate) {
      const done=new Date(r.doneDate); done.setHours(0,0,0,0);
      if(done.getFullYear()===today.getFullYear()&&done.getMonth()===today.getMonth()) return false;
    }
    return true;
  }
  return true;
}
function getNextItemDate(r) {
  const today=new Date(); today.setHours(0,0,0,0);
  const d=today.getDay();
  if(isTodayItem(r)) return null;
  if(r.freq==='weekdays') {
    const n=new Date(today);
    let add=1; while(true){const nd=new Date(today);nd.setDate(today.getDate()+add);if(nd.getDay()>=1&&nd.getDay()<=5){n.setDate(today.getDate()+add);break;}add++;}
    return n;
  }
  if(r.freq==='weekend') {
    const n=new Date(today); const rem=(6-d+7)%7||7; n.setDate(today.getDate()+rem); return n;
  }
  if(r.freq==='weekly'&&r.freqDays?.length) {
    let min=8;
    r.freqDays.forEach(fd=>{ let diff=fd-d; if(diff<=0)diff+=7; if(diff<min)min=diff; });
    const n=new Date(today); n.setDate(today.getDate()+min); return n;
  }
  if(r.freq==='interval'&&r.intervalDays) {
    // 마지막 완료일 기준
    const base = r.doneDate ? new Date(r.doneDate) : (r.createdAt ? new Date(r.createdAt) : today);
    base.setHours(0,0,0,0);
    const diff=Math.floor((today-base)/864e5);
    const rem=r.intervalDays-diff;
    const n=new Date(today); n.setDate(today.getDate()+(rem>0?rem:r.intervalDays)); return n;
  }
  if(r.freq==='monthly'&&r.monthDay) {
    const n=new Date(today); n.setDate(r.monthDay);
    if(n<=today) n.setMonth(n.getMonth()+1); return n;
  }
  return null;
}
function formatNextDate(nd) {
  if(!nd) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.ceil((nd-today)/864e5);
  if(diff===1) return '내일';
  if(diff===2) return '모레';
  if(diff<=7)  return `${diff}일 후`;
  return `${nd.getMonth()+1}/${nd.getDate()}`;
}

// 특정 날짜(Date 객체)에 해당 루틴이 있는지 확인
function isItemOnDate(r, date) {
  const d = date.getDay();
  const t = new Date(date); t.setHours(0,0,0,0);
  if(r.freq==='daily')    return true;
  if(r.freq==='weekdays') return d>=1&&d<=5;
  if(r.freq==='weekend')  return d===0||d===6;
  if(r.freq==='weekly')   return (r.freqDays||[]).includes(d);
  if(r.freq==='interval'&&r.intervalDays) {
    // 마지막 완료일 기준으로 계산
    const base = r.doneDate ? new Date(r.doneDate) : (r.createdAt ? new Date(r.createdAt) : t);
    base.setHours(0,0,0,0);
    const diff = Math.floor((t-base)/864e5);
    if(diff<0) return false;
    if(diff===0) return false; // 완료한 당일은 제외
    return diff>=r.intervalDays && diff%r.intervalDays===0;
  }
  if(r.freq==='monthly') return t.getDate()===(r.monthDay||1);
  return true;
}

// ─── 반응형 훅 ───
function useResponsive() {
  const [width, setWidth] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const fn = () => setWidth(window.innerWidth);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return { isMob: width < 768, isTablet: width >= 768 && width < 1024, isDesktop: width >= 1024, width };
}

function Btn({onClick,children,variant='primary',size='md',style:s={}}) {
  const theme=useTheme();
  const base={border:'none',borderRadius:12,fontWeight:700,cursor:'pointer',transition:'all 0.15s',margin:0};
  const vars={
    primary:{background:theme.primary,color:'#fff'},
    green:{background:'#16a34a',color:'#fff'},
    outline:{background:'#fff',color:theme.primary,border:`1.5px solid ${theme.mid}`},
    ghost:{background:'transparent',color:theme.primary,border:`2px dashed ${theme.border}`},
    danger:{background:'#fef2f2',color:'#ef4444',border:'1px solid #fecaca'},
  };
  const sizes={sm:{padding:'6px 12px',fontSize:12},md:{padding:'11px 18px',fontSize:14},lg:{padding:'14px',fontSize:14,width:'100%'}};
  return <button onClick={onClick} style={{...base,...vars[variant],...sizes[size],...s}}>{children}</button>;
}

function CircleGauge({pct,size=80,color='#7c3aed',label,sub}) {
  const r=(size-10)/2, circ=2*Math.PI*r, dash=circ*(pct/100);
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <div style={{position:'relative',width:size,height:size}}>
        <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f3f4f6" strokeWidth={8}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={8}
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            style={{transition:'stroke-dasharray 0.6s ease'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:size>70?15:12,fontWeight:800,color:'#1f2937'}}>{pct}%</span>
        </div>
      </div>
      {label&&<div style={{fontSize:12,fontWeight:700,color:'#374151'}}>{label}</div>}
      {sub&&<div style={{fontSize:11,color:'#9ca3af'}}>{sub}</div>}
    </div>
  );
}

function getGreeting() {
  const h = new Date().getHours();
  if(h < 6)  return {msg:'아직 늦은 시간이에요 🌙', sub:'충분한 휴식도 생활 관리예요'};
  if(h < 12) return {msg:'좋은 아침이에요 ☀️', sub:'오늘도 상쾌하게 시작해봐요'};
  if(h < 18) return {msg:'오후도 잘 보내고 있죠? 🌤️', sub:'오늘 할 일을 하나씩 정리해봐요'};
  if(h < 22) return {msg:'오늘 하루도 수고했어요 🌇', sub:'저녁 루틴을 챙겨봐요'};
  return {msg:'오늘도 고생했어요 🌙', sub:'내일을 위해 미리 준비해요'};
}

function HomePage({foods,lifeItems,streak,onNav,userName,onQuickAdd,onQuickCheck,widgets}) {
  const theme = useTheme();
  const todayDay = new Date().getDay();
  const greeting = getGreeting();
  const wList = widgets || DEFAULT_WIDGETS;
  const isOn = (id) => { const w = wList.find(w=>w.id===id); return w ? w.enabled : true; };

  // ── 우선순위 알림 생성 (최대 3개) ──
  const alerts = [];
  const urgentFoods = foods.map(f=>({...f,dl:calcDaysLeft(f.expiryDate)})).filter(f=>f.dl<=1&&f.dl>=0).sort((a,b)=>a.dl-b.dl);
  urgentFoods.slice(0,1).forEach(f=>alerts.push({
    id:`food-${f.id}`, emoji:f.emoji, level:'danger',
    title: f.dl===0?`${f.name} 오늘이 마감이에요`:`${f.name} 내일까지예요`,
    sub:`냉장고에서 먼저 꺼내요`, action:()=>onNav('food'),
    bg:'#fef2f2', border:'#fecaca', accent:'#ef4444', btnLabel:'확인'
  }));

  const overdue = lifeItems.filter(c=>c.section!=='루틴'&&c.lastDone&&daysSince(c.lastDone)>=c.intervalDays&&!c.done);
  overdue.slice(0,1).forEach(c=>alerts.push({
    id:`life-${c.id}`, emoji:c.emoji, level:'warn',
    title:`${c.text} 할 때가 됐어요`,
    sub:`${daysSince(c.lastDone)}일 전에 했어요 · ${c.intervalDays}일 주기`,
    action:()=>onNav('life'),
    bg:'#fefce8', border:'#fef08a', accent:'#ca8a04', btnLabel:'확인'
  }));

  const todayRoutines = lifeItems.filter(c=>c.section==='루틴'&&isTodayItem(c));
  const undoneRoutines = todayRoutines.filter(c=>!(c.done&&c.doneDate===today));
  if(undoneRoutines.length>0&&alerts.length<3) alerts.push({
    id:'routine', emoji:'🌀', level:'info',
    title:`오늘 루틴 ${undoneRoutines.length}개 남았어요`,
    sub:`${todayRoutines.length-undoneRoutines.length}/${todayRoutines.length} 완료`,
    action:()=>onNav('life'),
    bg:theme.bg, border:theme.mid, accent:theme.primary, btnLabel:'하러가기'
  });

  const allDone = alerts.length===0;

  // ── 임박 식재료 (D-5 이하) ──
  const urgentList = foods.map(f=>({...f,dl:calcDaysLeft(f.expiryDate)})).filter(f=>f.dl<=5&&f.dl>=0).sort((a,b)=>a.dl-b.dl).slice(0,4);

  // ── 생활 상태 요약 ──
  const today = getToday();
  const doneLife = lifeItems.filter(c=>c.section==='루틴'?(c.done&&c.doneDate===today):c.done).length;
  const totalLife = lifeItems.length;
  const lifePct = totalLife?Math.round(doneLife/totalLife*100):0;
  const streakCount = (streak||{count:0}).count;
  const urgentCount = foods.filter(f=>calcDaysLeft(f.expiryDate)<=3&&calcDaysLeft(f.expiryDate)>=0).length;

  // ── 상황별 추천 ──
  const situRecs = getSituationalRecs(foods, lifeItems).filter(r=>r.type!=='cheer').slice(0,2);

  return (
    <div style={{paddingBottom:80}}>

      {/* ① 환영 헤더 */}
      {isOn('greeting')&&<div style={{background:'linear-gradient(135deg,'+theme.primary+','+theme.border+')',borderRadius:24,padding:'22px 22px 18px',marginBottom:18,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',right:-10,top:-10,fontSize:80,opacity:0.08,lineHeight:1}}>🏠</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,0.75)',fontWeight:600,marginBottom:4}}>{todayLabel()}</div>
        <div style={{fontSize:20,fontWeight:800,color:'#fff',marginBottom:4}}>
          {userName?`${userName}님, ${greeting.msg}`:`${greeting.msg}`}
        </div>
        <div style={{fontSize:13,color:'rgba(255,255,255,0.8)'}}>{greeting.sub}</div>

        {/* 스트릭 */}
        {streakCount>0&&(
          <div style={{marginTop:14,display:'inline-flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.2)',borderRadius:20,padding:'5px 12px'}}>
            <span style={{fontSize:14}}>🔥</span>
            <span style={{fontSize:12,color:'#fff',fontWeight:700}}>{streakCount}일 연속 달성 중</span>
          </div>
        )}
      </div>}

      {/* ② 오늘 핵심 알림 */}
      {isOn('alerts')&&<div style={{marginBottom:18}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>

            {alerts.length>0&&<span style={{marginLeft:7,fontSize:11,fontWeight:700,color:'#fff',background:theme.primary,padding:'2px 8px',borderRadius:20}}>{alerts.length}</span>}
          </div>
        </div>

        {allDone?(
          <div style={{background:'linear-gradient(135deg,#f0fdf4,#dcfce7)',borderRadius:20,padding:'24px',textAlign:'center',border:'1.5px solid #bbf7d0'}}>

            <div style={{fontSize:16,fontWeight:800,color:'#16a34a',marginBottom:4}}>오늘 할 일 다 했어요!</div>
            <div style={{fontSize:13,color:'#4ade80'}}>정말 대단해요 {userName?`, ${userName}님`:''}! 💚</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {alerts.map(a=>(
              <div key={a.id} onClick={a.action} style={{background:a.bg,border:`1.5px solid ${a.border}`,borderRadius:18,padding:'15px 16px',display:'flex',alignItems:'center',gap:13,cursor:'pointer',transition:'transform 0.15s'}}

                onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>

                  <div style={{fontSize:14,fontWeight:700,color:a.accent}}>{a.title}</div>
                  <div style={{fontSize:11,color:'#9ca3af',marginTop:2}}>{a.sub}</div>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:a.accent,background:'rgba(255,255,255,0.8)',padding:'4px 10px',borderRadius:20,whiteSpace:'nowrap',flexShrink:0}}>{a.btnLabel} ›</span>
              </div>
            ))}
          </div>
        )}
      </div>}

      {/* ③ 생활 상태 요약 */}
      {isOn('stats')&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:18}}>

            <svg width={52} height={52} style={{transform:'rotate(-90deg)'}}>
              <circle cx={26} cy={26} r={20} fill="none" stroke="#f3f4f6" strokeWidth={6}/>
              <circle cx={26} cy={26} r={20} fill="none" stroke={theme.primary} strokeWidth={6}
                strokeDasharray={`${2*Math.PI*20*lifePct/100} ${2*Math.PI*20}`} strokeLinecap="round"
                style={{transition:'stroke-dasharray 0.6s ease'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#1f2937'}}>{lifePct}%</div>
          </div>
          <div style={{fontSize:11,color:'#9ca3af'}}>{doneLife}/{totalLife}</div>
        </div>
        <div style={{background:'#fff',borderRadius:16,padding:'14px 10px',textAlign:'center',border:'1.5px solid #f3f4f6',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontSize:11,color:'#9ca3af',marginBottom:6,fontWeight:600}}>연속 달성</div>
          <div style={{fontSize:30,marginBottom:2}}>🔥</div>
          <div style={{fontSize:20,fontWeight:800,color:'#ea580c',lineHeight:1}}>{streakCount}일</div>
        </div>
        <div style={{background:'#fff',borderRadius:16,padding:'14px 10px',textAlign:'center',border:`1.5px solid ${urgentCount>0?'#fecaca':'#f3f4f6'}`,cursor:'pointer'}} onClick={()=>onNav('food')}>
          <div style={{fontSize:11,color:'#9ca3af',marginBottom:6,fontWeight:600}}>유통 임박</div>
          <div style={{fontSize:30,marginBottom:2}}>🚨</div>
          <div style={{fontSize:20,fontWeight:800,color:urgentCount>0?'#ef4444':'#22c55e',lineHeight:1}}>{urgentCount}개</div>
        </div>
      </div>}

      {/* ④ 유통기한 임박 식재료 */}
      {urgentList.length>0&&(
        <div style={{background:'#fff',borderRadius:18,padding:'16px 18px',border:'1.5px solid #f3f4f6',marginBottom:18}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:700,color:'#1f2937'}}>🍱 먼저 먹어야 해요</div>
            <button onClick={()=>onNav('food')} style={{fontSize:12,color:theme.primary,background:'none',border:'none',cursor:'pointer',fontWeight:700,width:'auto',margin:0}}>전체 보기 →</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {urgentList.map(f=>{
              const s=getFoodStatus(f.dl);

                  <div style={{flex:1}}>

                  </div>

        </div>

          <div style={{display:'flex',flexDirection:'column',gap:8}}>

        <div style={{fontSize:14,fontWeight:700,color:'#1f2937',marginBottom:10}}>⚡ 빠른 실행</div>

            else onNav('life');
          }}/>
          <QuickActionBtn emoji="💧" label="물 마시기" onClick={()=>{
            const water=lifeItems.find(c=>(c.text.includes('물')&&c.section==='루틴')&&!c.done);

          }}/>

        </div>
      </div>}

      {/* ⑦ 이번 주 */}
      {isOn('weekly')&&<div style={{background:'#fff',borderRadius:18,padding:'16px 18px',border:'1.5px solid #f3f4f6'}}>
        <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:10}}>이번 주 달성 현황</div>
        <div style={{display:'flex',gap:5}}>
          {['일','월','화','수','목','금','토'].map((d,i)=>(

              {d}
              {i<todayDay&&<div style={{width:4,height:4,borderRadius:'50%',background:theme.primary,opacity:0.5}}/>}
            </div>
          ))}
        </div>
        <div style={{fontSize:11,color:'#9ca3af',marginTop:8,textAlign:'center'}}>연속 {streakCount}일째 생활 관리 중 🔥</div>
      </div>}
    </div>
  );
}

// 아이템 카드 — 개별 컴포넌트로 분리해서 훅 사용
function LifeItemCard({c, onToggle, onDelete, openEdit, updateStreak, lifeItems}) {
  const theme = useTheme();
  const [guideOpen, setGuideOpen] = React.useState(false);
  const sec = LIFE_SECTIONS[c.section] || LIFE_SECTIONS['루틴'];
  const isToday = isTodayItem(c);
  const isDoneToday = c.section === '루틴' ? (c.done && c.doneDate === getToday()) : c.done;
  const since = c.lastDone ? daysSince(c.lastDone) : null;
  const dLeft = c.section !== '루틴' && c.lastDone ? calcDaysLeft(addDays(c.lastDone, c.intervalDays)) : null;
  const isOverdue = dLeft !== null && dLeft < 0;
  const isSoon = dLeft !== null && dLeft >= 0 && dLeft <= 2;
  const progress = c.section !== '루틴' && since !== null ? Math.min(100, Math.round(since / c.intervalDays * 100)) : null;

  function StatusLabel() {
    if(c.section === '루틴') {
      const nd = !isToday ? getNextItemDate(c) : null;
      const nextLabel = nd ? formatNextDate(nd) : null;
      // done이 true라도 doneDate가 오늘이 아니면 미완료로 표시
      const isDoneToday = c.done && c.doneDate === getToday();
      if(isDoneToday) return <span style={{fontSize:11,fontWeight:700,color:'#16a34a',background:'#f0fdf4',padding:'2px 8px',borderRadius:20,border:'1px solid #bbf7d0'}}>✓ 완료</span>;
      if(isToday) return <span style={{fontSize:11,fontWeight:700,color:theme.primary,background:theme.light,padding:'2px 8px',borderRadius:20,border:'1px solid #ddd6fe'}}>오늘</span>;
      return <span style={{fontSize:11,color:'#9ca3af'}}>다음: {nextLabel || '-'}</span>;
    }
    if(c.done) return <span style={{fontSize:11,fontWeight:700,color:'#16a34a',background:'#f0fdf4',padding:'2px 8px',borderRadius:20,border:'1px solid #bbf7d0'}}>✓ 완료</span>;
    if(since === null) return <span style={{fontSize:11,color:'#9ca3af',background:'#f3f4f6',padding:'2px 8px',borderRadius:20}}>아직 안 함</span>;
    if(isOverdue) return <span style={{fontSize:11,fontWeight:700,color:'#ef4444',background:'#fef2f2',padding:'2px 8px',borderRadius:20,border:'1px solid #fecaca'}}>⚠️ {Math.abs(dLeft)}일 지남</span>;
    if(isSoon) return <span style={{fontSize:11,fontWeight:700,color:'#f97316',background:'#fff7ed',padding:'2px 8px',borderRadius:20,border:'1px solid #fed7aa'}}>슬슬 할 때</span>;
    return <span style={{fontSize:11,color:'#22c55e',background:'#f0fdf4',padding:'2px 8px',borderRadius:20,border:'1px solid #bbf7d0'}}>D+{since}/{c.intervalDays}일</span>;
  }

  return (
    <div style={{background:'#fff',borderRadius:14,border:`1.5px solid ${isOverdue?'#fecaca':'#f3f4f6'}`,overflow:'hidden'}}>
      <div style={{padding:'13px 15px'}}>
        <div style={{display:'flex',alignItems:'center',gap:11,opacity:(!isToday&&c.section==='루틴')?0.5:1}}>
          <div onClick={()=>{
            if(c.section==='루틴'&&!isToday) return;
            onToggle(c.id);
            if(c.section==='루틴') {
              const nd = lifeItems.filter(x=>x.section==='루틴'&&x.done&&x.doneDate===getToday()).length + (isDoneToday?-1:1);
              updateStreak && updateStreak(nd, lifeItems.filter(x=>x.section==='루틴').length);
            }
          }} style={{width:22,height:22,borderRadius:6,flexShrink:0,cursor:(c.section==='루틴'&&!isToday)?'default':'pointer',background:isDoneToday?sec.color:'transparent',border:`2px solid ${isDoneToday?sec.color:'#d1d5db'}`,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>
            {isDoneToday&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}
          </div>
          <span style={{fontSize:18,flexShrink:0}}>{c.emoji||'💧'}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,color:c.done?'#9ca3af':'#1f2937',textDecoration:c.done?'line-through':'none'}}>{c.text}</div>
            <div style={{fontSize:11,color:'#9ca3af',marginTop:2,display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
              <span style={{background:sec.bg,color:sec.color,padding:'1px 6px',borderRadius:20,border:`1px solid ${sec.border}`,fontWeight:600,fontSize:10}}>{sec.icon} {c.section}</span>
              {c.section==='루틴'?(
                <span style={{background:'#f3f4f6',padding:'1px 6px',borderRadius:20,fontSize:10}}>🔄 {getRepeatLabel(c)}</span>
              ):(
                <span style={{fontSize:10}}>⏱ {c.intervalDays}일 주기{since!==null?` · ${since}일 전`:''}</span>
              )}
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
            <StatusLabel/>
            <div style={{display:'flex',gap:4}}>
              {c.guide&&<button onClick={()=>setGuideOpen(!guideOpen)} style={{fontSize:10,color:theme.primary,background:'#f5f3ff',border:'1px solid #ddd6fe',borderRadius:7,padding:'2px 7px',cursor:'pointer',width:'auto',margin:0}}>{guideOpen?'접기':'방법'}</button>}
              <button onClick={()=>openEdit(c)} style={{background:'none',border:'none',cursor:'pointer',color:theme.border,fontSize:13,padding:0,width:'auto',margin:0}} onMouseEnter={e=>e.currentTarget.style.color=theme.primary} onMouseLeave={e=>e.currentTarget.style.color=theme.border}>✎</button>
              <button onClick={()=>onDelete(c.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:13,padding:0,width:'auto',margin:0}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>✕</button>
            </div>
          </div>
        </div>
        {guideOpen&&c.guide&&(
          <div style={{marginTop:10,padding:'10px 12px',background:'#f5f3ff',borderRadius:10,border:'1px solid #ede9fe',fontSize:12,color:'#6d28d9',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{c.guide}</div>
        )}
      </div>
      {progress!==null&&!c.done&&(
        <div style={{height:3,background:'#f3f4f6'}}>
          <div style={{height:'100%',width:`${progress}%`,background:isOverdue?'#ef4444':isSoon?'#f97316':'#22c55e',transition:'width 0.5s'}}/>
        </div>
      )}
    </div>
  );
}

function LifePage({lifeItems,onAdd,onToggle,onDelete,onEdit,streak,weeklyLog,updateStreak}) {
  const theme=useTheme();
  const [activeSection,setActiveSection]=React.useState('전체');
  const [filterDone,setFilterDone]=React.useState('전체');
  const [selectedDayIdx,setSelectedDayIdx]=React.useState(null);
  const [calView,setCalView]=React.useState('week'); // 'week' | 'month'
  const [calMonthOffset,setCalMonthOffset]=React.useState(0); // 0=이번달
  const [showAddModal,setShowAddModal]=React.useState(false);
  const [editTarget,setEditTarget]=React.useState(null);
  const [showPackModal,setShowPackModal]=React.useState(false);
  const emptyForm={text:'',emoji:'💧',section:'루틴',freq:'daily',freqDays:[],intervalDays:7,monthDay:1,guide:''};
  const [form,setForm]=React.useState(emptyForm);

  const todayStr=getToday();
  const todayDayIdx=new Date().getDay();

  // 이번 주 날짜
  const weekDates = ['일','월','화','수','목','금','토'].map((label,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(todayDayIdx-i)); d.setHours(0,0,0,0);
    return {label, idx:i, date:d, dateStr:d.toISOString().split('T')[0]};
  });

  const activeDayIdx = selectedDayIdx ?? todayDayIdx;
  const activeDayInfo = weekDates[activeDayIdx];
  const activeDateStr = activeDayInfo.dateStr;
  const isViewingToday = activeDateStr === todayStr;

  // 특정 날짜에 해당하는 루틴 (요일 클릭용)
  function getItemsForDay(dateInfo) {
    return lifeItems.filter(c => c.section==='루틴' && isItemOnDate(c, dateInfo.date));
  }

  // 달성률 계산
  const todayRoutines = lifeItems.filter(c=>c.section==='루틴'&&isTodayItem(c));
  const doneTodayCount = todayRoutines.filter(c=>c.done&&c.doneDate===todayStr).length;
  const doneLife = lifeItems.filter(c=>c.section==='루틴'?(c.done&&c.doneDate===todayStr):c.done).length;
  const total = lifeItems.length;
  const pct = total?Math.round(doneLife/total*100):0;

  const sectionStats=Object.keys(LIFE_SECTIONS).map(s=>({
    s,
    done:lifeItems.filter(c=>c.section===s&&(s==='루틴'?(c.done&&c.doneDate===todayStr):c.done)).length,
    total:lifeItems.filter(c=>c.section===s).length,
  }));

  // 오늘 목록 (isTodayItem으로 필터)
  const todayFiltered = lifeItems.filter(c=>{
    if(activeSection!=='전체'&&c.section!==activeSection) return false;
    if(c.section==='루틴' && !isTodayItem(c)) return false;
    const isDone = c.section==='루틴'?(c.done&&c.doneDate===todayStr):c.done;
    if(filterDone==='완료'&&!isDone) return false;
    if(filterDone==='미완료'&&isDone) return false;
    return true;
  }).sort((a,b)=>{
    const aOver=a.section!=='루틴'&&a.lastDone?daysSince(a.lastDone)>=a.intervalDays:false;
    const bOver=b.section!=='루틴'&&b.lastDone?daysSince(b.lastDone)>=b.intervalDays:false;
    if(aOver&&!bOver) return -1; if(!aOver&&bOver) return 1;
    const aD=a.section==='루틴'?(a.done&&a.doneDate===todayStr):a.done;
    const bD=b.section==='루틴'?(b.done&&b.doneDate===todayStr):b.done;
    return (aD?1:0)-(bD?1:0);
  });

  // 다가오는 루틴 (오늘 아닌 것들)
  const upcomingRoutines = lifeItems
    .filter(c=>c.section==='루틴'&&!isTodayItem(c))
    .map(c=>({...c, nextDate:getNextItemDate(c)}))
    .filter(c=>c.nextDate)
    .sort((a,b)=>a.nextDate-b.nextDate)
    .slice(0,6);

  // 선택된 요일의 루틴
  const selectedDayItems = isViewingToday ? null : getItemsForDay(activeDayInfo);

  // ── 월간 달력 데이터 ──
  function getMonthCalData() {
    const base = new Date();
    base.setDate(1);
    base.setMonth(base.getMonth()+calMonthOffset);
    const year=base.getFullYear(), month=base.getMonth();
    const firstDay=new Date(year,month,1).getDay();
    const lastDate=new Date(year,month+1,0).getDate();
    // 달성률: weeklyLog에서 해당 날짜 가져오기
    const days=[];
    for(let i=0;i<firstDay;i++) days.push(null);
    for(let d=1;d<=lastDate;d++){
      const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const pct=(weeklyLog||{})[dateStr]||0;
      const isToday=dateStr===todayStr;
      // 해당 날짜에 루틴이 있는지 확인
      const dateObj=new Date(year,month,d); dateObj.setHours(0,0,0,0);
      const hasRoutine=lifeItems.some(c=>c.section==='루틴'&&isItemOnDate(c,dateObj));
      days.push({d, dateStr, pct, isToday, hasRoutine});
    }
    return {days, year, month};
  }
  const calData = getMonthCalData();
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  function calDayBg(day) {
    if(!day) return 'transparent';
    if(day.isToday) return theme.primary;
    if(!day.hasRoutine) return '#f9fafb';
    if(day.pct===0) return '#f3f4f6';
    if(day.pct<40)  return '#fef3c7';
    if(day.pct<70)  return '#fde68a';
    if(day.pct<100) return theme.light;
    return theme.mid;
  }
  function calDayColor(day) {
    if(!day) return 'transparent';
    if(day.isToday) return '#fff';
    if(!day.hasRoutine) return '#d1d5db';
    if(day.pct===0) return '#9ca3af';
    if(day.pct<40)  return '#b45309';
    if(day.pct<70)  return '#92400e';
    if(day.pct<100) return theme.primary;
    return theme.primary;
  }

  function openAdd(section) {
    setEditTarget(null); setForm({...emptyForm,section:section||'루틴'}); setShowAddModal(true);
  }
  function openEdit(item) {
    setEditTarget(item);
    setForm({text:item.text,emoji:item.emoji||'💧',section:item.section||'루틴',freq:item.freq||'interval',freqDays:item.freqDays||[],intervalDays:item.intervalDays||7,monthDay:item.monthDay||1,guide:item.guide||''});
    setShowAddModal(true);
  }
  function submitForm() {
    if(!form.text.trim()) return;
    if(editTarget) onDelete(editTarget.id);
    onAdd({id:Date.now(),...form,done:false,lastDone:null,createdAt:editTarget?.createdAt||new Date().toISOString()});
    setShowAddModal(false);
  }

  return (
    <div>
      {/* 헤더 */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:18}}>
        <div><div style={{fontSize:21,fontWeight:800,color:'#1f2937',marginBottom:3}}>🌀 생활 관리</div><div style={{fontSize:13,color:'#9ca3af'}}>혼자 살면서 놓치기 쉬운 것들</div></div>
        <div style={{display:'flex',gap:7}}>
          <Btn variant="outline" size="sm" onClick={()=>setShowPackModal(true)}>✨ 추천</Btn>
          <Btn size="sm" onClick={()=>openAdd(activeSection==='전체'?'루틴':activeSection)}>+ 추가</Btn>
        </div>
      </div>

      {/* 달성률 */}
      <div style={{background:'linear-gradient(135deg,'+theme.primary+','+theme.border+')',borderRadius:18,padding:'17px 20px',marginBottom:14,color:'#fff'}}>
        <div style={{display:'flex',alignItems:'center',gap:18}}>
          <CircleGauge pct={pct} size={78} color="#fff"/>
          <div style={{flex:1}}>
            <div style={{fontSize:13,opacity:0.85,marginBottom:2}}>오늘 달성률</div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:5}}>{doneLife}/{total} 완료 {pct===100?'🎉':pct>=60?'💪':'🌱'}</div>
            <div style={{height:6,background:'rgba(255,255,255,0.25)',borderRadius:8,overflow:'hidden'}}>
              <div style={{width:`${pct}%`,height:'100%',background:'#fff',borderRadius:8,transition:'width 0.5s ease'}}/>
            </div>
          </div>
          <div style={{textAlign:'center',flexShrink:0}}>
            <div style={{fontSize:24,fontWeight:800}}>🔥{(streak||{count:0}).count}</div>
            <div style={{fontSize:10,opacity:0.8}}>연속</div>
          </div>
        </div>
      </div>

      {/* 달력 뷰 토글 */}
      <div style={{background:'#fff',borderRadius:14,padding:'13px 14px',border:'1.5px solid #f3f4f6',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{display:'flex',gap:6}}>
            <button onClick={()=>setCalView('week')} style={{padding:'5px 12px',borderRadius:20,border:'none',background:calView==='week'?theme.primary:'#f3f4f6',color:calView==='week'?'#fff':'#6b7280',fontSize:12,fontWeight:calView==='week'?700:500,cursor:'pointer',width:'auto',margin:0}}>주간</button>
            <button onClick={()=>setCalView('month')} style={{padding:'5px 12px',borderRadius:20,border:'none',background:calView==='month'?theme.primary:'#f3f4f6',color:calView==='month'?'#fff':'#6b7280',fontSize:12,fontWeight:calView==='month'?700:500,cursor:'pointer',width:'auto',margin:0}}>월간</button>
          </div>
          {calView==='month'&&(
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <button onClick={()=>setCalMonthOffset(p=>p-1)} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:16,padding:'0 4px',width:'auto',margin:0}}>‹</button>
              <span style={{fontSize:13,fontWeight:700,color:'#374151'}}>{calData.year}년 {monthNames[calData.month]}</span>
              <button onClick={()=>setCalMonthOffset(p=>Math.min(p+1,0))} style={{background:'none',border:'none',cursor:'pointer',color:calMonthOffset===0?'#d1d5db':'#9ca3af',fontSize:16,padding:'0 4px',width:'auto',margin:0}}>›</button>
            </div>
          )}
          {calView==='week'&&!isViewingToday&&(
            <button onClick={()=>setSelectedDayIdx(null)} style={{fontSize:11,color:theme.primary,background:'none',border:'none',cursor:'pointer',width:'auto',margin:0,fontWeight:600}}>← 오늘로</button>
          )}
        </div>

        {/* 주간 뷰 */}
        {calView==='week'&&(
          <>
            <div style={{display:'flex',gap:5}}>
              {weekDates.map((wd,i)=>{
                const isToday=wd.dateStr===todayStr;
                const isSelected=i===activeDayIdx;
                const achieved=(weeklyLog||{})[wd.dateStr]>=60;
                const dayItems=getItemsForDay(wd);
                return (
                  <button key={i} onClick={()=>setSelectedDayIdx(i===todayDayIdx?null:i)} style={{
                    flex:1,minHeight:44,borderRadius:10,display:'flex',flexDirection:'column',
                    alignItems:'center',justifyContent:'center',gap:2,
                    background:isSelected?theme.primary:achieved?theme.light:'#f9fafb',
                    color:isSelected?'#fff':achieved?theme.primary:'#9ca3af',
                    border:isSelected?'none':achieved?'1.5px solid '+theme.mid:'1px solid #f3f4f6',
                    cursor:'pointer',width:'auto',margin:0,transition:'all 0.15s',padding:'6px 2px',
                  }}>
                    <span style={{fontSize:10,fontWeight:700}}>{wd.label}</span>
                    <span style={{fontSize:13,fontWeight:800}}>{wd.date.getDate()}</span>
                    {dayItems.length>0&&(
                      <div style={{display:'flex',gap:1}}>
                        {dayItems.slice(0,3).map((_,j)=>(
                          <div key={j} style={{width:3,height:3,borderRadius:'50%',background:isSelected?'rgba(255,255,255,0.7)':theme.border}}/>
                        ))}
                      </div>
                    )}
                  </button>
                );
              })}
            </div>

            {/* 선택된 날 루틴 */}
            {!isViewingToday&&selectedDayItems&&(
              <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid #f3f4f6'}}>
                <div style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:8}}>
                  📅 {activeDayInfo.label}요일 ({activeDayInfo.date.getMonth()+1}/{activeDayInfo.date.getDate()}) 루틴
                  <span style={{marginLeft:6,fontSize:11,color:theme.primary,fontWeight:600}}>{selectedDayItems.length}개</span>
                </div>
                {selectedDayItems.length===0?(
                  <div style={{fontSize:12,color:'#9ca3af',textAlign:'center',padding:'8px 0'}}>이 날은 예정된 루틴이 없어요</div>
                ):(
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {selectedDayItems.map(c=>(
                      <div key={c.id} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:10,background:theme.bg,border:'1px solid '+theme.mid}}>
                        <span style={{fontSize:16}}>{c.emoji||'💧'}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:'#1f2937'}}>{c.text}</div>
                          <div style={{fontSize:10,color:'#9ca3af',marginTop:1}}>🔄 {getRepeatLabel(c)}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </>
        )}

        {/* 월간 달력 뷰 */}
        {calView==='month'&&(
          <div>
            {/* 요일 헤더 */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
              {['일','월','화','수','목','금','토'].map((d,i)=>(
                <div key={i} style={{textAlign:'center',fontSize:10,fontWeight:700,color:i===0?'#ef4444':i===6?'#3b82f6':'#9ca3af',padding:'3px 0'}}>{d}</div>
              ))}
            </div>
            {/* 날짜 그리드 */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
              {calData.days.map((day,idx)=>(
                <div key={idx} style={{
                  aspectRatio:'1',display:'flex',flexDirection:'column',alignItems:'center',
                  justifyContent:'center',borderRadius:8,
                  background:calDayBg(day),
                  color:calDayColor(day),
                  fontSize:11,fontWeight:day?.isToday?800:600,
                  border:day?.isToday?'2px solid '+theme.primary:'none',
                  position:'relative',
                }}>
                  {day&&<span>{day.d}</span>}
                  {day&&day.pct>=100&&<span style={{fontSize:7,lineHeight:1}}>✓</span>}
                </div>
              ))}
            </div>
            {/* 범례 */}
            <div style={{display:'flex',gap:10,marginTop:10,flexWrap:'wrap',alignItems:'center'}}>
              <span style={{fontSize:10,color:'#9ca3af',fontWeight:600}}>달성률</span>
              {[{bg:'#f3f4f6',label:'0%'},{bg:'#fef3c7',label:'~40%'},{bg:'#fde68a',label:'~70%'},{bg:theme.light,label:'~99%'},{bg:theme.mid,label:'100%'}].map(s=>(
                <div key={s.label} style={{display:'flex',alignItems:'center',gap:3}}>
                  <div style={{width:10,height:10,borderRadius:3,background:s.bg,border:'1px solid #e5e7eb'}}/>
                  <span style={{fontSize:10,color:'#9ca3af'}}>{s.label}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* 섹션 탭 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7,marginBottom:12}}>
        <button onClick={()=>setActiveSection('전체')} style={{padding:'10px 5px',borderRadius:12,border:'1.5px solid '+(activeSection==='전체'?theme.primary:'#e5e7eb'),background:activeSection==='전체'?theme.light:'#fff',cursor:'pointer',width:'auto',margin:0,textAlign:'center'}}>
          <div style={{fontSize:14,marginBottom:2}}>📋</div>
          <div style={{fontSize:11,fontWeight:700,color:activeSection==='전체'?theme.primary:'#374151'}}>전체</div>
          <div style={{fontSize:10,color:'#9ca3af'}}>{doneLife}/{total}</div>
        </button>
        {sectionStats.map(({s,done:d,total:t})=>{
          const sec=LIFE_SECTIONS[s]; const isA=activeSection===s;
          return <button key={s} onClick={()=>setActiveSection(s)} style={{padding:'10px 5px',borderRadius:12,border:'1.5px solid '+(isA?sec.color:sec.border),background:isA?sec.bg:'#fff',cursor:'pointer',width:'auto',margin:0,textAlign:'center',transition:'all 0.15s'}}>
            <div style={{fontSize:14,marginBottom:2}}>{sec.icon}</div>
            <div style={{fontSize:10,fontWeight:700,color:isA?sec.color:'#374151',lineHeight:1.2}}>{sec.label}</div>
            <div style={{fontSize:10,color:'#9ca3af',marginTop:1}}>{d}/{t}</div>
          </button>;
        })}
      </div>

      {/* 필터 */}
      <div style={{display:'flex',gap:6,marginBottom:12,justifyContent:'flex-end'}}>
        {['전체','미완료','완료'].map(s=>(
          <button key={s} onClick={()=>setFilterDone(s)} style={{padding:'5px 11px',borderRadius:20,border:'1.5px solid '+(filterDone===s?theme.primary:'#e5e7eb'),background:filterDone===s?theme.light:'#fff',color:filterDone===s?theme.primary:'#6b7280',fontSize:12,fontWeight:filterDone===s?700:400,cursor:'pointer',width:'auto',margin:0}}>{s}</button>
        ))}
      </div>

      {/* 오늘 할 일 */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:9}}>
          오늘 할 일
          <span style={{marginLeft:6,fontSize:11,color:'#9ca3af',fontWeight:400}}>({doneTodayCount}/{todayRoutines.length} 완료)</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {todayFiltered.length===0?(
            <div style={{background:'#fff',borderRadius:16,padding:'24px',textAlign:'center',color:'#9ca3af',fontSize:13,border:'1.5px solid #f3f4f6'}}>
              <div style={{fontSize:28,marginBottom:6}}>{filterDone==='완료'?'🎉':'✨'}</div>
              {filterDone==='완료'?'완료한 항목이 없어요':filterDone==='미완료'?'오늘 할 일을 다 했어요! 🎉':'"추천" 버튼으로 시작해보세요!'}
            </div>
          ):todayFiltered.map(c=>(
            <LifeItemCard key={c.id} c={c} onToggle={onToggle} onDelete={onDelete} openEdit={openEdit} updateStreak={updateStreak} lifeItems={lifeItems}/>
          ))}
        </div>
      </div>

      {/* 다가오는 루틴 */}
      {upcomingRoutines.length>0&&(activeSection==='전체'||activeSection==='루틴')&&filterDone==='전체'&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:9}}>다가오는 루틴</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {upcomingRoutines.map(c=>(
              <div key={c.id} style={{background:'#fff',borderRadius:13,padding:'12px 14px',border:'1.5px solid #f3f4f6',display:'flex',alignItems:'center',gap:10,opacity:0.7}}>
                <span style={{fontSize:18}}>{c.emoji||'💧'}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:'#374151'}}>{c.text}</div>
                  <div style={{fontSize:10,color:'#9ca3af',marginTop:1}}>🔄 {getRepeatLabel(c)}</div>
                </div>
                <div style={{fontSize:11,fontWeight:700,color:theme.primary,background:theme.bg,padding:'3px 9px',borderRadius:20,border:'1px solid '+theme.mid,whiteSpace:'nowrap',flexShrink:0}}>
                  {formatNextDate(c.nextDate)}
                </div>
                <div style={{display:'flex',gap:4}}>
                  <button onClick={()=>openEdit(c)} style={{background:'none',border:'none',cursor:'pointer',color:theme.border,fontSize:13,padding:0,width:'auto',margin:0}} onMouseEnter={e=>e.currentTarget.style.color=theme.primary} onMouseLeave={e=>e.currentTarget.style.color=theme.border}>✎</button>
                  <button onClick={()=>onDelete(c.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:13,padding:0,width:'auto',margin:0}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 추가 모달 */}
      {showAddModal&&(
        <Modal title={editTarget?'항목 수정':'+ 생활 관리 추가'} sub="루틴·생활·청소를 주기로 관리해요" onClose={()=>setShowAddModal(false)} maxWidth={440}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'grid',gridTemplateColumns:'50px 1fr',gap:7}}>
              <div><div style={{fontSize:11,color:'#9ca3af',marginBottom:3}}>이모지</div><input placeholder="💧" value={form.emoji} onChange={e=>setForm(p=>({...p,emoji:e.target.value}))} maxLength={2} style={inp({textAlign:'center',fontSize:20})}/></div>
              <div><div style={{fontSize:11,color:'#9ca3af',marginBottom:3}}>내용 *</div><input placeholder="예: 빨래 돌리기" value={form.text} onChange={e=>setForm(p=>({...p,text:e.target.value}))} style={inp()} autoFocus/></div>
            </div>
            <div>
              <div style={{fontSize:11,color:'#9ca3af',marginBottom:5}}>종류</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
                {Object.entries(LIFE_SECTIONS).map(([s,sec])=>(
                  <button key={s} onClick={()=>setForm(p=>({...p,section:s,freq:s==='루틴'?'daily':'interval'}))} style={{padding:'10px 5px',borderRadius:11,border:`1.5px solid ${form.section===s?sec.color:sec.border}`,background:form.section===s?sec.bg:'#fff',cursor:'pointer',width:'auto',margin:0,textAlign:'center'}}>
                    <div style={{fontSize:16,marginBottom:2}}>{sec.icon}</div>
                    <div style={{fontSize:11,fontWeight:700,color:form.section===s?sec.color:'#374151'}}>{sec.label}</div>
                  </button>
                ))}
              </div>
            </div>
            <div style={{background:'#f9fafb',borderRadius:12,padding:'13px',border:'1px solid #f3f4f6'}}>
              {form.section==='루틴'?(
                <RepeatPicker form={form} setForm={setForm}/>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <div style={{fontSize:11,color:'#9ca3af',fontWeight:600}}>반복 주기</div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:12,color:'#9ca3af',whiteSpace:'nowrap'}}>매</span>
                    <input type="number" min={1} max={365} value={form.intervalDays||7} onChange={e=>setForm(p=>({...p,intervalDays:Number(e.target.value)}))} style={inp({width:80,textAlign:'center'})}/>
                    <span style={{fontSize:12,color:'#9ca3af',whiteSpace:'nowrap'}}>일마다</span>
                  </div>
                  <div style={{fontSize:11,color:'#7c3aed',background:'#f5f3ff',padding:'6px 10px',borderRadius:8,fontWeight:600}}>⏱ {form.intervalDays||7}일마다 한 번</div>
                </div>
              )}
            </div>
            {(form.section==='청소'||form.section==='생활')&&(
              <div><div style={{fontSize:11,color:'#9ca3af',marginBottom:3}}>메모 (선택)</div>
                <textarea placeholder="나중에 볼 수 있는 메모" value={form.guide||''} onChange={e=>setForm(p=>({...p,guide:e.target.value}))} rows={2} style={inp({resize:'none',lineHeight:1.5})}/>
              </div>
            )}
            <div style={{display:'flex',gap:8,marginTop:2}}>
              <Btn onClick={submitForm} style={{flex:1}}>{editTarget?'수정하기':'추가하기'}</Btn>
              <Btn onClick={()=>setShowAddModal(false)} variant="outline" style={{flex:1}}>취소</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* 추천 팩 모달 */}
      {showPackModal&&(
        <Modal title="✨ 추천 생활 관리" sub="자취 생활에 맞는 항목을 추가해보세요" onClose={()=>setShowPackModal(false)} maxWidth={440}>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {Object.entries(ONBOARDING_PRESETS).map(([label,items])=>(
              <div key={label} style={{background:'#f9fafb',borderRadius:14,padding:'14px 16px',border:'1.5px solid #f3f4f6'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <div style={{fontSize:14,fontWeight:700,color:'#1f2937'}}>{label}</div>
                  <Btn size="sm" onClick={()=>{items.forEach(item=>{if(!lifeItems.some(c=>c.text===item.text))onAdd({id:Date.now()+Math.random(),...item,done:false,lastDone:null,freqDays:[],createdAt:new Date().toISOString()});});setShowPackModal(false);}}>전체 추가</Btn>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:5}}>
                  {items.map((item,idx)=>{

                    </div>;
                  })}
                </div>
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

function useFirebase() {
  const [fb, setFb] = React.useState(window._firebase || null);
  React.useEffect(() => {
    if(window._firebaseReady) { setFb(window._firebase); return; }
    const handler = () => setFb(window._firebase);
    window.addEventListener('firebaseReady', handler);
    return () => window.removeEventListener('firebaseReady', handler);
  }, []);
  return fb;
}

function AuthScreen({mode, onSuccess, onBack}) {
  const fb = useFirebase();
  const [isLogin, setIsLogin] = React.useState(mode === 'login');
  const [email, setEmail] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [name, setName] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');

  async function handleEmail(e) {
    e.preventDefault();
    if(!fb) return;
    setLoading(true); setError('');
    try {
      let cred;
      if(isLogin) {
        cred = await fb.signInWithEmailAndPassword(fb.auth, email, pw);
      } else {
        cred = await fb.createUserWithEmailAndPassword(fb.auth, email, pw);
        if(name.trim()) await fb.updateProfile(cred.user, {displayName: name.trim()});
      }
      onSuccess(cred.user);
    } catch(err) {
      const msgs = {
        'auth/user-not-found':'등록된 이메일이 없어요',
        'auth/wrong-password':'비밀번호가 틀렸어요',
        'auth/email-already-in-use':'이미 사용 중인 이메일이에요',
        'auth/weak-password':'비밀번호는 6자 이상이어야 해요',
        'auth/invalid-email':'이메일 형식이 올바르지 않아요',
        'auth/invalid-credential':'이메일 또는 비밀번호가 틀렸어요',
      };
      setError(msgs[err.code] || '오류가 발생했어요. 다시 시도해주세요.');
    }
    setLoading(false);
  }

  async function handleGoogle() {
    if(!fb) return;
    setLoading(true); setError('');
    try {
      const cred = await fb.signInWithPopup(fb.auth, fb.googleProvider);
      onSuccess(cred.user);
    } catch(err) {
      setError('구글 로그인에 실패했어요.');
    }
    setLoading(false);
  }

  const inputStyle = {width:'100%',padding:'13px 16px',border:'1.5px solid #e5e7eb',borderRadius:14,fontSize:14,outline:'none',background:'#fafafa',boxSizing:'border-box',transition:'border-color 0.15s'};

  return (
    <div className="fade-in" style={{minHeight:'100vh',background:'linear-gradient(160deg,#f5f3ff,#ede9fe)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:28,padding:'32px 28px',width:'100%',maxWidth:380,boxShadow:'0 24px 64px rgba(124,58,237,0.15)'}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:13,padding:0,marginBottom:20,display:'flex',alignItems:'center',gap:5,width:'auto'}}>
          ← 뒤로
        </button>
        <div style={{fontSize:26,marginBottom:6}}>🏠</div>
        <div style={{fontSize:20,fontWeight:800,color:'#1f2937',marginBottom:4}}>
          {isLogin ? '다시 만나서 반가워요!' : '함께 시작해요!'}
        </div>
        <div style={{fontSize:13,color:'#9ca3af',marginBottom:24}}>
          {isLogin ? '로그인하고 생활 관리를 계속해요' : '무료로 시작하고 모든 기기에서 동기화해요'}
        </div>

        {/* 구글 로그인 */}
        <button onClick={handleGoogle} disabled={loading} style={{width:'100%',padding:'13px',borderRadius:14,border:'1.5px solid #e5e7eb',background:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:16,color:'#374151'}}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.5 30.1 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6c1.8-5.4 6.8-9.8 13.6-9.8z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/><path fill="#34A853" d="M24 48c6.1 0 11.2-2 14.9-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.4 2.2-6.7 0-12.4-4.5-14.4-10.6l-7.8 6C6.5 42.5 14.6 48 24 48z"/></svg>
          Google로 {isLogin?'로그인':'시작하기'}
        </button>

        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
          <div style={{flex:1,height:1,background:'#f3f4f6'}}/>

        </div>

        <form onSubmit={handleEmail} style={{display:'flex',flexDirection:'column',gap:10}}>
          {!isLogin&&(
            <input placeholder="이름 (닉네임 가능)" value={name} onChange={e=>setName(e.target.value)} style={inputStyle}
              onFocus={e=>e.target.style.borderColor='#7c3aed'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
          )}
          <input type="email" placeholder="이메일" value={email} onChange={e=>setEmail(e.target.value)} required style={inputStyle}
            onFocus={e=>e.target.style.borderColor='#7c3aed'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
          <input type="password" placeholder="비밀번호 (6자 이상)" value={pw} onChange={e=>setPw(e.target.value)} required style={inputStyle}
            onFocus={e=>e.target.style.borderColor='#7c3aed'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
          {error&&<div style={{fontSize:12,color:'#ef4444',background:'#fef2f2',padding:'9px 12px',borderRadius:10,border:'1px solid #fecaca'}}>{error}</div>}
          <button type="submit" disabled={loading} style={{width:'100%',padding:'14px',borderRadius:14,border:'none',background:loading?'#a78bfa':'#7c3aed',color:'#fff',fontSize:15,fontWeight:700,cursor:loading?'default':'pointer',marginTop:4}}>
            {loading?'처리 중...': isLogin?'로그인':'가입하기'}
          </button>
        </form>

        <button onClick={()=>{setIsLogin(!isLogin);setError('');}} style={{width:'100%',marginTop:14,padding:'10px',borderRadius:12,border:'none',background:'transparent',color:'#7c3aed',fontSize:13,cursor:'pointer',fontWeight:600}}>
          {isLogin?'계정이 없어요 → 회원가입':'이미 계정이 있어요 → 로그인'}
        </button>
      </div>
    </div>
  );
}

// 상황별 추천 로직
function getSituationalRecs(foods, lifeItems) {
  const recs = [];
  const urgentFoods = foods.filter(f=>calcDaysLeft(f.expiryDate)<=3 && calcDaysLeft(f.expiryDate)>=0);
  const overdueCleaning = lifeItems.filter(c=>c.section==='청소'&&c.lastDone&&daysSince(c.lastDone)>=c.intervalDays);
  const overdueLaundry = lifeItems.find(c=>c.text.includes('빨래')&&c.lastDone&&daysSince(c.lastDone)>=5);
  const lowRoutine = lifeItems.filter(c=>c.section==='루틴'&&!c.done).length > lifeItems.filter(c=>c.section==='루틴').length * 0.6;

  if(urgentFoods.length >= 2) recs.push({emoji:'🍳', title:'재료가 남아있어요!', desc:`${urgentFoods[0]?.name} 등 ${urgentFoods.length}개 재료로 요리해봐요`, appId:3, type:'app'});
  if(overdueLaundry) recs.push({emoji:'🧺', title:'빨래 미룬 지 좀 됐어요', desc:'세탁 팁과 냄새 제거법을 확인해봐요', siteId:1, type:'tip', tipId:'laundry'});
  if(overdueCleaning.length >= 2) recs.push({emoji:'🧹', title:'청소 주기가 지났어요', desc:'5분 청소법으로 빠르게 정리해봐요', appId:10, type:'app'});
  if(lowRoutine) recs.push({emoji:'🌿', title:'루틴을 조금 놓쳤어요', desc:'집중력 회복에 Forest 앱을 써봐요', appId:5, type:'app'});
  if(recs.length === 0) recs.push({emoji:'✨', title:'생활 잘 유지하고 있어요!', desc:'오늘도 좋은 하루 보내세요 💜', type:'cheer'});
  return recs;
}

function SettingsPage({user, fb, userName, setUserName, animal, setAnimal, themeId, setThemeId, widgets, onSaveWidgets}) {
  const theme=useTheme();

  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [localWidgets, setLocalWidgets] = React.useState(widgets || DEFAULT_WIDGETS);
  React.useEffect(()=>{ setLocalWidgets(widgets||DEFAULT_WIDGETS); },[widgets]);

  async function saveProfile() {
    if(!fb||!user) return;
    setSaving(true);
    try {
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid), {
        name: editName.trim(),
        animal,
        themeId,
        widgets: localWidgets,
      });
      if(onSaveWidgets) onSaveWidgets(localWidgets);
      if(editName.trim()) await fb.updateProfile(user, {displayName: editName.trim()});
      setUserName(editName.trim());
      setSaved(true);
      setTimeout(()=>setSaved(false), 2000);
    } catch(e) { console.error(e); }
    setSaving(false);

        width:'100%',padding:'15px',borderRadius:16,border:'none',
        background:saved?'#16a34a':saving?theme.mid:theme.primary,
        color:'#fff',fontSize:15,fontWeight:700,cursor:saving?'default':'pointer',
        transition:'all 0.3s',marginBottom:10,
      }}>
        {saved?'✓ 저장됐어요!':saving?'저장 중...':'변경사항 저장'}
      </button>
    </div>
  );
}

// ONBOARDING
// ============================================================
function Onboarding({userName, onComplete}) {
  const [step, setStep] = React.useState(0);
  const [lifeChoice, setLifeChoice] = React.useState(null);
  const [selectedAnimal, setSelectedAnimal] = React.useState('🐻');
  const [selectedTheme, setSelectedTheme] = React.useState('purple');

  const TOTAL_STEPS = 3;
  const theme = getTheme(selectedTheme);

  const cardStyle = {background:'#fff',borderRadius:28,padding:'30px 26px',width:'100%',maxWidth:420,boxShadow:'0 24px 64px rgba(0,0,0,0.12)'};
  const bgStyle = {minHeight:'100vh',background:'linear-gradient('+theme.grad+')',display:'flex',alignItems:'center',justifyContent:'center',padding:20,transition:'background 0.4s'};
  const nextBtn = (onClick, disabled, label='다음 →') => (
    <button onClick={onClick} disabled={disabled} style={{width:'100%',padding:'14px',borderRadius:16,border:'none',background:disabled?'#e5e7eb':theme.primary,color:disabled?'#9ca3af':'#fff',fontSize:15,fontWeight:700,cursor:disabled?'default':'pointer',transition:'all 0.2s',marginTop:6}}>
      {label}
    </button>
  );

  // Step 0: 웰컴
  if(step === 0) return (
    <div className="fade-in" style={bgStyle}>
      <div style={{...cardStyle,textAlign:'center'}}>
        <div style={{fontSize:52,marginBottom:12}}>{selectedAnimal}</div>
        <div style={{fontSize:21,fontWeight:800,color:'#1f2937',marginBottom:6}}>
          {userName ? `${userName}님, 반가워요!` : '어서 오세요!'}
        </div>
        <div style={{fontSize:13,color:'#9ca3af',marginBottom:28,lineHeight:1.7}}>
          딱 3단계만 설정하면<br/>나만의 생활 관리가 시작돼요
        </div>
        <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:24}}>
          {[0,1,2].map(i=><div key={i} style={{width:i===step?24:8,height:8,borderRadius:8,background:i===step?theme.primary:theme.mid,transition:'all 0.3s'}}/>)}
        </div>
        <button onClick={()=>setStep(1)} style={{width:'100%',padding:'15px',borderRadius:16,border:'none',background:theme.primary,color:'#fff',fontSize:16,fontWeight:700,cursor:'pointer'}}>
          시작하기 →
        </button>
      </div>
    </div>
  );

  // Step 1: 테마 색상 + 동물 선택
  if(step === 1) return (
    <div className="fade-in" style={bgStyle}>
      <div style={cardStyle}>
        <div style={{display:'flex',gap:6,marginBottom:18}}>
          {[0,1,2].map(i=><div key={i} style={{width:i===1?24:8,height:8,borderRadius:8,background:i===1?theme.primary:theme.mid,transition:'all 0.3s'}}/>)}
        </div>
        <div style={{fontSize:11,color:theme.border,fontWeight:700,marginBottom:5}}>STEP 1 / 3</div>
        <div style={{fontSize:19,fontWeight:800,color:'#1f2937',marginBottom:3}}>나만의 스타일을 골라요</div>
        <div style={{fontSize:13,color:'#9ca3af',marginBottom:18}}>앱의 색상과 캐릭터를 선택해요</div>

        {/* 테마 색상 */}
        <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:10}}>🎨 메인 색상</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,marginBottom:20}}>
          {THEMES.map(t=>(
            <button key={t.id} onClick={()=>setSelectedTheme(t.id)} style={{
              width:'100%',aspectRatio:'1',borderRadius:12,border:`3px solid ${selectedTheme===t.id?t.primary:'transparent'}`,
              background:t.primary,cursor:'pointer',margin:0,
              boxShadow:selectedTheme===t.id?`0 0 0 2px #fff, 0 0 0 4px ${t.primary}`:'none',
              transition:'all 0.15s',position:'relative',
            }}>
              {selectedTheme===t.id&&<span style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',fontWeight:800}}>✓</span>}
            </button>
          ))}
        </div>
        <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:10}}>
          🐾 나의 캐릭터 <span style={{fontSize:11,color:'#9ca3af',fontWeight:400}}>— 사이드바에 표시돼요</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(8,1fr)',gap:6,marginBottom:20}}>
          {ANIMALS.map(a=>(
            <button key={a} onClick={()=>setSelectedAnimal(a)} style={{
              width:'100%',aspectRatio:'1',borderRadius:10,fontSize:20,
              border:`2px solid ${selectedAnimal===a?theme.primary:'#f3f4f6'}`,
              background:selectedAnimal===a?theme.light:'#fff',
              cursor:'pointer',margin:0,display:'flex',alignItems:'center',justifyContent:'center',
              transition:'all 0.15s',
            }}>{a}</button>
          ))}

        <div style={{background:theme.bg,borderRadius:14,padding:'12px 14px',border:`1.5px solid ${theme.mid}`,marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:24}}>{selectedAnimal}</span>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:theme.primary}}>{userName||'민아'}님, 수고했어요!</div>
            <div style={{fontSize:11,color:theme.border}}>오늘의 명언이 여기 표시돼요</div>
          </div>
        </div>
        {nextBtn(()=>setStep(2), false)}
      </div>
    </div>
  );

  // Step 2: 자취 경력
  if(step === 2) {
    const options = ['방금 이사', '1년 이상', '오래됨'];
    const labels = ['방금 이사했어요', '자취한 지 1년 이상', '오래된 자취생이에요'];
    const icons = ['🏠', '🌱', '🌳'];
    const descs = ['기본 생활 루틴을 추천해드려요', '일반적인 생활 관리 세트를 설정해요', '전체 생활 관리 세트를 설정해요'];
    return (
      <div className="fade-in" style={bgStyle}>
        <div style={cardStyle}>
          <div style={{display:'flex',gap:6,marginBottom:18}}>
            {[0,1,2].map(i=><div key={i} style={{width:i===2?24:8,height:8,borderRadius:8,background:i===2?theme.primary:theme.mid,transition:'all 0.3s'}}/>)}
          </div>
          <div style={{fontSize:11,color:theme.border,fontWeight:700,marginBottom:5}}>STEP 2 / 3</div>
          <div style={{fontSize:19,fontWeight:800,color:'#1f2937',marginBottom:4}}>자취한 지 얼마나 됐어요?</div>
          <div style={{fontSize:13,color:'#9ca3af',marginBottom:18}}>선택에 맞게 생활 관리 항목을 자동으로 설정해드려요</div>
          <div style={{display:'flex',flexDirection:'column',gap:9,marginBottom:18}}>
            {options.map((opt,i)=>(
              <button key={opt} onClick={()=>setLifeChoice(opt)} style={{padding:'14px 16px',borderRadius:15,border:`2px solid ${lifeChoice===opt?theme.primary:'#f3f4f6'}`,background:lifeChoice===opt?theme.bg:'#fafafa',cursor:'pointer',width:'100%',margin:0,textAlign:'left',transition:'all 0.15s',display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:22}}>{icons[i]}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:lifeChoice===opt?theme.primary:'#1f2937'}}>{labels[i]}</div>
                  <div style={{fontSize:11,color:'#9ca3af',marginTop:1}}>{descs[i]}</div>
                </div>
                {lifeChoice===opt&&<span style={{fontSize:15,color:theme.primary}}>✓</span>}
              </button>
            ))}
          </div>
          {nextBtn(()=>{if(lifeChoice)onComplete(lifeChoice,selectedAnimal,selectedTheme);}, !lifeChoice, '완료 →')}
        </div>
      </div>
    );
  }
  return null;
}

// ============================================================
// APP ROOT — Firebase 통합
// ============================================================
function App() {
  const fb = useFirebase();
  const [authState, setAuthState] = React.useState('loading'); // loading | welcome | login | signup | onboarding | app
  const [user, setUser] = React.useState(null);

  // Firebase Auth 상태 감지
  React.useEffect(() => {
    if(!fb) return;
    const unsub = fb.onAuthStateChanged(fb.auth, async (u) => {
      if(u) {
        setUser(u);
        // Firestore에서 온보딩 완료 여부 확인
        const snap = await fb.getDoc(fb.doc(fb.db, 'users', u.uid));
        if(snap.exists() && snap.data().onboarded) {
          setAuthState('app');
        } else {
          setAuthState('onboarding');
        }
      } else {
        setUser(null);
        setAuthState('welcome');
      }
    });
    return () => unsub();
  }, [fb]);

  // ── Firestore 실시간 동기화 ──
  const [foods, setFoods] = React.useState([]);
  const [lifeItems, setLifeItems] = React.useState([]);
  const [streak, setStreak] = React.useState({count:0, lastDate:null});
  const [weeklyLog, setWeeklyLog] = React.useState({});
  const [userName, setUserName] = React.useState('');
  const [animal, setAnimal] = React.useState('🐻');
  const [themeId, setThemeId] = React.useState('purple');
  const [widgets, setWidgets] = React.useState(DEFAULT_WIDGETS);

  React.useEffect(() => {
    if(!fb || !user || authState !== 'app') return;
    const uid = user.uid;

    // 프로필
    fb.getDoc(fb.doc(fb.db, 'users', uid)).then(snap => {
      if(snap.exists()) {
        const d = snap.data();
        setUserName(d.name || user.displayName || '');
        setStreak(d.streak || {count:0, lastDate:null});
        setWeeklyLog(d.weeklyLog || {});
        setAnimal(d.animal || '🐻');
        setThemeId(d.themeId || 'purple');
        if(d.widgets) setWidgets(d.widgets);
      }
    });

    // 식재료 실시간
    const unsubFood = fb.onSnapshot(fb.collection(fb.db, 'users', uid, 'foods'), snap => {
      setFoods(snap.docs.map(d => ({id:d.id, ...d.data()})));
    });
    // 생활관리 실시간 — 루틴 자동 리셋
    const unsubLife = fb.onSnapshot(fb.collection(fb.db, 'users', uid, 'lifeItems'), async snap => {
      const today = getToday();
      const items = snap.docs.map(d => ({id:d.id, ...d.data()}));
      // 루틴 중 doneDate가 오늘이 아닌 것들은 자동 리셋
      const toReset = items.filter(c =>
        c.section === '루틴' && c.done && c.doneDate !== today
      );
      if(toReset.length > 0) {
        await Promise.all(toReset.map(c =>
          fb.updateDoc(fb.doc(fb.db,'users',uid,'lifeItems',c.id), {
            done: false,
            doneDate: null,
          })
        ));
        // 리셋 후 다시 snapshot이 트리거되므로 여기서 setLifeItems 안 해도 됨
        return;
      }
      setLifeItems(items);
    });
    return () => { unsubFood(); unsubLife(); };
  }, [fb, user, authState]);

  // ── Firestore CRUD ──
  async function addFood(f) {
    if(!fb||!user) return;
    await fb.addDoc(fb.collection(fb.db,'users',user.uid,'foods'), f);
  }
  async function deleteFood(id) {
    if(!fb||!user) return;
    await fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'foods',id));
  }
  async function editFood(id, data) {
    if(!fb||!user) return;
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'foods',id), data);
  }
  async function addLife(c) {
    if(!fb||!user) return;
    await fb.addDoc(fb.collection(fb.db,'users',user.uid,'lifeItems'), c);
  }
  async function toggleLife(id) {
    if(!fb||!user) return;
    const item = lifeItems.find(c=>c.id===id);
    if(!item) return;
    const nowDone = !item.done;
    const today = getToday();
    if(item.section === '루틴') {
      // 루틴: doneDate에 오늘 날짜 저장 (날짜 기반 체크)
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id), {
        done: nowDone,
        doneDate: nowDone ? today : null,
      });
    } else {
      // 청소·생활: 기존 방식 (lastDone 업데이트)
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id), {
        done: nowDone,
        lastDone: nowDone ? today : item.lastDone,
      });
    }
  }
  async function deleteLife(id) {
    if(!fb||!user) return;
    await fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id));
  }
  async function editLife(id, data) {
    if(!fb||!user) return;
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id), data);
  }
  async function updateStreak(routinesDone, routinesTotal) {
    if(!fb||!user) return;
    const todayStr = getToday();
    const pct = routinesTotal ? Math.round(routinesDone/routinesTotal*100) : 0;
    if(pct >= 60) {
      if(streak.lastDate === todayStr) return;
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
      const yStr = yesterday.toISOString().split('T')[0];
      const newCount = streak.lastDate === yStr ? streak.count+1 : 1;
      const newStreak = {count:newCount, lastDate:todayStr};
      const newLog = {...weeklyLog, [todayStr]:pct};
      setStreak(newStreak); setWeeklyLog(newLog);
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid), {streak:newStreak, weeklyLog:newLog});
    }
  }
  async function saveWidgets(newWidgets) {
    if(!fb||!user) return;
    setWidgets(newWidgets);
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid), { widgets: newWidgets });
  }

  async function handleLogout() {
    if(!fb) return;
    await fb.signOut(fb.auth);
  }
  async function completeOnboarding(choice, chosenAnimal, chosenTheme) {
    if(!fb||!user) return;
    const uid = user.uid;
    const presets = (ONBOARDING_PRESETS[choice]||[]).map((item,i) => ({
      ...item, done:false, lastDone:null, freqDays:[], createdAt:new Date().toISOString()
    }));
    await fb.setDoc(fb.doc(fb.db,'users',uid), {
      name: user.displayName || '',
      onboarded: true,
      createdAt: fb.serverTimestamp(),
      streak: {count:0, lastDate:null},
      weeklyLog: {},
      animal: chosenAnimal || '🐻',
      themeId: chosenTheme || 'purple',
    }, {merge:true});
    for(const item of presets) {
      await fb.addDoc(fb.collection(fb.db,'users',uid,'lifeItems'), item);
    }
    setAnimal(chosenAnimal || '🐻');
    setThemeId(chosenTheme || 'purple');
    setAuthState('app');
  }

  const [page, setPage] = React.useState('home');
  const [sidebarOpen, setSidebarOpen] = React.useState(false);
  const {isMob, isTablet} = useResponsive();
  const PAGE_TITLES = {home:'🏠 홈', food:'🥕 식재료', life:'🌀 생활 관리', hub:'🔖 추천 허브', tips:'💡 생활 팁', settings:'⚙️ 설정'};

  // ── 로딩 ──
  if(authState === 'loading') return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#f5f3ff,#ede9fe)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:12}}>🏠</div>
        <div style={{fontSize:18,fontWeight:700,color:'#7c3aed'}}>LifeFit</div>
        <div style={{fontSize:13,color:'#a78bfa',marginTop:6}}>불러오는 중...</div>
      </div>
    </div>
  );

  if(authState === 'welcome') return (
    <WelcomeScreen
      onStart={()=>setAuthState('signup')}
      onLogin={()=>setAuthState('login')}
    />
  );
  if(authState === 'login' || authState === 'signup') return (
    <AuthScreen
      mode={authState}
      onSuccess={(u)=>{setUser(u);}}
      onBack={()=>setAuthState('welcome')}
    />
  );
  if(authState === 'onboarding') return (
    <Onboarding
      userName={user?.displayName || ''}
      onComplete={completeOnboarding}
    />
  );

  // ── 메인 앱 ──
  const currentTheme = getTheme(themeId);
  const MOB_NAV = [
    {id:'home',  emoji:'🏠', label:'홈'},
    {id:'food',  emoji:'🥕', label:'식재료'},
    {id:'life',  emoji:'🌀', label:'생활'},
    {id:'hub',   emoji:'🔖', label:'추천'},
    {id:'settings',emoji:'⚙️',label:'설정'},
  ];
  return (
    <ThemeCtx.Provider value={currentTheme}>
    <div style={{display:'flex',minHeight:'100vh',background:'#f8f7fc'}}>
      <Sidebar page={page} onNav={p=>{setPage(p);setSidebarOpen(false);}} mobileOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)} userName={userName} onLogout={handleLogout} animal={animal} themeId={themeId}/>

      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        {/* 모바일 상단 바 */}
        <div className="mobile-topbar" style={{background:'#fff',padding:'12px 18px',borderBottom:'1px solid #f0edf8',alignItems:'center',gap:13,position:'sticky',top:0,zIndex:30}}>
          <button onClick={()=>setSidebarOpen(true)} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,padding:4,color:currentTheme.primary,width:'auto',margin:0}}>☰</button>
          <div style={{fontSize:15,fontWeight:700,color:'#1f2937',flex:1}}>{PAGE_TITLES[page]}</div>
          <div style={{fontSize:13,fontWeight:900,color:currentTheme.primary}}>LifeFit<span style={{color:currentTheme.border}}>.</span></div>
        </div>

        {/* 메인 콘텐츠 */}
        <main style={{flex:1,padding:isMob?'16px 14px 90px':'28px 34px',maxWidth:1060,width:'100%',overflowX:'hidden'}}>
          {page==='home'&&<HomePage foods={foods} lifeItems={lifeItems} streak={streak} onNav={setPage} userName={userName} onQuickAdd={addFood} onQuickCheck={toggleLife} widgets={widgets}/>}
          {page==='food'&&<FoodPage foods={foods} onAdd={addFood} onDelete={deleteFood} onEdit={editFood}/>}
          {page==='life'&&<LifePage lifeItems={lifeItems} onAdd={addLife} onToggle={toggleLife} onDelete={deleteLife} onEdit={editLife} streak={streak} weeklyLog={weeklyLog} updateStreak={updateStreak}/>}
          {page==='tips'&&<TipsPage/>}
          {page==='hub'&&<HubPage foods={foods} lifeItems={lifeItems} onNav={setPage}/>}
          {page==='settings'&&<SettingsPage user={user} fb={fb} userName={userName} setUserName={setUserName} animal={animal} setAnimal={setAnimal} themeId={themeId} setThemeId={setThemeId} widgets={widgets} onSaveWidgets={saveWidgets}/>}
        </main>

        {/* 모바일 하단 탭 바 */}
        <div className="mobile-tab-bar" style={{position:'fixed',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid #f0edf8',padding:'6px 0 calc(6px + env(safe-area-inset-bottom))',zIndex:30,justifyContent:'space-around',alignItems:'center',boxShadow:'0 -4px 16px rgba(0,0,0,0.06)'}}>
          {MOB_NAV.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 8px',border:'none',background:'transparent',cursor:'pointer',width:'auto',margin:0,flex:1,maxWidth:80,minWidth:0}}>
              <span style={{fontSize:22,lineHeight:1,filter:page===n.id?'none':'grayscale(0.3)',opacity:page===n.id?1:0.5}}>{n.emoji}</span>
              <span style={{fontSize:10,fontWeight:page===n.id?700:500,color:page===n.id?currentTheme.primary:'#9ca3af',whiteSpace:'nowrap'}}>{n.label}</span>
              {page===n.id&&<div style={{width:20,height:3,borderRadius:2,background:currentTheme.primary,marginTop:1}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
