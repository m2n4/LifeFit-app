    doc: function(db){ 
      var args = Array.prototype.slice.call(arguments, 1);
      var ref = db;
      for(var i=0;i<args.length;i++){
        if(i%2===0) ref=ref.collection(args[i]); else ref=ref.doc(args[i]);
      }
      return ref;
    },
    collection: function(db){
      var args = Array.prototype.slice.call(arguments, 1);
      var ref = db;
      for(var i=0;i<args.length;i++){
        if(i%2===0) ref=ref.collection(args[i]); else ref=ref.doc(args[i]);
      }
      return ref;
    },
    getDoc: function(ref){ 
      return ref.get().then(function(snap){
        // compat SDK: exists는 boolean property → 함수로 통일
        var existsVal = snap.exists;
        snap.exists = function(){ 
          return typeof existsVal === 'function' ? existsVal.call(snap) : Boolean(existsVal); 
        };
        return snap;
      });
    },
    setDoc: function(ref,data,opts){ return opts ? ref.set(data,opts) : ref.set(data); },
    updateDoc: function(ref,data){ return ref.update(data); },
    addDoc: function(ref,data){ return ref.add(data); },
    deleteDoc: function(ref){ return ref.delete(); },
    onSnapshot: function(ref,cb){ 
      return ref.onSnapshot(function(snap){
        // 단일 doc 스냅샷인 경우 exists를 함수로 래핑
        if(snap && typeof snap.exists !== 'function'){
          var existsVal = snap.exists;
          snap.exists = function(){ return Boolean(existsVal); };
        }
        cb(snap);
      });
    },
    getDocs: function(q){ return q.get(); },
    query: function(ref){
      var constraints = Array.prototype.slice.call(arguments,1);
      var q = ref;
      constraints.forEach(function(c){ q = c(q); });
      return q;
    },
    where: function(field,op,val){ return function(ref){ return ref.where(field,op,val); }; },
    serverTimestamp: function(){ return firebase.firestore.FieldValue.serverTimestamp(); },
    writeBatch: function(db){ return db.batch(); },
  };
  window._firebaseReady = true;
  window.dispatchEvent(new Event('firebaseReady'));
</script>

function useLocalStorage(key, init) {
  const [val, setVal] = React.useState(() => {
    try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch { return init; }
  });
  React.useEffect(() => { try { localStorage.setItem(key,JSON.stringify(val)); } catch{} }, [key,val]);
  return [val, setVal];
}
function calcDaysLeft(d) {
  const t=new Date(); t.setHours(0,0,0,0);
  const e=new Date(d); e.setHours(0,0,0,0);
  return Math.ceil((e-t)/(864e5));
}
function getFoodStatus(dl) {
  if(dl<0)  return {label:'기간 초과',color:'#ef4444',bg:'#fef2f2',border:'#fecaca'};
  if(dl===0)return {label:'오늘 마감',color:'#ef4444',bg:'#fef2f2',border:'#fecaca'};
  if(dl<=3) return {label:`D-${dl}`,color:'#f97316',bg:'#fff7ed',border:'#fed7aa'};
  if(dl<=7) return {label:`D-${dl}`,color:'#eab308',bg:'#fefce8',border:'#fef08a'};
  return      {label:`D-${dl}`,color:'#22c55e',bg:'#f0fdf4',border:'#bbf7d0'};
}
function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayLabel() {
  const d=new Date(), days=['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}
function daysSince(s) {
  if(!s) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(s); d.setHours(0,0,0,0);
  return Math.floor((t-d)/(864e5));
}
function addDays(s,n) {
  const d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ============================================================
// ACHIEVEMENT SYSTEM — 달성 기준 3단계
// ============================================================
function getAchievLevel(done, total) {
  if(total === 0) return null;
  if(done === total) return {level:'perfect', emoji:'🔥', label:'완벽', cardBg:'linear-gradient(135deg,#fff7ed,#ffedd5)', gaugeBg:'#fed7aa', gaugeStroke:'#f97316', badgeBg:'#fff7ed', badgeColor:'#ea580c', badgeBorder:'#fed7aa'};
  if(done / total >= 0.5) return {level:'effort', emoji:'💪', label:'노력', cardBg:'linear-gradient(135deg,#eff6ff,#dbeafe)', gaugeBg:'#bfdbfe', gaugeStroke:'#3b82f6', badgeBg:'#eff6ff', badgeColor:'#2563eb', badgeBorder:'#bfdbfe'};
  if(done >= 1) return {level:'start', emoji:'🌱', label:'시작', cardBg:'linear-gradient(135deg,#f0fdf4,#dcfce7)', gaugeBg:'#bbf7d0', gaugeStroke:'#22c55e', badgeBg:'#f0fdf4', badgeColor:'#16a34a', badgeBorder:'#bbf7d0'};
  return null;
}

// ============================================================
// REPEAT SYSTEM
// ============================================================
const REPEAT_TYPES=[
  {value:'daily',label:'매일'},
  {value:'weekdays',label:'평일마다'},
  {value:'weekend',label:'주말마다'},
  {value:'weekly',label:'매주 특정 요일'},
  {value:'interval',label:'N일마다'},
  {value:'monthly',label:'매월 특정 날'},
  {value:'none',label:'한 번만'},
];
const DAY_KR=['일','월','화','수','목','금','토'];

function getRepeatLabel(r) {
  if(!r) return '';
  if(r.freq==='daily')    return '매일';
  if(r.freq==='weekdays') return '평일 (월~금)';
  if(r.freq==='weekend')  return '주말 (토·일)';
  if(r.freq==='weekly')   return r.freqDays?.length?`매주 ${r.freqDays.map(d=>DAY_KR[d]).join('·')}요일`:'매주';
  if(r.freq==='interval') return r.intervalDays?`${r.intervalDays}일마다`:'N일마다';
  if(r.freq==='monthly')  return r.monthDay?`매월 ${r.monthDay}일`:'매월';
  return '한 번만';
}
function isTodayItem(r, dateStr) {
  const ref = dateStr ? new Date(dateStr) : new Date();
  const d = ref.getDay();
  if(r.freq==='daily')    return true;
  if(r.freq==='weekdays') return d>=1&&d<=5;
  if(r.freq==='weekend')  return d===0||d===6;
  if(r.freq==='weekly')   return (r.freqDays||[]).includes(d);
  if(r.freq==='interval') {
    if(!r.createdAt||!r.intervalDays) return false;
    const c=new Date(r.createdAt); c.setHours(0,0,0,0);
    const n=new Date(ref); n.setHours(0,0,0,0);
    return Math.floor((n-c)/864e5)%r.intervalDays===0;
  }
  if(r.freq==='monthly') return ref.getDate()===(r.monthDay||1);
  return true;
}

// 날짜 기반 완료 여부 — Firestore done 필드 대신 lastDone 날짜로만 판단
function isDoneOn(item, dateStr) {
  return item.lastDone === dateStr;
}

// 생활/청소 항목이 해당 날짜 기준으로 "할 때가 됐는지"
function isDueOn(item, viewDate) {
  if(item.section === '루틴') return isTodayItem(item, viewDate);
  if(!item.lastDone) return true; // 한 번도 안 했으면 항상 할 때
  const sinceMs = new Date(viewDate+'T00:00:00') - new Date(item.lastDone+'T00:00:00');
  const sinceDays = Math.floor(sinceMs / 864e5);
  return sinceDays >= (item.intervalDays || 7);
}
function getNextItemDate(r) {
  const today=new Date(); today.setHours(0,0,0,0);
  const d=today.getDay();
  if(isTodayItem(r)) return null;
  if(r.freq==='weekdays') { const n=new Date(today); n.setDate(today.getDate()+(d===0?1:2)); return n; }
  if(r.freq==='weekend')  { const n=new Date(today); n.setDate(today.getDate()+(6-d||7)); return n; }
  if(r.freq==='weekly'&&r.freqDays?.length) {
    let min=7;
    r.freqDays.forEach(fd=>{ let diff=fd-d; if(diff<=0)diff+=7; if(diff<min)min=diff; });
    const n=new Date(today); n.setDate(today.getDate()+min); return n;
  }
  if(r.freq==='interval'&&r.intervalDays) {
    const c=new Date(r.createdAt||today); c.setHours(0,0,0,0);
    const diff=Math.floor((today-c)/864e5);
    const rem=r.intervalDays-(diff%r.intervalDays);
    const n=new Date(today); n.setDate(today.getDate()+rem); return n;
  }
  if(r.freq==='monthly'&&r.monthDay) {
    const n=new Date(today); n.setDate(r.monthDay);
    if(n<=today) n.setMonth(n.getMonth()+1); return n;
  }
  return null;
}
function formatNextDate(nd) {
  if(!nd) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.ceil((nd-today)/864e5);
  if(diff===1) return '내일';
  if(diff===2) return '모레';
  if(diff<=7)  return `${diff}일 후`;
  return `${nd.getMonth()+1}/${nd.getDate()}`;
}

// customSections는 App에서 전달받아 useCustomSections()로 접근
const CustomSectionsCtx = React.createContext({});
function useLifeSections() {
  const custom = React.useContext(CustomSectionsCtx);
  const result = {};
  Object.entries(LIFE_SECTIONS_BASE).forEach(([k,v]) => {
    const colorId = custom[k];
    result[k] = colorId && SECTION_COLOR_MAP[colorId]
      ? {...v, ...SECTION_COLOR_MAP[colorId]}
      : v;
  });
  return result;
}

function useResponsive() {
  const [width, setWidth] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const fn = () => setWidth(window.innerWidth);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return { isMob: width < 768, isTablet: width >= 768 && width < 1024, isDesktop: width >= 1024, width };
}

function CircleGauge({pct,size=80,color='#7c3aed',label,sub}) {

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <div style={{position:'relative',width:size,height:size}}>
        <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f3f4f6" strokeWidth={8}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={8}
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            style={{transition:'stroke-dasharray 0.6s ease'}}/>

        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>

  if(streak>=30) return {level:5,name:'전설',desc:'30일↑ 달성',color:'#f97316',bg:'#fff7ed',badge:'👑'};
  if(streak>=14) return {level:4,name:'고수',desc:'14일↑ 달성',color:'#7c3aed',bg:'#f5f3ff',badge:'💎'};
  if(streak>=7)  return {level:3,name:'노력가',desc:'7일↑ 달성',color:'#2563eb',bg:'#eff6ff',badge:'⭐'};

}

function getGreeting() {
  const h = new Date().getHours();
  if(h < 6)  return {msg:'아직 늦은 시간이에요 🌙', sub:'충분한 휴식도 생활 관리예요'};
  if(h < 12) return {msg:'좋은 아침이에요 ☀️', sub:'오늘도 상쾌하게 시작해봐요'};
  if(h < 18) return {msg:'오후도 잘 보내고 있죠? 🌤️', sub:'오늘 할 일을 하나씩 정리해봐요'};
  if(h < 22) return {msg:'오늘 하루도 수고했어요 🌇', sub:'저녁 루틴을 챙겨봐요'};
  return {msg:'오늘도 고생했어요 🌙', sub:'내일을 위해 미리 준비해요'};
}

function QuickActionBtn({emoji, label, onClick}) {

      onMouseEnter={e=>{e.currentTarget.style.background=theme.light;e.currentTarget.style.borderColor=theme.primary;}}

      <span style={{fontSize:22}}>{emoji}</span>
      <span style={{fontSize:10,fontWeight:600,color:C.text3,textAlign:'center',lineHeight:1.3,wordBreak:'keep-all'}}>{label}</span>

  );
}

function HomePage({foods,lifeItems,streak,weeklyLog,onNav,userName,onQuickAdd,onQuickCheck}) {
  const theme = useTheme();
  const todayDay = new Date().getDay();
  const greeting = getGreeting();

  // ── 우선순위 알림 생성 (최대 3개) ──
  const alerts = [];
  const allFoodsWithDl = foods.map(f=>({...f,dl:calcDaysLeft(f.expiryDate)}));
  const expiredFoods = allFoodsWithDl.filter(f=>f.dl<0);
  const todayDeadline = allFoodsWithDl.filter(f=>f.dl===0);
  const urgentFoods2 = allFoodsWithDl.filter(f=>f.dl===1).sort((a,b)=>a.dl-b.dl);

  // 기간 초과
  if(expiredFoods.length > 0) alerts.push({
    id:'expired', emoji:'⚠️', level:'danger',
    title: `기간 초과 식재료 ${expiredFoods.length}개`,
    sub: expiredFoods.slice(0,2).map(f=>f.name).join(', ') + (expiredFoods.length>2?` 외 ${expiredFoods.length-2}개`:''),
    action:()=>onNav('food'),
    bg:'#fef2f2', border:'#fecaca', accent:'#ef4444', btnLabel:'확인'
  });
  // 오늘 마감
  if(alerts.length < 3 && todayDeadline.length > 0) alerts.push({
    id:'today-food', emoji:todayDeadline[0].emoji, level:'danger',
    title: todayDeadline.length===1?`${todayDeadline[0].name} 오늘이 마감이에요`:`오늘 마감 ${todayDeadline.length}개`,
    sub: '냉장고에서 먼저 꺼내요',
    action:()=>onNav('food'),
    bg:'#fef2f2', border:'#fecaca', accent:'#ef4444', btnLabel:'확인'
  });
  // 내일 마감
  if(alerts.length < 3 && urgentFoods2.length > 0 && expiredFoods.length === 0) alerts.push({
    id:`food-tmr`, emoji:urgentFoods2[0].emoji, level:'warn',
    title:`${urgentFoods2[0].name}${urgentFoods2.length>1?` 등 ${urgentFoods2.length}개`:''}가 내일까지예요`,
    sub:'먼저 드세요!', action:()=>onNav('food'),
    bg:'#fff7ed', border:'#fed7aa', accent:'#f97316', btnLabel:'확인'
  });

  // 가장 오래 밀린 생활 항목
  const overdueItems = lifeItems.filter(c=>c.section!=='루틴'&&c.lastDone&&daysSince(c.lastDone)>c.intervalDays&&!isDoneOn(c,getToday()))
    .sort((a,b)=>(daysSince(b.lastDone)-b.intervalDays)-(daysSince(a.lastDone)-a.intervalDays));
  if(alerts.length < 3 && overdueItems.length > 0) {
    const worst = overdueItems[0];
    alerts.push({
      id:`life-${worst.id}`, emoji:worst.emoji, level:'warn',
      title:`${worst.text} ${daysSince(worst.lastDone)-worst.intervalDays}일 지났어요`,
      sub:`마지막: ${daysSince(worst.lastDone)}일 전 · ${worst.intervalDays}일 주기${overdueItems.length>1?` · 외 ${overdueItems.length-1}개 더`:''}`,
      action:()=>onNav('life'),
      bg:'#fefce8', border:'#fef08a', accent:'#ca8a04', btnLabel:'하러가기'
    });
  }

  // 오늘 루틴 미완료
  const todayRoutines = lifeItems.filter(c=>c.section==='루틴'&&isTodayItem(c));
  const undoneRoutines = todayRoutines.filter(c=>!isDoneOn(c,getToday()));
  const doneRoutines = todayRoutines.filter(c=>isDoneOn(c,getToday()));
  if(alerts.length < 3 && undoneRoutines.length > 0) alerts.push({
    id:'routine', emoji:'🌀', level:'info',
    title:`오늘 루틴 ${undoneRoutines.length}개 남았어요`,
    sub:`${doneRoutines.length}/${todayRoutines.length} 완료${doneRoutines.length>0?' · 잘 하고 있어요 👍':''}`,
    action:()=>onNav('life'),
    bg:theme.bg, border:theme.mid, accent:theme.primary, btnLabel:'하러가기'
  });

  const allDone = alerts.length===0;

  // ── 임박 식재료 (D-5 이하) ──
  const urgentList = foods.map(f=>({...f,dl:calcDaysLeft(f.expiryDate)})).filter(f=>f.dl<=5&&f.dl>=0).sort((a,b)=>a.dl-b.dl).slice(0,4);

  // ── 생활 상태 요약 ──
  const todayStr = getToday();
  const todayDueItems = lifeItems.filter(c => isDueOn(c, todayStr));
  const doneLife = todayDueItems.filter(c => isDoneOn(c, todayStr)).length;
  const totalLife = todayDueItems.length;
  const lifePct = totalLife ? Math.round(doneLife/totalLife*100) : 0;
  const streakCount = (streak||{count:0}).count;
  const urgentCount = foods.filter(f=>calcDaysLeft(f.expiryDate)<=3&&calcDaysLeft(f.expiryDate)>=0).length;
  const lifeAchiev = getAchievLevel(doneLife, totalLife);

  // ── 상황별 추천 ──
  const situRecs = getSituationalRecs(foods, lifeItems).filter(r=>r.type!=='cheer').slice(0,2);

  return (
    <div style={{paddingBottom:80}}>

      {/* ① 환영 헤더 */}

        <div style={{position:'absolute',right:-10,top:-10,fontSize:80,opacity:0.08,lineHeight:1}}>🏠</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,0.75)',fontWeight:600,marginBottom:4}}>{todayLabel()}</div>
        <div style={{fontSize:20,fontWeight:800,color:'#fff',marginBottom:4}}>

        <div style={{fontSize:13,color:'rgba(255,255,255,0.8)'}}>{greeting.sub}</div>

        {/* 스트릭 */}
        {streakCount>0&&(
          <div style={{marginTop:14,display:'inline-flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.2)',borderRadius:20,padding:'5px 12px'}}>
            <span style={{fontSize:14}}>🔥</span>
            <span style={{fontSize:12,color:'#fff',fontWeight:700}}>{streakCount}일 연속 달성 중</span>
          </div>
        )}
      </div>

      {/* ② 오늘 핵심 알림 (최대 3개) */}
      <div style={{marginBottom:18}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{fontSize:15,fontWeight:800,color:C.text}}>
            오늘 챙길 것들
            {alerts.length>0&&<span style={{marginLeft:7,fontSize:11,fontWeight:700,color:'#fff',background:theme.primary,padding:'2px 8px',borderRadius:20}}>{alerts.length}</span>}

        ):(

            if(laundry&&onQuickCheck) onQuickCheck(laundry.id);
            else onNav('life');
          }}/>
          <QuickActionBtn emoji="💧" label="물 마시기" onClick={()=>{

          {['일','월','화','수','목','금','토'].map((d,i)=>{
            const dateObj=new Date(); dateObj.setDate(dateObj.getDate()-(new Date().getDay()-i));
            const dateStr=dateObj.getFullYear()+'-'+String(dateObj.getMonth()+1).padStart(2,'0')+'-'+String(dateObj.getDate()).padStart(2,'0');
            const isCurrentDay=i===todayDay;
            const logVal=(weeklyLog||{})[dateStr];
            const dayAchiev = logVal>=100?{bg:'#fff7ed',border:'#fed7aa',color:'#ea580c',emoji:'🔥'}
              : logVal>=50?{bg:'#eff6ff',border:'#bfdbfe',color:'#2563eb',emoji:'💪'}
              : logVal>0?{bg:'#f0fdf4',border:'#bbf7d0',color:'#16a34a',emoji:'🌱'}
              : null;
            return (
              <div key={i} style={{flex:1,height:42,borderRadius:10,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,gap:1,
                background:isCurrentDay?theme.primary:dayAchiev?.bg||'#f9fafb',
                color:isCurrentDay?'#fff':dayAchiev?.color||'#9ca3af',
                border:isCurrentDay?'none':dayAchiev?`1.5px solid ${dayAchiev.border}`:`1px solid #f3f4f6`}}>
                {d}
                {dayAchiev&&!isCurrentDay&&<span style={{fontSize:9,lineHeight:1}}>{dayAchiev.emoji}</span>}
                {isCurrentDay&&<div style={{width:4,height:4,borderRadius:'50%',background:'rgba(255,255,255,0.7)',marginTop:1}}/>}
              </div>
            );
          })}
        </div>
        <div style={{fontSize:11,color:C.muted,marginTop:8,textAlign:'center'}}>연속 {streakCount}일째 생활 관리 중 🔥</div>
      </div>
    </div>
  );
}

function DateModal({food,onConfirm,onClose}) {
  const def=(()=>{const d=new Date();d.setDate(d.getDate()+(food?.days||7));return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
  const [date,setDate]=React.useState(def);
  return (
    <Modal title={`${food?.emoji} ${food?.name} 추가`} sub="유통기한을 선택해 주세요" onClose={onClose}>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <input type="date" value={date} min={getToday()} onChange={e=>setDate(e.target.value)} style={inp()}/>
        <div style={{display:'flex',gap:8}}>
          <Btn onClick={()=>onConfirm(date)} style={{flex:1}}>추가하기</Btn>
          <Btn onClick={onClose} variant="outline" style={{flex:1}}>취소</Btn>
        </div>
      </div>
    </Modal>
  );
}

// 날짜 유틸
function dateStrToObj(s) { return new Date(s+'T00:00:00'); }
function getWeekDates() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay();
  return Array.from({length:7}, (_, i) => {
    const d = new Date(today); d.setDate(today.getDate() - dow + i);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  });
}

// 개별 항목 카드 — 날짜 기반 완료 판단
function LifeItemCard({c, onToggle, onDelete, openEdit, updateStreak, lifeItems, viewDate, isReadOnly, onMoveUp, onMoveDown, showMoveButtons}) {
  const theme = useTheme();
  const SECTIONS = useLifeSections();
  const [guideOpen, setGuideOpen] = React.useState(false);
  const sec = SECTIONS[c.section] || SECTIONS['루틴'] || LIFE_SECTIONS['루틴'];

  // 핵심: 오늘(viewDate) 완료 여부는 lastDone === viewDate 로만 판단
  const doneOnView = isDoneOn(c, viewDate);

  // 생활/청소 주기 계산
  const sinceLastDone = c.lastDone
    ? Math.floor((dateStrToObj(viewDate) - dateStrToObj(c.lastDone)) / 864e5)
    : null;
  const nextDueDate = c.section !== '루틴' && c.lastDone
    ? addDays(c.lastDone, c.intervalDays || 7)
    : null;
  const dLeft = nextDueDate
    ? Math.floor((dateStrToObj(nextDueDate) - dateStrToObj(viewDate)) / 864e5)
    : null;
  const isOverdue = dLeft !== null && dLeft < 0 && !doneOnView;
  const isSoon = dLeft !== null && dLeft >= 0 && dLeft <= 2 && !doneOnView;
  const progress = c.section !== '루틴' && !doneOnView
    ? (c.lastDone
        ? Math.min(100, Math.round(sinceLastDone / (c.intervalDays || 7) * 100))
        : 100)
    : null;
  const progressColor = isOverdue ? '#ef4444' : isSoon ? '#f97316' : theme.primary;

  function StatusLabel() {
    if(c.section === '루틴') {
      if(doneOnView) return <span style={{fontSize:11,fontWeight:700,color:'#16a34a',background:'#f0fdf4',padding:'2px 8px',borderRadius:20,border:'1px solid #bbf7d0'}}>✓ 완료</span>;
      const isRoutineToday = isTodayItem(c, viewDate);
      if(isRoutineToday) return <span style={{fontSize:11,fontWeight:700,color:theme.primary,background:theme.light,padding:'2px 8px',borderRadius:20,border:`1px solid ${theme.mid}`}}>오늘</span>;
      const nd = getNextItemDate(c);
      return <span style={{fontSize:11,color:C.muted}}>다음: {nd ? formatNextDate(nd) : '-'}</span>;
    }
    if(doneOnView) return <span style={{fontSize:11,fontWeight:700,color:'#16a34a',background:'#f0fdf4',padding:'2px 8px',borderRadius:20,border:'1px solid #bbf7d0'}}>✓ 오늘 완료</span>;
    if(!c.lastDone) return <span style={{fontSize:11,color:C.muted,background:C.card3,padding:'2px 8px',borderRadius:20}}>아직 안 함</span>;
    if(isOverdue) return <span style={{fontSize:11,fontWeight:700,color:'#ef4444',background:'#fef2f2',padding:'2px 8px',borderRadius:20,border:'1px solid #fecaca'}}>⚠️ {Math.abs(dLeft)}일 지남</span>;
    if(isSoon) return <span style={{fontSize:11,fontWeight:700,color:'#f97316',background:'#fff7ed',padding:'2px 8px',borderRadius:20,border:'1px solid #fed7aa'}}>D-{dLeft}</span>;
    return <span style={{fontSize:11,color:'#22c55e',background:'#f0fdf4',padding:'2px 8px',borderRadius:20,border:'1px solid #bbf7d0'}}>D+{sinceLastDone}/{c.intervalDays}일</span>;
  }

  return (
    <div style={{
      background:C.card,borderRadius:14,
      border:`1.5px solid ${doneOnView?'#d1fae5':isOverdue?'#fecaca':'#f3f4f6'}`,
      overflow:'hidden',opacity:doneOnView?0.75:1,transition:'opacity 0.2s,border-color 0.2s'
    }}>
      <div style={{padding:'13px 15px'}}>
        <div style={{display:'flex',alignItems:'center',gap:11}}>
          {/* 체크박스 */}
          <div onClick={()=>{
            if(isReadOnly) return;
            onToggle(c.id);
            if(c.section==='루틴') {
              const willBeDone = !doneOnView;
              const currentDone = lifeItems.filter(x=>x.section==='루틴'&&isDoneOn(x,viewDate)).length;
              const newDoneCount = willBeDone ? currentDone+1 : Math.max(0,currentDone-1);
              updateStreak && updateStreak(newDoneCount, lifeItems.filter(x=>x.section==='루틴').length);
            }
          }} style={{
            width:22,height:22,borderRadius:6,flexShrink:0,
            cursor:isReadOnly?'default':'pointer',
            background:doneOnView?theme.primary:'transparent',
            border:`2px solid ${doneOnView?theme.primary:'#d1d5db'}`,
            display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all 0.15s'
          }}>
            {doneOnView&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}
          </div>
          <span style={{fontSize:18,flexShrink:0}}>{c.emoji||'💧'}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,color:doneOnView?C.muted:C.text,textDecoration:doneOnView?'line-through':'none'}}>{c.text}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2,display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
              <span style={{background:sec.bg,color:sec.color,padding:'1px 6px',borderRadius:20,border:`1px solid ${sec.border}`,fontWeight:600,fontSize:10}}>{sec.icon} {c.section}</span>
              {c.section==='루틴'
                ? <span style={{background:C.card3,padding:'1px 6px',borderRadius:20,fontSize:10}}>🔄 {getRepeatLabel(c)}</span>
                : <span style={{fontSize:10}}>⏱ {c.intervalDays}일 주기{c.lastDone?` · ${sinceLastDone}일 전 완료`:''}</span>
              }
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
            <StatusLabel/>
            {!isReadOnly&&<div style={{display:'flex',gap:4}}>
              {showMoveButtons&&<>
                <button onClick={e=>{e.stopPropagation();onMoveUp&&onMoveUp(c.id);}} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:13,padding:0,width:'auto',margin:0,lineHeight:1}} title="위로" onMouseEnter={e=>e.currentTarget.style.color=theme.primary} onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>↑</button>
                <button onClick={e=>{e.stopPropagation();onMoveDown&&onMoveDown(c.id);}} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:13,padding:0,width:'auto',margin:0,lineHeight:1}} title="아래로" onMouseEnter={e=>e.currentTarget.style.color=theme.primary} onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>↓</button>
              </>}
              {c.guide&&<button onClick={()=>setGuideOpen(!guideOpen)} style={{fontSize:10,color:theme.primary,background:theme.light,border:`1px solid ${theme.mid}`,borderRadius:7,padding:'2px 7px',cursor:'pointer',width:'auto',margin:0}}>{guideOpen?'접기':'방법'}</button>}
              <button onClick={()=>openEdit(c)} style={{background:'none',border:'none',cursor:'pointer',color:theme.border,fontSize:13,padding:0,width:'auto',margin:0}} onMouseEnter={e=>e.currentTarget.style.color=theme.primary} onMouseLeave={e=>e.currentTarget.style.color=theme.border}>✎</button>
              <button onClick={()=>onDelete(c.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:13,padding:0,width:'auto',margin:0}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>✕</button>
            </div>}
          </div>
        </div>
        {guideOpen&&c.guide&&(
          <div style={{marginTop:10,padding:'10px 12px',background:theme.light,borderRadius:10,border:`1px solid ${theme.mid}`,fontSize:12,color:theme.primary,lineHeight:1.7,whiteSpace:'pre-wrap'}}>{c.guide}</div>
        )}
      </div>
      {progress !== null && (
        <div style={{height:3,background:C.card3}}>
          <div style={{height:'100%',width:`${progress}%`,background:progressColor,transition:'width 0.5s',borderRadius:2}}/>
        </div>
      )}
    </div>
  );
}

// 예정 항목 카드 (주기가 아직 안 됐거나 오늘 요일 해당 안 되는 루틴)

    ? Math.floor((dateStrToObj(nextDueDate) - dateStrToObj(viewDate)) / 864e5)
    : null;

  let dday='', ddayColor='#9ca3af', ddayBg='#f3f4f6', ddayBorder='#e5e7eb';

    else if(dLeft === 0) { dday='오늘!'; ddayColor='#16a34a'; ddayBg='#f0fdf4'; ddayBorder='#bbf7d0'; }
    else if(dLeft <= 3)  { dday=`D-${dLeft}`; ddayColor='#f97316'; ddayBg='#fff7ed'; ddayBorder='#fed7aa'; }
    else if(dLeft <= 7)  { dday=`D-${dLeft}`; ddayColor='#eab308'; ddayBg='#fefce8'; ddayBorder='#fef08a'; }
    else                 { dday=`D-${dLeft}`; ddayColor='#22c55e'; ddayBg='#f0fdf4'; ddayBorder='#bbf7d0'; }
  }

  const progress = c.lastDone && c.intervalDays
    ? Math.min(100, Math.round(sinceLastDone / c.intervalDays * 100))

  return (
    <div style={{background:C.card,borderRadius:14,border:`1.5px solid ${C.border}`,overflow:'hidden'}}>
      <div style={{padding:'12px 15px',display:'flex',alignItems:'center',gap:11}}>

          <div style={{fontSize:11,color:C.muted,marginTop:1,display:'flex',gap:5,flexWrap:'wrap'}}>

            <span style={{fontSize:10}}>⏱ {c.intervalDays}일 주기</span>
            {sinceLastDone !== null && <span style={{fontSize:10,color:C.muted}}>{sinceLastDone}일 전 완료</span>}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>

          <div style={{display:'flex',gap:4}}>

          </div>
        </div>
      </div>
      <div style={{height:3,background:C.card3}}>
        <div style={{height:'100%',width:`${progress}%`,background:progress>=100?'#ef4444':progress>=70?'#f97316':theme.primary,transition:'width 0.5s',borderRadius:2}}/>
      </div>
    </div>
  );
}

// 월간 달력
function MonthlyCalendar({weeklyLog, lifeItems, onSelectDate, viewDate}) {
  const theme = useTheme();
  const [calYear, setCalYear] = React.useState(() => new Date().getFullYear());
  const [calMonth, setCalMonth] = React.useState(() => new Date().getMonth());

  const todayStr = getToday();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth+1, 0);
  const startDow = firstDay.getDay();
  const daysInMonth = lastDay.getDate();

  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  function getCellAchiev(dateStr) {
    const log = (weeklyLog||{})[dateStr];
    if(log === undefined || log === null) return null;
    if(log >= 100) return {emoji:'🔥',bg:'#fff7ed',border:'#fed7aa',color:'#ea580c'};
    if(log >= 50) return {emoji:'💪',bg:'#eff6ff',border:'#bfdbfe',color:'#2563eb'};
    if(log > 0) return {emoji:'🌱',bg:'#f0fdf4',border:'#bbf7d0',color:'#16a34a'};
    return {emoji:'',bg:'#f9fafb',border:'#f3f4f6',color:C.muted};
  }

  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  return (
    <div style={{background:C.card,borderRadius:18,padding:'16px',border:`1.5px solid #f3f4f6`,marginBottom:14}}>
      {/* 헤더 */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1);}} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:theme.primary,padding:'4px 8px',width:'auto',margin:0}}>‹</button>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>{calYear}년 {monthNames[calMonth]}</span>
        <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1);}} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:theme.primary,padding:'4px 8px',width:'auto',margin:0}}>›</button>
      </div>
      {/* 범례 */}
      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
        {[{bg:'#f0fdf4',border:'#bbf7d0',color:'#16a34a',label:'🌱 시작'},{bg:'#eff6ff',border:'#bfdbfe',color:'#2563eb',label:'💪 노력'},{bg:'#fff7ed',border:'#fed7aa',color:'#ea580c',label:'🔥 완벽'},{bg:'#f9fafb',border:'#f3f4f6',color:C.muted,label:'기록없음'}].map(s=>(
          <div key={s.label} style={{display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:14,height:14,borderRadius:4,background:s.bg,border:`1.5px solid ${s.border}`}}/>
            <span style={{fontSize:10,color:s.color,fontWeight:600}}>{s.label}</span>
          </div>
        ))}
      </div>
      {/* 요일 헤더 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:4}}>
        {['일','월','화','수','목','금','토'].map((d,i)=>(
          <div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:i===0?'#ef4444':i===6?'#3b82f6':'#9ca3af',padding:'3px 0'}}>{d}</div>
        ))}
      </div>
      {/* 날짜 셀 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
        {cells.map((d,i)=>{
          if(!d) return <div key={`empty-${i}`}/>;
          const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const achiev=getCellAchiev(ds);
          const isToday=ds===todayStr;
          const isSelected=ds===viewDate;
          return (
            <button key={ds} onClick={()=>{onSelectDate(ds);}} style={{
              aspectRatio:'1',borderRadius:8,fontSize:11,fontWeight:isToday||isSelected?800:500,
              border:`1.5px solid ${isSelected?theme.primary:isToday?theme.border:achiev?.border||'#f3f4f6'}`,
              background:isSelected?theme.primary:achiev?.bg||C.card,
              color:isSelected?'#fff':isToday?theme.primary:achiev?.color||C.text2,
              cursor:'pointer',padding:0,margin:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1,
              boxShadow:isToday?`0 0 0 2px ${theme.light}`:'none',
              transition:'all 0.15s',
            }}>
              <span>{d}</span>
              {achiev?.emoji&&!isSelected&&<span style={{fontSize:9,lineHeight:1}}>{achiev.emoji}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function LifePage({lifeItems,onAdd,onToggle,onDelete,onEdit,streak,weeklyLog,updateStreak,fb,user}) {
  const theme=useTheme();
  const todayStr = getToday();
  const [lifeTab, setLifeTab] = React.useState('today'); // 'today' | 'report'
  const [viewDate, setViewDate] = React.useState(todayStr);
  const [showAddModal,setShowAddModal]=React.useState(false);
  const [editTarget,setEditTarget]=React.useState(null);
  const [showPackModal,setShowPackModal]=React.useState(false);
  const [showCalendar, setShowCalendar] = React.useState(false);
  const [scheduledOpen, setScheduledOpen] = React.useState(true);
  const [sortMode, setSortMode] = React.useState(false); // 순서 편집 모드
  const emptyForm={text:'',emoji:'💧',section:'루틴',freq:'daily',freqDays:[],intervalDays:7,monthDay:1,guide:''};
  const [form,setForm]=React.useState(emptyForm);

  const isToday = viewDate === todayStr;
  const isFuture = viewDate > todayStr;
  const isPast = viewDate < todayStr;

  // 오늘 할 일:
  // - 루틴: viewDate 요일/주기에 해당하는 것
  // - 생활/청소: 주기가 됐거나 한 번도 안 한 것 (isDueOn)
  // 오늘 완료 여부는 isDoneOn (lastDone === viewDate) 로만 판단
  const todayItems = lifeItems.filter(c => isDueOn(c, viewDate));

  // 예정 항목: 아직 주기가 안 된 생활/청소 + 오늘 요일 해당 안 되는 루틴
  const scheduledItems = lifeItems.filter(c => !isDueOn(c, viewDate));

  // order 필드 기준 정렬 (없으면 0)
  const todayUndone = todayItems
    .filter(c => !isDoneOn(c, viewDate))
    .sort((a,b) => (a.order||0) - (b.order||0));
  const todayDone = todayItems.filter(c => isDoneOn(c, viewDate));

  // 순서 이동 함수
  function handleMoveUp(id) {
    const idx = todayUndone.findIndex(c=>c.id===id);
    if(idx <= 0) return;
    const above = todayUndone[idx-1];
    const current = todayUndone[idx];
    const curOrder = current.order ?? idx;
    const aboveOrder = above.order ?? (idx-1);
    onEdit(current.id, {order: aboveOrder});
    onEdit(above.id, {order: curOrder});
  }
  function handleMoveDown(id) {
    const idx = todayUndone.findIndex(c=>c.id===id);
    if(idx >= todayUndone.length-1) return;
    const below = todayUndone[idx+1];
    const current = todayUndone[idx];
    const curOrder = current.order ?? idx;
    const belowOrder = below.order ?? (idx+1);
    onEdit(current.id, {order: belowOrder});
    onEdit(below.id, {order: curOrder});
  }

  // 달성률 계산
  const totalToday = todayItems.length;
  const doneToday = todayDone.length;
  const pct = totalToday ? Math.round(doneToday/totalToday*100) : 0;
  const achievLevel = getAchievLevel(doneToday, totalToday);

  // 카드 배경/게이지 색
  const cardBg = achievLevel?.cardBg || `linear-gradient(135deg,${theme.primary},${theme.border})`;
  const gaugeStroke = achievLevel?.gaugeStroke || '#fff';
  const badgeBg = achievLevel?.badgeBg || theme.light;
  const badgeColor = achievLevel?.badgeColor || theme.primary;
  const badgeBorder = achievLevel?.badgeBorder || theme.mid;

  // 날짜 네비게이션
  function navigate(dir) {
    const d = new Date(viewDate); d.setDate(d.getDate()+dir);
    setViewDate(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
    setShowCalendar(false);
  }
  function goToday() { setViewDate(todayStr); setShowCalendar(false); }

  // 요일 표기
  function dateLabel(ds) {
    const d = new Date(ds+'T00:00:00');
    const days=['일','월','화','수','목','금','토'];
    return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
  }

  function openAdd(section) {
    setEditTarget(null);
    setForm({...emptyForm,section:section||'루틴'});
    setShowAddModal(true);
  }
  function openEdit(item) {
    setEditTarget(item);
    setForm({text:item.text,emoji:item.emoji||'💧',section:item.section||'루틴',freq:item.freq||'interval',freqDays:item.freqDays||[],intervalDays:item.intervalDays||7,monthDay:item.monthDay||1,guide:item.guide||''});
    setShowAddModal(true);
  }
  function submitForm() {
    if(!form.text.trim()) return;
    if(editTarget) onDelete(editTarget.id);
    onAdd({id:Date.now(),...form,done:false,lastDone:null,createdAt:editTarget?.createdAt||new Date().toISOString()});
    setShowAddModal(false);
  }

  // 이번 주 날짜 바
  const weekDates = getWeekDates();

  function getWeekDayAchiev(ds) {
    const log = weeklyLog?.[ds];
    if(log === undefined || log === null) return null;
    if(log >= 100) return {bg:'#fff7ed',border:'#fed7aa',color:'#ea580c',emoji:'🔥'};
    if(log >= 50) return {bg:'#eff6ff',border:'#bfdbfe',color:'#2563eb',emoji:'💪'};
    if(log > 0) return {bg:'#f0fdf4',border:'#bbf7d0',color:'#16a34a',emoji:'🌱'};
    return null;
  }

  return (
    <div>
      {/* ── 헤더 ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div>
          <div style={{fontSize:21,fontWeight:800,color:C.text,marginBottom:2}}>🌀 생활 관리</div>
          <div style={{fontSize:12,color:C.muted}}>
            {lifeTab==='today'&&'루틴·생활·청소 한눈에'}
            {lifeTab==='report'&&'월간 달성 기록'}
            {lifeTab==='diary'&&'오늘을 기억해요 ✍️'}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {/* 리포트 / 하루기록 아이콘 버튼 */}
          {[{id:'report',emoji:'📊',tip:'월간 리포트'},{id:'diary',emoji:'📔',tip:'하루 기록'}].map(t=>(
            <button key={t.id} onClick={()=>setLifeTab(lifeTab===t.id?'today':t.id)} title={t.tip} style={{
              width:36,height:36,borderRadius:10,border:`1.5px solid ${lifeTab===t.id?theme.primary:theme.mid}`,
              background:lifeTab===t.id?theme.primary:theme.bg,
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:16,cursor:'pointer',width:'auto',padding:'0 10px',height:34,margin:0,
              transition:'all 0.15s',
              boxShadow:lifeTab===t.id?`0 2px 8px ${theme.primary}44`:'none',
            }}>{t.emoji}</button>
          ))}
          <div style={{width:1,height:20,background:theme.mid,margin:'0 2px'}}/>
          <Btn variant="outline" size="sm" onClick={()=>setShowPackModal(true)}>✨</Btn>
          <Btn size="sm" onClick={()=>openAdd('루틴')}>+ 추가</Btn>
        </div>
      </div>

      {/* ── 리포트 탭 ── */}
      {lifeTab==='report'&&(
        <ReportPage weeklyLog={weeklyLog} lifeItems={lifeItems} foods={[]} streak={streak}/>
      )}

      {/* ── 하루기록 탭 ── */}
      {lifeTab==='diary'&&(
        <DiaryPage fb={fb} user={user}/>
      )}

      {/* ── 오늘 할 일 탭 ── */}
      {lifeTab==='today'&&(<>

      {/* 날짜 네비게이션 */}
      <div style={{background:C.card,borderRadius:16,padding:'12px 16px',border:`1.5px solid ${C.border}`,marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
        <button onClick={()=>navigate(-1)} style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:theme.primary,padding:'2px 6px',width:'auto',margin:0}}>‹</button>
        <div style={{flex:1,textAlign:'center'}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text}}>{dateLabel(viewDate)}</div>
          {!isToday&&<div style={{fontSize:11,color:isPast?'#9ca3af':'#a78bfa',marginTop:2}}>{isPast?'📖 과거 기록 (읽기 전용)':'🔮 미래 미리보기'}</div>}
        </div>
        <button onClick={()=>navigate(1)} style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:theme.primary,padding:'2px 6px',width:'auto',margin:0}}>›</button>
        {!isToday&&<button onClick={goToday} style={{padding:'5px 10px',borderRadius:20,border:`1.5px solid ${theme.mid}`,background:theme.light,color:theme.primary,fontSize:11,fontWeight:700,cursor:'pointer',width:'auto',margin:0}}>오늘</button>}
      </div>

      {/* 이번 주 요일 바 */}
      <div style={{background:C.card,borderRadius:14,padding:'12px 14px',border:`1.5px solid ${C.border}`,marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text2}}>이번 주</div>
          <button onClick={()=>setShowCalendar(v=>!v)} style={{fontSize:11,color:theme.primary,background:'none',border:'none',cursor:'pointer',width:'auto',margin:0,fontWeight:600}}>📅 {showCalendar?'달력 닫기':'월간 달력 보기'}</button>
        </div>
        <div style={{display:'flex',gap:4}}>
          {weekDates.map((ds,i)=>{
            const DAY_KR2=['일','월','화','수','목','금','토'];
            const isSelected = ds === viewDate;
            const isTod = ds === todayStr;
            const achiev = getWeekDayAchiev(ds);
            return (
              <button key={ds} onClick={()=>{setViewDate(ds);setShowCalendar(false);}} style={{
                flex:1,height:42,borderRadius:10,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                fontSize:11,fontWeight:700,gap:1,
                background:isSelected?theme.primary:achiev?.bg||'#f9fafb',
                color:isSelected?'#fff':isTod?theme.primary:achiev?.color||'#9ca3af',
                border:isSelected?'none':isTod?`1.5px solid ${theme.border}`:achiev?`1.5px solid ${achiev.border}`:'1px solid #f3f4f6',
                cursor:'pointer',width:'auto',margin:0,transition:'all 0.15s',
              }}>
                <span>{DAY_KR2[i]}</span>
                {achiev&&!isSelected&&<span style={{fontSize:9,lineHeight:1}}>{achiev.emoji}</span>}
                {isTod&&!achiev&&!isSelected&&<div style={{width:4,height:4,borderRadius:'50%',background:theme.primary}}/>}
              </button>
            );
          })}
        </div>
      </div>

      {/* 월간 달력 */}
      {showCalendar&&(
        <MonthlyCalendar weeklyLog={weeklyLog||{}} lifeItems={lifeItems} viewDate={viewDate} onSelectDate={ds=>{setViewDate(ds);setShowCalendar(false);}}/>
      )}

      {/* 달성 카드 */}
      <div style={{background:cardBg,borderRadius:18,padding:'17px 20px',marginBottom:14,color:achievLevel?achievLevel.badgeColor:'#fff'}}>
        <div style={{display:'flex',alignItems:'center',gap:18}}>
          {/* 원형 게이지 */}
          <div style={{position:'relative',width:78,height:78,flexShrink:0}}>
            <svg width={78} height={78} style={{transform:'rotate(-90deg)'}}>
              <circle cx={39} cy={39} r={30} fill="none" stroke={achievLevel?achievLevel.gaugeBg:'rgba(255,255,255,0.25)'} strokeWidth={8}/>
              <circle cx={39} cy={39} r={30} fill="none" stroke={gaugeStroke} strokeWidth={8}
                strokeDasharray={`${2*Math.PI*30*pct/100} ${2*Math.PI*30}`} strokeLinecap="round"
                style={{transition:'stroke-dasharray 0.6s ease'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:800,color:achievLevel?achievLevel.badgeColor:'#fff'}}>{pct}%</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,opacity:achievLevel?0.7:0.85,marginBottom:2,color:achievLevel?C.text2:'#fff'}}>{dateLabel(viewDate)} 달성률</div>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:6}}>
              <div style={{fontSize:15,fontWeight:700,color:achievLevel?achievLevel.badgeColor:'#fff'}}>{doneToday}/{totalToday} 완료</div>
              {achievLevel&&(
                <span style={{fontSize:11,fontWeight:800,color:achievLevel.badgeColor,background:achievLevel.badgeBg,padding:'2px 9px',borderRadius:20,border:`1.5px solid ${achievLevel.badgeBorder}`}}>
                  {achievLevel.emoji} {achievLevel.label}
                </span>
              )}
            </div>
            <div style={{height:6,background:achievLevel?achievLevel.gaugeBg:'rgba(255,255,255,0.25)',borderRadius:8,overflow:'hidden'}}>
              <div style={{width:`${pct}%`,height:'100%',background:gaugeStroke,borderRadius:8,transition:'width 0.5s ease'}}/>
            </div>
            <div style={{marginTop:5,display:'flex',gap:10,fontSize:11,color:achievLevel?'#6b7280':'rgba(255,255,255,0.75)'}}>
              <span>🌱 1개↑</span><span>💪 50%↑</span><span>🔥 100%</span>
            </div>
          </div>
          <div style={{textAlign:'center',flexShrink:0}}>
            <div style={{fontSize:24,fontWeight:800,color:achievLevel?achievLevel.badgeColor:'#fff'}}>🔥{(streak||{count:0}).count}</div>
            <div style={{fontSize:10,opacity:0.8,color:achievLevel?'#6b7280':'rgba(255,255,255,0.75)'}}>연속</div>
          </div>
        </div>
      </div>

      {/* 과거 / 미래 안내 */}
      {isPast&&(
        <div style={{background:'var(--bg-page)',borderRadius:14,padding:'12px 16px',border:`1.5px solid ${C.border2}`,marginBottom:12,fontSize:13,color:C.muted,textAlign:'center'}}>
          📖 과거 날짜예요. 읽기 전용으로 표시돼요.
        </div>
      )}
      {isFuture&&(
        <div style={{background:'#fdf4ff',borderRadius:14,padding:'12px 16px',border:'1.5px solid #e9d5ff',marginBottom:12,fontSize:13,color:'#7c3aed',textAlign:'center'}}>
          🔮 미래 날짜예요. 루틴 구성 미리보기만 가능해요.
        </div>
      )}

      {/* ✅ 오늘 할 일 섹션 */}
      <div style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text}}>
            ✅ {isToday?'오늘':dateLabel(viewDate)} 할 일
            {totalToday>0&&<span style={{marginLeft:7,fontSize:11,fontWeight:700,color:'#fff',background:theme.primary,padding:'2px 8px',borderRadius:20}}>{totalToday}</span>}
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {isToday&&todayUndone.length>1&&(
              <button onClick={()=>setSortMode(v=>!v)} style={{
                fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:20,cursor:'pointer',width:'auto',margin:0,
                border:`1.5px solid ${sortMode?theme.primary:'#e5e7eb'}`,
                background:sortMode?theme.light:C.card,
                color:sortMode?theme.primary:'#9ca3af',
              }}>{sortMode?'✓ 완료':'⇅ 순서'}</button>
            )}
            {isToday&&<button onClick={()=>openAdd('루틴')} style={{fontSize:11,color:theme.primary,background:'none',border:'none',cursor:'pointer',fontWeight:600,width:'auto',margin:0}}>+ 추가</button>}
          </div>
        </div>

        {totalToday === 0 ? (
          <div style={{background:C.card,borderRadius:16,padding:'28px',textAlign:'center',color:C.muted,fontSize:13,border:`1.5px solid ${C.border}`}}>
            <div style={{fontSize:30,marginBottom:7}}>✨</div>
            {isFuture?'미래 날짜는 루틴 구성 미리보기예요':'이 날은 할 일이 없어요'}
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {/* 미완료 */}
            {todayUndone.map((c,idx)=>(
              <LifeItemCard key={c.id} c={c} onToggle={onToggle} onDelete={onDelete} openEdit={openEdit} updateStreak={updateStreak} lifeItems={lifeItems} viewDate={viewDate} isReadOnly={isPast||isFuture}
                showMoveButtons={sortMode&&isToday}
                onMoveUp={idx>0?()=>handleMoveUp(c.id):null}
                onMoveDown={idx<todayUndone.length-1?()=>handleMoveDown(c.id):null}
              />
            ))}
            {/* 완료 구분선 */}
            {todayDone.length>0&&todayUndone.length>0&&(
              <div style={{display:'flex',alignItems:'center',gap:8,margin:'4px 0'}}>
                <div style={{flex:1,height:1,background:C.border2}}/>
                <span style={{fontSize:11,color:C.muted,fontWeight:600}}>완료된 항목</span>
                <div style={{flex:1,height:1,background:C.border2}}/>
              </div>
            )}
            {todayDone.length>0&&todayUndone.length===0&&(
              <div style={{display:'flex',alignItems:'center',gap:8,margin:'4px 0'}}>
                <div style={{flex:1,height:1,background:'#bbf7d0'}}/>
                <span style={{fontSize:11,color:'#16a34a',fontWeight:700}}>✓ 모두 완료!</span>
                <div style={{flex:1,height:1,background:'#bbf7d0'}}/>
              </div>
            )}
            {/* 완료된 항목들 */}
            {todayDone.map(c=>(
              <LifeItemCard key={c.id} c={c} onToggle={onToggle} onDelete={onDelete} openEdit={openEdit} updateStreak={updateStreak} lifeItems={lifeItems} viewDate={viewDate} isReadOnly={isPast||isFuture}/>
            ))}
          </div>
        )}
      </div>

      {/* 📅 예정된 관리 섹션 */}
      {scheduledItems.length > 0 && (
        <div style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{fontSize:14,fontWeight:800,color:C.text}}>
              📅 예정된 관리
              <span style={{marginLeft:7,fontSize:11,fontWeight:700,color:'#fff',background:'#6b7280',padding:'2px 8px',borderRadius:20}}>{scheduledItems.length}</span>
            </div>
            <button onClick={()=>setScheduledOpen(v=>!v)} style={{fontSize:11,color:C.muted,background:'none',border:'none',cursor:'pointer',width:'auto',margin:0}}>{scheduledOpen?'접기 ▲':'펼치기 ▼'}</button>
          </div>
          {scheduledOpen&&(
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {scheduledItems
                .sort((a,b)=>{
                  const adLeft = a.section!=='루틴'&&a.lastDone ? calcDaysLeft(addDays(a.lastDone,a.intervalDays)) : 999;
                  const bdLeft = b.section!=='루틴'&&b.lastDone ? calcDaysLeft(addDays(b.lastDone,b.intervalDays)) : 999;
                  return adLeft - bdLeft;
                })
                .map(c=>(
                  <ScheduledItemCard key={c.id} c={c} onDelete={onDelete} openEdit={openEdit} viewDate={viewDate}/>
              ))}
            </div>
          )}
        </div>
      )}

      {/* 추가 모달 — today 탭 외부, 항상 렌더 */}
      </>)} {/* end lifeTab==='today' */}

      {/* 추가 모달 */}
      {showAddModal&&(
        <Modal title={editTarget?'항목 수정':'+ 생활 관리 추가'} sub="루틴·생활·청소를 주기로 관리해요" onClose={()=>setShowAddModal(false)} maxWidth={440}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'grid',gridTemplateColumns:'50px 1fr',gap:7}}>
              <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>이모지</div><input placeholder="💧" value={form.emoji} onChange={e=>setForm(p=>({...p,emoji:e.target.value}))} maxLength={2} style={inp({textAlign:'center',fontSize:20})}/></div>
              <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>내용 *</div><input placeholder="예: 빨래 돌리기" value={form.text} onChange={e=>setForm(p=>({...p,text:e.target.value}))} style={inp()} autoFocus/></div>
            </div>
            <div>
              <div style={{fontSize:11,color:C.muted,marginBottom:5}}>종류</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
                {Object.entries(LIFE_SECTIONS).map(([s,sec])=>(
                  <button key={s} onClick={()=>setForm(p=>({...p,section:s,freq:s==='루틴'?'daily':'interval'}))} style={{padding:'10px 5px',borderRadius:11,border:`1.5px solid ${form.section===s?sec.color:sec.border}`,background:form.section===s?sec.bg:C.card,cursor:'pointer',width:'auto',margin:0,textAlign:'center'}}>
                    <div style={{fontSize:16,marginBottom:2}}>{sec.icon}</div>
                    <div style={{fontSize:11,fontWeight:700,color:form.section===s?sec.color:C.text2}}>{sec.label}</div>
                  </button>
                ))}
              </div>
            </div>
            <div style={{background:C.card2,borderRadius:12,padding:'13px',border:`1px solid ${C.border}`}}>
              {form.section==='루틴'?(
                <RepeatPicker form={form} setForm={setForm}/>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <div style={{fontSize:11,color:C.muted,fontWeight:600}}>반복 주기</div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:12,color:C.muted,whiteSpace:'nowrap'}}>매</span>
                    <input type="number" min={1} max={365} value={form.intervalDays||7} onChange={e=>setForm(p=>({...p,intervalDays:Number(e.target.value)}))} style={inp({width:80,textAlign:'center'})}/>
                    <span style={{fontSize:12,color:C.muted,whiteSpace:'nowrap'}}>일마다</span>
                  </div>
                  <div style={{fontSize:11,color:theme.primary,background:theme.light,padding:'6px 10px',borderRadius:8,fontWeight:600}}>⏱ {form.intervalDays||7}일마다 한 번</div>
                </div>
              )}
            </div>
            {(form.section==='청소'||form.section==='생활')&&(
              <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>메모 (선택)</div>

const SHOP_CATEGORIES = ['과일/채소','정육/수산','유제품','가공식품','양념/소스','생활용품','기타'];

function ShoppingPage({foods, fb, user}) {
  const theme = useTheme();
  const [items, setItems] = React.useState([]);
  const [input, setInput] = React.useState('');
  const [category, setCategory] = React.useState('기타');
  const [filterDone, setFilterDone] = React.useState(false);

  // Firestore 실시간
  React.useEffect(() => {
    if(!fb||!user) return;
    const unsub = fb.onSnapshot(fb.collection(fb.db,'users',user.uid,'shoppingItems'), snap => {
      setItems(snap.docs.map(d => ({...d.data(), id:d.id})));
    });
    return () => unsub();
  }, [fb, user]);

  async function addItem() {
    if(!input.trim()||!fb||!user) return;
    await fb.addDoc(fb.collection(fb.db,'users',user.uid,'shoppingItems'), {
      text: input.trim(), category, done: false, createdAt: new Date().toISOString()
    });
    setInput('');
  }
  async function toggleItem(id, done) {
    if(!fb||!user) return;
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'shoppingItems',id), {done:!done});
  }
  async function deleteItem(id) {
    if(!fb||!user) return;
    await fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'shoppingItems',id));
  }
  async function clearDone() {
    if(!fb||!user) return;
    const done = items.filter(i=>i.done);
    await Promise.all(done.map(i => fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'shoppingItems',i.id))));
  }

  // 임박 식재료 → 자동 제안
  const suggestions = foods
    .map(f=>({...f, dl:calcDaysLeft(f.expiryDate)}))
    .filter(f=>f.dl<=2&&f.dl>=0)
    .filter(f=>!items.some(i=>i.text.includes(f.name)));

  const undone = items.filter(i=>!i.done).sort((a,b)=>SHOP_CATEGORIES.indexOf(a.category)-SHOP_CATEGORIES.indexOf(b.category));
  const done = items.filter(i=>i.done);
  const byCategory = SHOP_CATEGORIES.map(cat=>({cat, items: undone.filter(i=>i.category===cat)})).filter(g=>g.items.length>0);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:18}}>
        <div>
          <div style={{fontSize:21,fontWeight:800,color:C.text,marginBottom:3}}>🛒 장보기 목록</div>
          <div style={{fontSize:13,color:C.muted}}>필요한 것들을 미리 정리해요</div>
        </div>
        {done.length>0&&<button onClick={clearDone} style={{fontSize:12,color:C.muted,background:'none',border:'none',cursor:'pointer',fontWeight:600,width:'auto',margin:0}}>완료 항목 삭제</button>}
      </div>

      {/* 임박 식재료 자동 제안 */}
      {suggestions.length>0&&(
        <div style={{background:'linear-gradient(135deg,#fff7ed,#ffedd5)',borderRadius:16,padding:'14px 16px',marginBottom:14,border:'1.5px solid #fed7aa'}}>
          <div style={{fontSize:12,fontWeight:700,color:'#ea580c',marginBottom:8}}>🔔 곧 떨어질 것들이에요</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {suggestions.map(f=>(
              <button key={f.id} onClick={async()=>{
                if(!fb||!user) return;
                await fb.addDoc(fb.collection(fb.db,'users',user.uid,'shoppingItems'), {
                  text:f.name, category:'기타', done:false, createdAt:new Date().toISOString(), emoji:f.emoji
                });
              }} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 11px',borderRadius:20,border:'1.5px solid #fed7aa',background:C.card,cursor:'pointer',fontSize:12,fontWeight:600,color:'#ea580c',width:'auto',margin:0}}>
                {f.emoji} {f.name} <span style={{fontSize:10,opacity:0.7}}>D-{f.dl}</span> +
              </button>
            ))}
          </div>
        </div>
      )}

      {/* 입력 */}
      <div style={{background:C.card,borderRadius:16,padding:'14px 16px',marginBottom:14,border:`1.5px solid ${C.border}`}}>
        <div style={{display:'flex',gap:7,marginBottom:8}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addItem()}
            placeholder="항목 입력 후 Enter"
            style={{flex:1,padding:'10px 13px',border:`1.5px solid ${theme.mid}`,borderRadius:11,fontSize:14,outline:'none',background:C.input}}
            onFocus={e=>e.target.style.borderColor=theme.primary}
            onBlur={e=>e.target.style.borderColor=theme.mid}
          />
          <button onClick={addItem} style={{padding:'10px 16px',borderRadius:11,border:'none',background:theme.primary,color:C.card,fontSize:14,fontWeight:700,cursor:'pointer',width:'auto',margin:0}}>추가</button>
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {SHOP_CATEGORIES.map(c=>(
            <button key={c} onClick={()=>setCategory(c)} style={{padding:'4px 10px',borderRadius:20,border:`1.5px solid ${category===c?theme.primary:'#e5e7eb'}`,background:category===c?theme.light:C.card,color:category===c?theme.primary:'#6b7280',fontSize:11,fontWeight:category===c?700:400,cursor:'pointer',width:'auto',margin:0}}>{c}</button>
          ))}
        </div>
      </div>

      {/* 미완료 — 카테고리별 */}
      {undone.length===0&&done.length===0&&(
        <div style={{background:C.card,borderRadius:16,padding:'32px',textAlign:'center',color:C.muted,border:`1.5px solid ${C.border}`}}>
          <div style={{fontSize:36,marginBottom:8}}>🛒</div>
          <div style={{fontSize:14,fontWeight:600}}>장보기 목록이 비어있어요</div>
          <div style={{fontSize:12,marginTop:4}}>필요한 것들을 추가해봐요</div>
        </div>
      )}
      {byCategory.map(({cat,items:catItems})=>(
        <div key={cat} style={{background:C.card,borderRadius:16,padding:'14px 16px',marginBottom:10,border:`1.5px solid ${C.border}`}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text2,marginBottom:8}}>{cat} <span style={{color:C.muted,fontWeight:400}}>({catItems.length})</span></div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {catItems.map(item=>(
              <div key={item.id} style={{display:'flex',alignItems:'center',gap:10}}>
                <div onClick={()=>toggleItem(item.id,item.done)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:'pointer',background:item.done?theme.primary:'transparent',border:`2px solid ${item.done?theme.primary:'#d1d5db'}`,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>
                  {item.done&&<span style={{color:'#fff',fontSize:10,fontWeight:700}}>✓</span>}
                </div>
                <span style={{flex:1,fontSize:14,color:item.done?C.muted:C.text,textDecoration:item.done?'line-through':'none'}}>{item.emoji||''} {item.text}</span>
                <button onClick={()=>deleteItem(item.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:14,padding:0,width:'auto',margin:0}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>✕</button>
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* 완료된 항목 */}
      {done.length>0&&(
        <div style={{background:C.card2,borderRadius:16,padding:'14px 16px',border:`1.5px solid ${C.border}`}}>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8}}>✓ 완료 ({done.length})</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {done.map(item=>(
              <div key={item.id} style={{display:'flex',alignItems:'center',gap:10,opacity:0.6}}>
                <div onClick={()=>toggleItem(item.id,item.done)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:'pointer',background:theme.primary,border:`2px solid ${theme.primary}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span style={{color:'#fff',fontSize:10,fontWeight:700}}>✓</span>
                </div>
                <span style={{flex:1,fontSize:14,color:C.muted,textDecoration:'line-through'}}>{item.text}</span>
                <button onClick={()=>deleteItem(item.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:14,padding:0,width:'auto',margin:0}}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ReportPage({weeklyLog, lifeItems, foods, streak}) {
  const theme = useTheme();
  const now = new Date();
  const [reportMonth, setReportMonth] = React.useState(now.getMonth());
  const [reportYear, setReportYear] = React.useState(now.getFullYear());

  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const daysInMonth = new Date(reportYear, reportMonth+1, 0).getDate();

  // 해당 월 로그 수집
  const monthDays = Array.from({length:daysInMonth},(_,i)=>{
    const d = i+1;
    const ds = `${reportYear}-${String(reportMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const log = (weeklyLog||{})[ds];
    return {d, ds, log};
  });

  const activeDays = monthDays.filter(d=>d.log>0).length;
  const perfectDays = monthDays.filter(d=>d.log>=100).length;
  const effortDays = monthDays.filter(d=>d.log>=50&&d.log<100).length;

  const expiredCount = foods.filter(f=>calcDaysLeft(f.expiryDate)<0).length;

      </div>

      {/* 핵심 지표 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:16}}>
        {[
          {label:'활동한 날',value:`${activeDays}일`,sub:`${daysInMonth}일 중`,emoji:'📅',bg:'#f0fdf4',color:'#16a34a'},
          {label:'평균 달성률',value:`${avgLog}%`,sub:'활동한 날 기준',emoji:'📈',bg:theme.bg,color:theme.primary},
          {label:'이번 달 최장',value:`${maxStreak}일`,sub:'연속 달성',emoji:'🔥',bg:'#fff7ed',color:'#ea580c'},
          {label:'완벽 달성',value:`${perfectDays}일`,sub:'100% 완료한 날',emoji:'🌟',bg:'#fdf4ff',color:'#7c3aed'},
        ].map(s=>(

            <div style={{fontSize:24,fontWeight:800,color:s.color,lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:3}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* 달성 히트맵 */}
      <div style={{background:C.card,borderRadius:18,padding:'16px',border:`1.5px solid ${C.border}`,marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text2,marginBottom:10}}>📆 일별 달성 현황</div>
        <div style={{display:'flex',gap:4,marginBottom:8,flexWrap:'wrap'}}>
          {[{color:'#f0fdf4',border:'#22c55e',label:'🌱 시작'},{color:'#eff6ff',border:'#3b82f6',label:'💪 노력'},{color:'#fff7ed',border:'#f97316',label:'🔥 완벽'},{color:'#f9fafb',border:'#e5e7eb',label:'기록없음'}].map(s=>(

            <div key={d} style={{aspectRatio:'1',borderRadius:5,background:getAchievBg(log),border:`1.5px solid ${getAchievColor(log)}22`,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:1}}>

              {log>=100&&<span style={{fontSize:7,lineHeight:1}}>🔥</span>}
              {log>=50&&log<100&&<span style={{fontSize:7,lineHeight:1}}>💪</span>}

function DiaryPage({fb, user}) {
  const theme = useTheme();
  const [memos, setMemos] = React.useState([]);
  const [selectedDate, setSelectedDate] = React.useState(getToday());
  const [content, setContent] = React.useState('');
  const [mood, setMood] = React.useState('😊');
  const [saving, setSaving] = React.useState(false);
  const [viewMode, setViewMode] = React.useState('write'); // 'write' | 'list'

  const MOODS = ['😊','😄','😐','😔','😴','🔥','💪','🥺','😤','🌟'];

  React.useEffect(()=>{
    if(!fb||!user) return;
    const unsub = fb.onSnapshot(fb.collection(fb.db,'users',user.uid,'diaries'), snap=>{
      setMemos(snap.docs.map(d=>({...d.data(),id:d.id})).sort((a,b)=>b.date.localeCompare(a.date)));
    });
    return ()=>unsub();
  },[fb,user]);

  // 날짜 바꾸면 기존 메모 불러오기
  React.useEffect(()=>{
    const existing = memos.find(m=>m.date===selectedDate);
    setContent(existing?.content||'');
    setMood(existing?.mood||'😊');
  },[selectedDate, memos]);

  async function saveMemo() {
    if(!fb||!user||!content.trim()) return;
    setSaving(true);
    const existing = memos.find(m=>m.date===selectedDate);
    if(existing) {
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'diaries',existing.id), {content:content.trim(),mood,updatedAt:new Date().toISOString()});
    } else {
      await fb.addDoc(fb.collection(fb.db,'users',user.uid,'diaries'), {date:selectedDate,content:content.trim(),mood,createdAt:new Date().toISOString()});
    }
    setSaving(false);
  }

  async function deleteMemo(id) {
    if(!fb||!user) return;
    await fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'diaries',id));
  }

  function dateLabel2(ds) {
    const d=new Date(ds+'T00:00:00');
    const days=['일','월','화','수','목','금','토'];
    return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  }

  const hasMemo = memos.some(m=>m.date===selectedDate);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:18}}>
        <div>
          <div style={{fontSize:21,fontWeight:800,color:C.text,marginBottom:3}}>📔 하루 기록</div>
          <div style={{fontSize:13,color:C.muted}}>오늘을 기억해요 ✍️</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setViewMode('write')} style={{padding:'6px 12px',borderRadius:20,border:`1.5px solid ${viewMode==='write'?theme.primary:'#e5e7eb'}`,background:viewMode==='write'?theme.light:'#fff',color:viewMode==='write'?theme.primary:'#9ca3af',fontSize:12,fontWeight:700,cursor:'pointer',width:'auto',margin:0}}>✏️ 쓰기</button>
          <button onClick={()=>setViewMode('list')} style={{padding:'6px 12px',borderRadius:20,border:`1.5px solid ${viewMode==='list'?theme.primary:'#e5e7eb'}`,background:viewMode==='list'?theme.light:'#fff',color:viewMode==='list'?theme.primary:'#9ca3af',fontSize:12,fontWeight:700,cursor:'pointer',width:'auto',margin:0}}>📖 목록</button>
        </div>
      </div>

      {viewMode==='write'&&(
        <div>
          {/* 날짜 선택 */}
          <div style={{background:C.card,borderRadius:16,padding:'12px 16px',marginBottom:12,border:`1.5px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
            <input type="date" value={selectedDate} max={getToday()} onChange={e=>setSelectedDate(e.target.value)}
              style={{border:'none',background:'transparent',fontSize:14,fontWeight:700,color:C.text,outline:'none',cursor:'pointer'}}/>
            {hasMemo&&<span style={{fontSize:11,color:theme.primary,background:theme.light,padding:'2px 8px',borderRadius:20,fontWeight:700}}>기록 있음</span>}
          </div>

          {/* 기분 선택 */}
          <div style={{background:C.card,borderRadius:16,padding:'14px 16px',marginBottom:12,border:`1.5px solid ${C.border}`}}>
            <div style={{fontSize:12,color:C.muted,fontWeight:600,marginBottom:8}}>오늘 기분은?</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {MOODS.map(m=>(
                <button key={m} onClick={()=>setMood(m)} style={{
                  width:38,height:38,borderRadius:10,fontSize:20,border:`2px solid ${mood===m?theme.primary:'#f3f4f6'}`,
                  background:mood===m?theme.light:C.card,cursor:'pointer',margin:0,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'
                }}>{m}</button>
              ))}
            </div>
          </div>

          {/* 텍스트 입력 */}
          <div style={{background:C.card,borderRadius:16,padding:'14px 16px',marginBottom:12,border:`1.5px solid ${C.border}`}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{fontSize:20}}>{mood}</span>
              <span style={{fontSize:13,fontWeight:700,color:C.text2}}>{dateLabel2(selectedDate)}</span>
            </div>
            <textarea value={content} onChange={e=>setContent(e.target.value)}
              placeholder="오늘 어땠나요? 자유롭게 기록해보세요 ✍️"
              rows={6}
              style={{width:'100%',border:'none',resize:'none',fontSize:14,color:C.text,lineHeight:1.7,outline:'none',background:'transparent',fontFamily:'inherit'}}
            />
          </div>

          <button onClick={saveMemo} disabled={saving||!content.trim()} style={{
            width:'100%',padding:'14px',borderRadius:14,border:'none',
            background:content.trim()?(saving?theme.mid:theme.primary):'#f3f4f6',
            color:content.trim()?'#fff':'#9ca3af',fontSize:15,fontWeight:700,cursor:content.trim()?'pointer':'default',marginBottom:10,
          }}>{saving?'저장 중...':'저장하기'}</button>
        </div>
      )}

      {viewMode==='list'&&(
        <div>
          {memos.length===0?(
            <div style={{background:C.card,borderRadius:16,padding:'40px',textAlign:'center',color:C.muted,border:`1.5px solid ${C.border}`}}>
              <div style={{fontSize:36,marginBottom:8}}>📔</div>
              <div style={{fontSize:14,fontWeight:600}}>아직 기록이 없어요</div>
            </div>
          ):memos.map(m=>(
            <div key={m.id} style={{background:C.card,borderRadius:16,padding:'16px',marginBottom:10,border:`1.5px solid ${C.border}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:18}}>{m.mood}</span>
                  <span style={{fontSize:13,fontWeight:700,color:C.text2}}>{dateLabel2(m.date)}</span>
                </div>
                <button onClick={()=>deleteMemo(m.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:14,padding:0,width:'auto',margin:0}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>✕</button>
              </div>
              <div style={{fontSize:13,color:C.text2,lineHeight:1.7,whiteSpace:'pre-wrap'}}>{m.content}</div>
              <button onClick={()=>{setSelectedDate(m.date);setViewMode('write');}} style={{marginTop:8,fontSize:11,color:theme.primary,background:'none',border:'none',cursor:'pointer',padding:0,fontWeight:600,width:'auto'}}>수정하기 →</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// 이번 주 월요일 날짜 구하기
function getWeekStart() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  return monday.getFullYear()+'-'+String(monday.getMonth()+1).padStart(2,'0')+'-'+String(monday.getDate()).padStart(2,'0');
}

function SharePage({fb, user, lifeItems, foods}) {
  const theme = useTheme();
  const [shareCode, setShareCode] = React.useState('');
  const [inputCode, setInputCode] = React.useState('');
  const [sharedWith, setSharedWith] = React.useState([]);
  const [sharedFrom, setSharedFrom] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [msg, setMsg] = React.useState('');

  React.useEffect(()=>{
    if(!fb||!user) return;
    // 내 공유 코드 가져오기
    fb.getDoc(fb.doc(fb.db,'users',user.uid)).then(snap=>{
      if((typeof snap.exists === 'function' ? snap.exists() : Boolean(snap.exists))) {
        const d = snap.data();
        setShareCode(d.shareCode||'');
        setSharedWith(d.sharedWith||[]);
        setSharedFrom(d.sharedFrom||null);
      }
    });
  },[fb,user]);

  async function generateCode() {
    if(!fb||!user) return;
    const code = Math.random().toString(36).slice(2,8).toUpperCase();
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid), {shareCode:code});
    setShareCode(code);
  }

  async function connectShare() {
    if(!fb||!user||!inputCode.trim()) return;
    setLoading(true); setMsg('');
    try {
      // 코드로 사용자 찾기
      // (compat 방식 - fb 객체 직접 사용)
            await fb.updateDoc(fb.doc(fb.db,'users',user.uid), {sharedFrom:inputCode.trim().toUpperCase()});
      setSharedFrom(inputCode.trim().toUpperCase());
      setMsg('연결 요청을 보냈어요!');
    } catch(e) { setMsg('오류가 발생했어요.'); }
    setLoading(false);
  }

  // 공유된 내 오늘 현황
  const todayStr = getToday();
  const todayDue = lifeItems.filter(c=>isDueOn(c,todayStr));
  const todayDoneCount = todayDue.filter(c=>isDoneOn(c,todayStr)).length;

  return (
    <div>
      <div style={{marginBottom:18}}>
        <div style={{fontSize:21,fontWeight:800,color:C.text,marginBottom:3}}>👥 공유</div>
        <div style={{fontSize:13,color:C.muted}}>룸메이트와 생활 관리를 함께해요</div>
      </div>

      {/* 내 공유 코드 */}
      <div style={{background:'linear-gradient(135deg,'+theme.bg+','+theme.light+')',borderRadius:18,padding:'20px',marginBottom:14,border:`1.5px solid ${theme.mid}`}}>
        <div style={{fontSize:13,fontWeight:700,color:theme.primary,marginBottom:8}}>📤 내 공유 코드</div>
        {shareCode ? (
          <div>
            <div style={{fontSize:32,fontWeight:900,color:theme.primary,letterSpacing:4,textAlign:'center',padding:'12px',background:C.card,borderRadius:12,border:`2px dashed ${theme.border}`,marginBottom:8}}>{shareCode}</div>
            <div style={{fontSize:11,color:C.muted,textAlign:'center'}}>이 코드를 룸메이트에게 알려주세요</div>
            <button onClick={()=>{navigator.clipboard?.writeText(shareCode);setMsg('복사됐어요!');setTimeout(()=>setMsg(''),2000);}} style={{width:'100%',marginTop:8,padding:'9px',borderRadius:10,border:`1.5px solid ${theme.mid}`,background:C.card,color:theme.primary,fontSize:12,fontWeight:700,cursor:'pointer',margin:0}}>코드 복사</button>
          </div>
        ):(
          <button onClick={generateCode} style={{width:'100%',padding:'12px',borderRadius:12,border:'none',background:theme.primary,color:C.card,fontSize:14,fontWeight:700,cursor:'pointer',margin:0}}>공유 코드 생성</button>
        )}
      </div>

      {/* 코드로 연결 */}
      <div style={{background:C.card,borderRadius:18,padding:'20px',marginBottom:14,border:`1.5px solid ${C.border}`}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text2,marginBottom:10}}>📥 룸메이트 코드 입력</div>
        <div style={{display:'flex',gap:7}}>
          <input value={inputCode} onChange={e=>setInputCode(e.target.value.toUpperCase())} maxLength={6}
            placeholder="6자리 코드"
            style={{flex:1,padding:'11px 14px',border:`1.5px solid ${C.border2}`,borderRadius:11,fontSize:16,outline:'none',letterSpacing:3,fontWeight:700,textTransform:'uppercase'}}
            onFocus={e=>e.target.style.borderColor=theme.primary}
            onBlur={e=>e.target.style.borderColor='#e5e7eb'}
          />
          <button onClick={connectShare} disabled={loading||inputCode.length<6} style={{padding:'11px 16px',borderRadius:11,border:'none',background:inputCode.length>=6?theme.primary:'#e5e7eb',color:inputCode.length>=6?'#fff':'#9ca3af',fontSize:14,fontWeight:700,cursor:inputCode.length>=6?'pointer':'default',width:'auto',margin:0}}>연결</button>
        </div>
        {sharedFrom&&<div style={{marginTop:8,fontSize:12,color:'#16a34a',fontWeight:600}}>✓ {sharedFrom} 코드와 연결 중</div>}
        {msg&&<div style={{marginTop:8,fontSize:12,color:theme.primary,fontWeight:600}}>{msg}</div>}
      </div>

      {/* 내 현황 미리보기 */}
      <div style={{background:C.card,borderRadius:18,padding:'20px',border:`1.5px solid ${C.border}`}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text2,marginBottom:10}}>📊 공유될 내 현황</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'flex',justifyContent:'space-between',padding:'10px 12px',background:C.card2,borderRadius:10}}>
            <span style={{fontSize:13,color:C.text3}}>오늘 달성</span>
            <span style={{fontSize:13,fontWeight:700,color:theme.primary}}>{todayDoneCount}/{todayDue.length}개</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',padding:'10px 12px',background:C.card2,borderRadius:10}}>
            <span style={{fontSize:13,color:C.text3}}>등록 식재료</span>
            <span style={{fontSize:13,fontWeight:700,color:C.text2}}>{foods.length}개</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',padding:'10px 12px',background:C.card2,borderRadius:10}}>
            <span style={{fontSize:13,color:C.text3}}>생활 관리 항목</span>
            <span style={{fontSize:13,fontWeight:700,color:C.text2}}>{lifeItems.length}개</span>
          </div>
        </div>
        <div style={{marginTop:10,fontSize:11,color:C.muted,textAlign:'center'}}>💡 공유 기능은 현재 베타 버전이에요</div>
      </div>
    </div>
  );
}

function useFirebase() {
  const [fb, setFb] = React.useState(window._firebase || null);
  React.useEffect(() => {
    if(window._firebaseReady) { setFb(window._firebase); return; }
    const handler = () => setFb(window._firebase);
    window.addEventListener('firebaseReady', handler);
    return () => window.removeEventListener('firebaseReady', handler);
  }, []);
  return fb;
}
