function AuthScreen({mode, onSuccess, onBack}) {
  const fb = useFirebase();
  const [isLogin, setIsLogin] = React.useState(mode === 'login');
  const [email, setEmail] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [name, setName] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');

  async function handleEmail(e) {
    e.preventDefault();
    if(!fb) return;
    setLoading(true); setError('');
    try {
      let cred;
      if(isLogin) {
        cred = await fb.signInWithEmailAndPassword(fb.auth, email, pw);
      } else {
        cred = await fb.createUserWithEmailAndPassword(fb.auth, email, pw);
        if(name.trim()) await fb.updateProfile(cred.user, {displayName: name.trim()});
      }
      onSuccess(cred.user);
    } catch(err) {
      const msgs = {
        'auth/user-not-found':'등록된 이메일이 없어요',
        'auth/wrong-password':'비밀번호가 틀렸어요',
        'auth/email-already-in-use':'이미 사용 중인 이메일이에요',
        'auth/weak-password':'비밀번호는 6자 이상이어야 해요',
        'auth/invalid-email':'이메일 형식이 올바르지 않아요',
        'auth/invalid-credential':'이메일 또는 비밀번호가 틀렸어요',
      };
      setError(msgs[err.code] || '오류가 발생했어요. 다시 시도해주세요.');
    }
    setLoading(false);
  }

  async function handleGoogle() {
    if(!fb) return;
    setLoading(true); setError('');
    try {
      const cred = await fb.signInWithPopup(fb.auth, fb.googleProvider);
      onSuccess(cred.user);
    } catch(err) {
      setError('구글 로그인에 실패했어요.');
    }
    setLoading(false);
  }

  const inputStyle = {width:'100%',padding:'13px 16px',border:`1.5px solid ${C.border2}`,borderRadius:14,fontSize:14,outline:'none',background:C.input,boxSizing:'border-box',transition:'border-color 0.15s'};

  return (
    <div className="fade-in" style={{minHeight:'100vh',background:'linear-gradient(160deg,#f5f3ff,#ede9fe)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:C.card,borderRadius:28,padding:'32px 28px',width:'100%',maxWidth:380,boxShadow:'0 24px 64px rgba(124,58,237,0.15)'}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:13,padding:0,marginBottom:20,display:'flex',alignItems:'center',gap:5,width:'auto'}}>
          ← 뒤로
        </button>
        <div style={{fontSize:26,marginBottom:6}}>🏠</div>
        <div style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:4}}>
          {isLogin ? '다시 만나서 반가워요!' : '함께 시작해요!'}
        </div>
        <div style={{fontSize:13,color:C.muted,marginBottom:24}}>
          {isLogin ? '로그인하고 생활 관리를 계속해요' : '무료로 시작하고 모든 기기에서 동기화해요'}
        </div>

        {/* 구글 로그인 */}
        <button onClick={handleGoogle} disabled={loading} style={{width:'100%',padding:'13px',borderRadius:14,border:`1.5px solid ${C.border2}`,background:C.card,fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:16,color:C.text2}}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.5 30.1 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6c1.8-5.4 6.8-9.8 13.6-9.8z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/><path fill="#34A853" d="M24 48c6.1 0 11.2-2 14.9-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.4 2.2-6.7 0-12.4-4.5-14.4-10.6l-7.8 6C6.5 42.5 14.6 48 24 48z"/></svg>

          </button>
        </form>

        <button onClick={()=>{setIsLogin(!isLogin);setError('');}} style={{width:'100%',marginTop:14,padding:'10px',borderRadius:12,border:'none',background:'transparent',color:'#7c3aed',fontSize:13,cursor:'pointer',fontWeight:600}}>
          {isLogin?'계정이 없어요 → 회원가입':'이미 계정이 있어요 → 로그인'}
        </button>
      </div>
    </div>
  );
}

// 상황별 추천 — 정교화된 알고리즘
function getSituationalRecs(foods, lifeItems) {
  const recs = [];
  const today = new Date(); today.setHours(0,0,0,0);

  // ── 식재료 분석 ──
  const withDl = foods.map(f => ({...f, dl: calcDaysLeft(f.expiryDate)}));
  const expiredFoods = withDl.filter(f => f.dl < 0);
  const todayFoods = withDl.filter(f => f.dl === 0);
  const urgentFoods = withDl.filter(f => f.dl >= 1 && f.dl <= 2);
  const soonFoods = withDl.filter(f => f.dl >= 1 && f.dl <= 5);
  const fridgeFoods = withDl.filter(f => f.storage === '냉장');

  // ── 생활 항목 분석 ──
  const todayStr2 = getToday();
  const routines = lifeItems.filter(c => c.section === '루틴');
  const todayRoutines = routines.filter(c => isTodayItem(c));
  const doneToday = todayRoutines.filter(c => isDoneOn(c, todayStr2)).length;
  const totalToday = todayRoutines.length;
  const routinePct = totalToday ? doneToday / totalToday : 0;

  const cleanItems = lifeItems.filter(c => c.section === '청소');
  const lifeManageItems = lifeItems.filter(c => c.section === '생활');

  // 주기 초과 항목
  const overdueClean = cleanItems.filter(c => c.lastDone && daysSince(c.lastDone) > c.intervalDays);
  const overdueLife = lifeManageItems.filter(c => c.lastDone && daysSince(c.lastDone) > c.intervalDays);
  const overdueAll = [...overdueClean, ...overdueLife].sort((a,b) => {
    const aDays = daysSince(a.lastDone) - a.intervalDays;
    const bDays = daysSince(b.lastDone) - b.intervalDays;
    return bDays - aDays; // 가장 오래된 것 먼저
  });

  // 오늘 할 빨래/특정 항목
  const laundryItem = lifeManageItems.find(c => c.text.includes('빨래'));
  const laundryOverdue = laundryItem && laundryItem.lastDone && daysSince(laundryItem.lastDone) >= (laundryItem.intervalDays || 4);
  const bedItem = lifeManageItems.find(c => c.text.includes('침구'));
  const bedOverdue = bedItem && bedItem.lastDone && daysSince(bedItem.lastDone) >= (bedItem.intervalDays || 14);

  // ── 우선순위별 추천 생성 ──

  // P1: 오늘 마감/기간초과 식재료
  if(expiredFoods.length > 0) recs.push({
    priority: 1, emoji: '⚠️', type: 'food',
    title: `기간 초과 식재료가 ${expiredFoods.length}개 있어요`,
    desc: `${expiredFoods.slice(0,2).map(f=>f.name).join(', ')} 등 — 지금 바로 확인해요`,
    action: 'food', actionLabel: '확인하기',
    bg: '#fef2f2', border: '#fecaca', accent: '#ef4444'
  });
  if(todayFoods.length > 0) recs.push({
    priority: 1, emoji: '🚨', type: 'food',
    title: `오늘 마감 식재료 ${todayFoods.length}개`,
    desc: `${todayFoods.map(f=>f.name).join(', ')} — 오늘 꼭 드세요`,
    action: 'food', actionLabel: '확인하기',
    bg: '#fef2f2', border: '#fecaca', accent: '#ef4444'
  });

  // P2: 내일/모레 마감 → 요리 추천
  if(urgentFoods.length >= 1) recs.push({
    priority: 2, emoji: '🍳', type: 'cook',
    title: `${urgentFoods[0].name}${urgentFoods.length > 1 ? ` 등 ${urgentFoods.length}개` : ''} 곧 마감돼요`,
    desc: `D-${urgentFoods[0].dl} · 지금 요리하면 딱 좋아요 → 만개의레시피`,
    appId: 3, action: 'hub', actionLabel: '레시피 보기',
    bg: '#fff7ed', border: '#fed7aa', accent: '#f97316'
  });

  // P3: 주기 초과 생활관리 (가장 오래된 것)
  if(overdueAll.length > 0) {
    const worst = overdueAll[0];
    const overDays = daysSince(worst.lastDone) - worst.intervalDays;
    recs.push({
      priority: 2, emoji: worst.emoji || '🧹', type: 'life',
      title: `${worst.text} ${overDays}일 지났어요`,
      desc: `${worst.intervalDays}일 주기 · 마지막: ${daysSince(worst.lastDone)}일 전`,
      action: 'life', actionLabel: '하러가기',
      bg: '#fefce8', border: '#fef08a', accent: '#ca8a04'
    });
  }
  if(overdueAll.length >= 3) recs.push({
    priority: 2, emoji: '🧹', type: 'clean',
    title: `청소/관리 항목 ${overdueAll.length}개가 밀렸어요`,
    desc: '청소연구소 서비스를 이용해보는 건 어때요?',
    appId: 10, action: 'hub', actionLabel: '알아보기',
    bg: '#f0fdf4', border: '#bbf7d0', accent: '#16a34a'
  });

  // P4: 빨래/침구
  if(laundryOverdue) recs.push({
    priority: 3, emoji: '🧺', type: 'laundry',
    title: `빨래 미룬 지 ${daysSince(laundryItem.lastDone)}일 됐어요`,
    desc: '날씨 확인하고 지금 돌려요 → 기상청',
    siteId: 5, action: 'hub', actionLabel: '날씨 확인',
    bg: '#eff6ff', border: '#bfdbfe', accent: '#2563eb'
  });
  if(bedOverdue) recs.push({
    priority: 3, emoji: '🛏️', type: 'bed',
    title: `침구 세탁 ${daysSince(bedItem.lastDone)}일 됐어요`,
    desc: `${bedItem.intervalDays}일 주기 · 슬슬 세탁할 때예요`,
    action: 'life', actionLabel: '하러가기',
    bg: '#fdf4ff', border: '#e9d5ff', accent: '#7c3aed'
  });

  // P5: 루틴 달성 상태
  if(totalToday > 0 && routinePct === 1) recs.push({
    priority: 4, emoji: '🔥', type: 'cheer',
    title: '오늘 루틴 모두 완료!',
    desc: '정말 대단해요! 내일도 이 기세로 💪',
    action: null, actionLabel: null,
    bg: '#fff7ed', border: '#fed7aa', accent: '#ea580c'
  });
  else if(totalToday > 0 && doneToday === 0 && new Date().getHours() >= 20) recs.push({
    priority: 3, emoji: '🌙', type: 'routine',
    title: '저녁인데 오늘 루틴을 아직 안 했어요',
    desc: `${totalToday}개 남았어요 — 자기 전에 하나라도 해봐요`,
    action: 'life', actionLabel: '하러가기',
    bg: '#f5f3ff', border: '#ddd6fe', accent: '#7c3aed'
  });
  else if(totalToday > 0 && routinePct > 0 && routinePct < 1) recs.push({
    priority: 4, emoji: '🌱', type: 'routine',
    title: `루틴 ${doneToday}/${totalToday} 진행 중이에요`,
    desc: `${totalToday - doneToday}개 남았어요 — 조금만 더!`,
    action: 'life', actionLabel: '계속하기',
    bg: '#f0fdf4', border: '#bbf7d0', accent: '#16a34a'
  });

  // P6: 냉장고 식재료 없을 때
  if(fridgeFoods.length === 0 && foods.length === 0) recs.push({
    priority: 4, emoji: '🛒', type: 'shop',
    title: '냉장고가 비어있어요',
    desc: '장보기 전에 유통기한 관리도 시작해봐요',
    action: 'food', actionLabel: '식재료 추가',
    bg: '#f5f3ff', border: '#ddd6fe', accent: '#7c3aed'
  });

  // P7: 가계부/절약 — 항목 없으면 앱 추천
  if(lifeItems.length === 0) recs.push({
    priority: 5, emoji: '💰', type: 'finance',
    title: '생활비도 관리해봐요',
    desc: '뱅크샐러드로 지출 자동 분석하기',
    appId: 6, action: 'hub', actionLabel: '알아보기',
    bg: '#fefce8', border: '#fef08a', accent: '#ca8a04'
  });

  // 기본 — 아무것도 없으면
  if(recs.length === 0) {
    const hour = new Date().getHours();
    const cheerMsgs = [
      {emoji:'✨', title:'생활 완벽하게 유지 중이에요!', desc:'오늘도 멋진 하루 보내세요 💜'},
      {emoji:'🏠', title:'집도 생활도 깔끔하네요', desc:'이번 주도 잘 하고 있어요 👍'},
      {emoji:'🌟', title:'식재료도 루틴도 완벽해요', desc:'자취 고수 인증! 🎉'},
    ];
    const msg = cheerMsgs[new Date().getDate() % cheerMsgs.length];
    recs.push({priority: 5, ...msg, type: 'cheer', action: null, actionLabel: null, bg: '#f5f3ff', border: '#ddd6fe', accent: '#7c3aed'});
  }

  // 우선순위 정렬 후 최대 4개
  return recs.sort((a,b) => a.priority - b.priority).slice(0, 4);
}

  const theme=useTheme();
  const [editName, setEditName] = React.useState(userName);
  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved] = React.useState(false);

  const SECTION_COLORS = [
    {id:'purple',label:'보라',primary:'#7c3aed',bg:'#f5f3ff',border:'#ddd6fe'},

    {id:'green',label:'초록',primary:'#16a34a',bg:'#f0fdf4',border:'#bbf7d0'},
    {id:'rose',label:'로즈',primary:'#e11d48',bg:'#fff1f2',border:'#fda4af'},

function Onboarding({userName, onComplete}) {
  const [step, setStep] = React.useState(0);
  const [lifeChoice, setLifeChoice] = React.useState(null);
  const [selectedAnimal, setSelectedAnimal] = React.useState('🐻');
  const [selectedTheme, setSelectedTheme] = React.useState('purple');

  const TOTAL_STEPS = 3;
  const theme = getTheme(selectedTheme);

  const cardStyle = {background:C.card,borderRadius:28,padding:'30px 26px',width:'100%',maxWidth:420,boxShadow:'0 24px 64px rgba(0,0,0,0.12)'};

  const nextBtn = (onClick, disabled, label='다음 →') => (
    <button onClick={onClick} disabled={disabled} style={{width:'100%',padding:'14px',borderRadius:16,border:'none',background:disabled?'#e5e7eb':theme.primary,color:disabled?'#9ca3af':'#fff',fontSize:15,fontWeight:700,cursor:disabled?'default':'pointer',transition:'all 0.2s',marginTop:6}}>

  // Step 0: 웰컴
  if(step === 0) return (
    <div className="fade-in" style={bgStyle}>
      <div style={{...cardStyle,textAlign:'center'}}>
        <div style={{fontSize:52,marginBottom:12}}>{selectedAnimal}</div>
        <div style={{fontSize:21,fontWeight:800,color:C.text,marginBottom:6}}>
          {userName ? `${userName}님, 반가워요!` : '어서 오세요!'}

        </div>
        <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:24}}>
          {[0,1,2].map(i=><div key={i} style={{width:i===step?24:8,height:8,borderRadius:8,background:i===step?theme.primary:theme.mid,transition:'all 0.3s'}}/>)}

          {[0,1,2].map(i=><div key={i} style={{width:i===1?24:8,height:8,borderRadius:8,background:i===1?theme.primary:theme.mid,transition:'all 0.3s'}}/>)}

        <div style={{fontSize:11,color:theme.border,fontWeight:700,marginBottom:5}}>STEP 1 / 3</div>

        <div style={{fontSize:13,color:C.muted,marginBottom:18}}>앱의 색상과 캐릭터를 선택해요</div>

        {/* 테마 색상 */}
        <div style={{fontSize:13,fontWeight:700,color:C.text2,marginBottom:10}}>🎨 메인 색상</div>

            <button key={t.id} onClick={()=>setSelectedTheme(t.id)} style={{
              width:'100%',aspectRatio:'1',borderRadius:12,border:`3px solid ${selectedTheme===t.id?t.primary:'transparent'}`,
              background:t.primary,cursor:'pointer',margin:0,
              boxShadow:selectedTheme===t.id?`0 0 0 2px #fff, 0 0 0 4px ${t.primary}`:'none',
              transition:'all 0.15s',position:'relative',
            }}>
              {selectedTheme===t.id&&<span style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',fontWeight:800}}>✓</span>}

          🐾 나의 캐릭터 <span style={{fontSize:11,color:C.muted,fontWeight:400}}>— 사이드바에 표시돼요</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(8,1fr)',gap:6,marginBottom:20}}>

    const icons = ['🏠', '🌱', '🌳'];

    return (

          <div style={{display:'flex',gap:6,marginBottom:18}}>

          <div style={{fontSize:19,fontWeight:800,color:C.text,marginBottom:4}}>자취한 지 얼마나 됐어요?</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:18}}>선택에 맞게 생활 관리 항목을 자동으로 설정해드려요</div>

            {options.map((opt,i)=>(

                <span style={{fontSize:22}}>{icons[i]}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:lifeChoice===opt?theme.primary:C.text}}>{labels[i]}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:1}}>{descs[i]}</div>
                </div>
                {lifeChoice===opt&&<span style={{fontSize:15,color:theme.primary}}>✓</span>}
              </button>
            ))}
          </div>
          {nextBtn(()=>{if(lifeChoice)onComplete(lifeChoice,selectedAnimal,selectedTheme);}, !lifeChoice, '완료 →')}
        </div>
      </div>
    );
  }
  return null;
}

// ============================================================
// APP ROOT — Firebase 통합
// ============================================================
function App() {
  const fb = useFirebase();
  const [authState, setAuthState] = React.useState('loading'); // loading | welcome | login | signup | onboarding | app
  const [user, setUser] = React.useState(null);

  // Firebase Auth 상태 감지
  React.useEffect(() => {
    if(!fb) return;
    const unsub = fb.onAuthStateChanged(fb.auth, async (u) => {
      if(u) {
        setUser(u);
        // Firestore에서 온보딩 완료 여부 확인
        const snap = await fb.getDoc(fb.doc(fb.db, 'users', u.uid));
        if((typeof snap.exists === 'function' ? snap.exists() : Boolean(snap.exists)) && snap.data().onboarded) {
          setAuthState('app');
        } else {
          setAuthState('onboarding');
        }
      } else {
        setUser(null);
        setAuthState('welcome');
      }
    });
    return () => unsub();
  }, [fb]);

  // ── Firestore 실시간 동기화 ──
  const [foods, setFoods] = React.useState([]);
  const [lifeItems, setLifeItems] = React.useState([]);
  const [streak, setStreak] = React.useState({count:0, lastDate:null});
  const [weeklyLog, setWeeklyLog] = React.useState({});
  const [userName, setUserName] = React.useState('');
  const [animal, setAnimal] = React.useState('🐻');
  const [themeId, setThemeId] = React.useState('purple');
  const [customSections, setCustomSections] = React.useState({});
  const [darkMode, setDarkMode] = React.useState(false);

  // 다크모드 body class 토글 → CSS 변수 자동 전환
  React.useEffect(() => {
    if(darkMode) {
      document.body.classList.add('dark');
    } else {
      document.body.classList.remove('dark');
    }
  }, [darkMode]);

  React.useEffect(() => {
    if(!fb || !user || authState !== 'app') return;
    const uid = user.uid;

    // 프로필
    fb.getDoc(fb.doc(fb.db, 'users', uid)).then(snap => {
      if((typeof snap.exists === 'function' ? snap.exists() : Boolean(snap.exists))) {
        const d = snap.data();
        setUserName(d.name || user.displayName || '');
        setStreak(d.streak || {count:0, lastDate:null});
        setWeeklyLog(d.weeklyLog || {});
        setAnimal(d.animal || '🐻');
        setThemeId(d.themeId || 'purple');
        setCustomSections(d.customSections || {});
        setDarkMode(d.darkMode || false);
      }
    });

    // 식재료 실시간
    const unsubFood = fb.onSnapshot(fb.collection(fb.db, 'users', uid, 'foods'), snap => {
      setFoods(snap.docs.map(d => {
        const data = d.data();
        return {...data, id: d.id}; // d.id (Firestore) always wins — override any stored id field
      }));
    });
    // 생활관리 실시간
    const unsubLife = fb.onSnapshot(fb.collection(fb.db, 'users', uid, 'lifeItems'), snap => {
      setLifeItems(snap.docs.map(d => {
        const data = d.data();
        return {...data, id: d.id}; // d.id (Firestore) always wins
      }));
    });
    return () => { unsubFood(); unsubLife(); };
  }, [fb, user, authState]);

  // ── Firestore CRUD ──
  async function addFood(f) {
    if(!fb||!user) return;
    const {id, ...data} = f; // Firestore auto-generates its own id
    await fb.addDoc(fb.collection(fb.db,'users',user.uid,'foods'), data);
  }
  async function deleteFood(id) {
    if(!fb||!user) return;
    await fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'foods',id));
  }
  async function editFood(id, data) {
    if(!fb||!user) return;
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'foods',id), data);
  }
  async function addLife(c) {
    if(!fb||!user) return;
    const {id, ...data} = c; // Firestore auto-generates its own id
    await fb.addDoc(fb.collection(fb.db,'users',user.uid,'lifeItems'), data);
  }
  async function toggleLife(id) {
    if(!fb||!user) return;
    const item = lifeItems.find(c=>c.id===id);
    if(!item) return;
    const todayStr = getToday();
    const isDoneToday = item.lastDone === todayStr;
    if(!isDoneToday) {
      // 완료: lastDone = 오늘, done = true
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id), {
        done: true,
        lastDone: todayStr,
      });
    } else {
      // 완료 취소: lastDone을 어제로 복원 (주기 계산 유지)
      const yesterday = addDays(todayStr, -1);
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id), {
        done: false,
        lastDone: yesterday,
      });
    }
  }
  async function deleteLife(id) {
    if(!fb||!user) return;
    await fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id));
  }
  async function editLife(id, data) {
    if(!fb||!user) return;
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id), data);
  }
  async function updateStreak(routinesDone, routinesTotal) {
    if(!fb||!user) return;
    const todayStr = getToday();
    // 🌱 시작: 1개 이상 완료면 스트릭 달성 (기존 60% → 1개 이상으로 완화)
    if(routinesDone >= 1) {
      if(streak.lastDate === todayStr) return;
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
      const yStr = yesterday.getFullYear()+'-'+String(yesterday.getMonth()+1).padStart(2,'0')+'-'+String(yesterday.getDate()).padStart(2,'0');
      const newCount = streak.lastDate === yStr ? streak.count+1 : 1;
      const pct = routinesTotal ? Math.round(routinesDone/routinesTotal*100) : 0;
      const newStreak = {count:newCount, lastDate:todayStr};
      const newLog = {...weeklyLog, [todayStr]:pct};
      setStreak(newStreak); setWeeklyLog(newLog);
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid), {streak:newStreak, weeklyLog:newLog});
    }
  }
  async function handleLogout() {
    if(!fb) return;
    await fb.signOut(fb.auth);
  }
  async function completeOnboarding(choice, chosenAnimal, chosenTheme) {
    if(!fb||!user) return;
    const uid = user.uid;
    const presets = (ONBOARDING_PRESETS[choice]||[]).map((item,i) => ({
      ...item, done:false, lastDone:null, freqDays:[], createdAt:new Date().toISOString()
    }));
    await fb.setDoc(fb.doc(fb.db,'users',uid), {
      name: user.displayName || '',
      onboarded: true,
      createdAt: fb.serverTimestamp(),
      streak: {count:0, lastDate:null},
      weeklyLog: {},
      animal: chosenAnimal || '🐻',
      themeId: chosenTheme || 'purple',
    }, {merge:true});
    for(const item of presets) {
      await fb.addDoc(fb.collection(fb.db,'users',uid,'lifeItems'), item);
    }
    setAnimal(chosenAnimal || '🐻');
    setThemeId(chosenTheme || 'purple');
    setAuthState('app');
  }

  const [page, setPage] = React.useState('home');
  const [sidebarOpen, setSidebarOpen] = React.useState(false);
  const {isMob, isTablet} = useResponsive();
  const PAGE_TITLES = {home:'🏠 홈', food:'🥕 식재료', life:'🌀 생활 관리', shop:'🛒 장보기', report:'📊 월간 리포트', diary:'📝 메모·일기', mission:'🎯 미션', share:'👥 공유', hub:'🔖 추천', tips:'💡 생활 팁', settings:'⚙️ 설정'};

  // ── 로딩 ──
  if(authState === 'loading') return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,var(--bg-page),var(--bg-card))'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:12}}>🏠</div>
        <div style={{fontSize:18,fontWeight:700,color:'#7c3aed'}}>LifeFit</div>
        <div style={{fontSize:13,color:'#a78bfa',marginTop:6}}>불러오는 중...</div>
      </div>
    </div>
  );

  if(authState === 'welcome') return (
    <WelcomeScreen
      onStart={()=>setAuthState('signup')}
      onLogin={()=>setAuthState('login')}
    />
  );
  if(authState === 'login' || authState === 'signup') return (
    <AuthScreen
      mode={authState}
      onSuccess={(u)=>{setUser(u);}}
      onBack={()=>setAuthState('welcome')}
    />
  );
  if(authState === 'onboarding') return (
    <Onboarding
      userName={user?.displayName || ''}
      onComplete={completeOnboarding}
    />
  );

  // ── 메인 앱 ──
  const currentTheme = getTheme(themeId);
  const MOB_NAV = [
    {id:'home',    emoji:'🏠', label:'홈'},
    {id:'food',    emoji:'🥕', label:'식재료'},
    {id:'life',    emoji:'🌀', label:'생활'},
    {id:'hub',     emoji:'🔖', label:'추천'},
    {id:'settings',emoji:'⚙️', label:'설정'},
  ];
  const isDark = darkMode;
  return (
    <DarkCtx.Provider value={darkMode}>
    <ThemeCtx.Provider value={currentTheme}>
    <CustomSectionsCtx.Provider value={customSections||{}}>
    <div style={{display:'flex',minHeight:'100vh',background:'var(--bg-page)'}}>
      <Sidebar page={page} onNav={p=>{setPage(p);setSidebarOpen(false);}} mobileOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)} userName={userName} onLogout={handleLogout} animal={animal} themeId={themeId} streak={streak}/>

      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        {/* 모바일 상단 바 */}
        <div className="mobile-topbar" style={{background:C.card,padding:'12px 18px',borderBottom:`1px solid ${isDark?'#334155':'#f0edf8'}`,alignItems:'center',gap:13,position:'sticky',top:0,zIndex:30}}>
          <button onClick={()=>setSidebarOpen(true)} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,padding:4,color:currentTheme.primary,width:'auto',margin:0}}>☰</button>
          <div style={{fontSize:15,fontWeight:700,color:C.text,flex:1}}>{PAGE_TITLES[page]}</div>
          <div style={{fontSize:13,fontWeight:900,color:currentTheme.primary}}>🏠 LifeFit</div>
        </div>

        {/* 메인 콘텐츠 */}
        <main style={{flex:1,padding:isMob?'16px 14px 90px':'28px 34px',maxWidth:1060,width:'100%',overflowX:'hidden',background:C.page,minHeight:'100vh'}}>
          {page==='home'&&<HomePage foods={foods} lifeItems={lifeItems} streak={streak} weeklyLog={weeklyLog} onNav={setPage} userName={userName} onQuickAdd={addFood} onQuickCheck={toggleLife}/>}
          {page==='food'&&<FoodPage foods={foods} onAdd={addFood} onDelete={deleteFood} onEdit={editFood} fb={fb} user={user}/>}
          {page==='life'&&<LifePage lifeItems={lifeItems} onAdd={addLife} onToggle={toggleLife} onDelete={deleteLife} onEdit={editLife} streak={streak} weeklyLog={weeklyLog} updateStreak={updateStreak} fb={fb} user={user}/>}
          {page==='report'&&<ReportPage weeklyLog={weeklyLog} lifeItems={lifeItems} foods={foods} streak={streak}/>}
          {page==='diary'&&<DiaryPage fb={fb} user={user}/>}
          {page==='mission'&&<MissionPage streak={streak} lifeItems={lifeItems} weeklyLog={weeklyLog} animal={animal} foods={foods} fb={fb} user={user}/>}
          {page==='share'&&<SharePage fb={fb} user={user} lifeItems={lifeItems} foods={foods}/>}
          {page==='tips'&&<TipsPage/>}
          {page==='hub'&&<HubPage foods={foods} lifeItems={lifeItems} onNav={setPage}/>}
          {page==='settings'&&<SettingsPage user={user} fb={fb} userName={userName} setUserName={setUserName} animal={animal} setAnimal={setAnimal} themeId={themeId} setThemeId={setThemeId} customSections={customSections} setCustomSections={setCustomSections} darkMode={darkMode} setDarkMode={setDarkMode}/>}
        </main>

        {/* 모바일 하단 탭 바 */}
        <div className="mobile-tab-bar" style={{position:'fixed',bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.divider}`,padding:'6px 0 calc(6px + env(safe-area-inset-bottom))',zIndex:30,justifyContent:'space-around',alignItems:'center',boxShadow:'0 -4px 16px rgba(0,0,0,0.06)'}}>
          {MOB_NAV.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 8px',border:'none',background:'transparent',cursor:'pointer',width:'auto',margin:0,flex:1,maxWidth:80,minWidth:0}}>
              <span style={{fontSize:22,lineHeight:1,filter:page===n.id?'none':'grayscale(0.3)',opacity:page===n.id?1:0.5}}>{n.emoji}</span>
              <span style={{fontSize:10,fontWeight:page===n.id?700:500,color:page===n.id?currentTheme.primary:C.muted,whiteSpace:'nowrap'}}>{n.label}</span>
              {page===n.id&&<div style={{width:20,height:3,borderRadius:2,background:currentTheme.primary,marginTop:1}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
    </CustomSectionsCtx.Provider>
    </ThemeCtx.Provider>
    </DarkCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
