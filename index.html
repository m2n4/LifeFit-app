// ============================================================
// FIREBASE HOOKS & APP ROOT
// ============================================================
function useFirebase(user) {
  const [foods, setFoods] = React.useState([]);
  const [lifeItems, setLifeItems] = React.useState([]);
  const [streak, setStreak] = React.useState({count:0,lastDate:null});
  const [weeklyLog, setWeeklyLog] = React.useState({});
  const [missionProgress, setMissionProgress] = React.useState({cleanCount:0,waterCount:0});
  const [loading, setLoading] = React.useState(true);
  const fb = window._firebase;

  React.useEffect(()=>{
    if(!user||!fb) { setLoading(false); return; }
    const uid = user.uid;
    const unsubs = [
      fb.onSnapshot(fb.collection(fb.db,'users',uid,'foods'), snap=>{
        setFoods(snap.docs.map(d=>({...d.data(),id:d.id})));
        setLoading(false);
      }),
      fb.onSnapshot(fb.collection(fb.db,'users',uid,'lifeItems'), snap=>{
        setLifeItems(snap.docs.map(d=>({...d.data(),id:d.id})));
      }),
      fb.onSnapshot(fb.doc(fb.db,'users',uid), snap=>{
        const data = snap.data()||{};
        if(data.streak) setStreak(data.streak);
        if(data.weeklyLog) setWeeklyLog(data.weeklyLog);
        if(data.missionProgress) setMissionProgress(data.missionProgress);
      }),
    ];
    return ()=>unsubs.forEach(u=>u());
  },[user]);

  async function addFood(food) {
    if(!user||!fb) return;
    await fb.addDoc(fb.collection(fb.db,'users',user.uid,'foods'), food);
  }
  async function deleteFood(id) {
    if(!user||!fb) return;
    await fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'foods',id));
  }
  async function editFood(id, data) {
    if(!user||!fb) return;
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'foods',id), data);
  }
  async function addLifeItem(item) {
    if(!user||!fb) return;
    await fb.addDoc(fb.collection(fb.db,'users',user.uid,'lifeItems'), item);
  }
  async function toggleLifeItem(id) {
    if(!user||!fb) return;
    const item = lifeItems.find(c=>c.id===id);
    if(!item) return;
    const todayStr = getToday();
    const newDone = !isDoneOn(item, todayStr);
    const updateData = { lastDone: newDone ? todayStr : (item.prevDone||null) };
    if(!newDone && item.lastDone===todayStr) updateData.lastDone = item.prevDone||null;
    if(newDone) updateData.prevDone = item.lastDone||null;
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id), updateData);
    if(item.section==='청소'&&newDone) {
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid), {'missionProgress.cleanCount': (missionProgress.cleanCount||0)+1});
    }
    if(item.text.includes('물')&&item.section==='루틴'&&newDone) {
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid), {'missionProgress.waterCount': (missionProgress.waterCount||0)+1});
    }
  }
  async function deleteLifeItem(id) {
    if(!user||!fb) return;
    await fb.deleteDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id));
  }
  async function editLifeItem(id, data) {
    if(!user||!fb) return;
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid,'lifeItems',id), data);
  }
  async function updateStreak(doneCount, totalCount) {
    if(!user||!fb) return;
    const todayStr = getToday();
    const pct = totalCount ? Math.round(doneCount/totalCount*100) : 0;
    const newLog = {...weeklyLog, [todayStr]: pct};
    const lastDate = streak.lastDate;
    let newCount = streak.count||0;
    if(doneCount > 0) {
      if(lastDate === getToday()) {
        // already counted today
      } else if(lastDate === addDays(getToday(),-1)) {
        newCount++;
      } else if(!lastDate) {
        newCount = 1;
      } else {
        newCount = 1;
      }
    } else {
      newCount = lastDate === getToday() ? Math.max(0,newCount) : newCount;
    }
    const newStreak = {count:newCount, lastDate: doneCount>0?todayStr:lastDate};
    await fb.updateDoc(fb.doc(fb.db,'users',user.uid), {streak:newStreak, weeklyLog:newLog});
  }
  return {foods,lifeItems,streak,weeklyLog,missionProgress,loading,addFood,deleteFood,editFood,addLifeItem,toggleLifeItem,deleteLifeItem,editLifeItem,updateStreak,fb};
}

function App() {
  const [page, setPage] = React.useState('home');
  const [sidebarOpen, setSidebarOpen] = React.useState(false);
  const [darkMode, setDarkMode] = useLocalStorage('lifefit_dark', false);
  const [themeId, setThemeId] = useLocalStorage('lifefit_theme', 'purple');
  const [userName, setUserName] = useLocalStorage('lifefit_name', '');
  const [animal, setAnimal] = useLocalStorage('lifefit_animal', '🐻');
  const [customSections, setCustomSections] = useLocalStorage('lifefit_customsec', {});
  const [authState, setAuthState] = React.useState('loading');
  const [user, setUser] = React.useState(null);
  const [onboarded, setOnboarded] = useLocalStorage('lifefit_onboarded', false);
  const {isMob} = useResponsive();
  const theme = getTheme(themeId);

  React.useEffect(()=>{
    const check = ()=>{
      const fb = window._firebase;
      if(!fb) return;
      fb.onAuthStateChanged(fb.auth, async u=>{
        if(u) {
          setUser(u);
          if(u.displayName&&!userName) setUserName(u.displayName);
          setAuthState('authed');
        } else {
          setAuthState('guest');
        }
      });
      const rResult = fb.getRedirectResult(fb.auth).catch(()=>{});
    };
    if(window._firebaseReady) check();
    else window.addEventListener('firebaseReady', check, {once:true});
  },[]);

  React.useEffect(()=>{
    if(darkMode) document.body.classList.add('dark');
    else document.body.classList.remove('dark');
  },[darkMode]);

  const {foods,lifeItems,streak,weeklyLog,missionProgress,loading,addFood,deleteFood,editFood,addLifeItem,toggleLifeItem,deleteLifeItem,editLifeItem,updateStreak,fb} = useFirebase(authState==='authed'?user:null);

  const [guestFoods, setGuestFoods] = useLocalStorage('lifefit_guest_foods',[]);
  const [guestLife, setGuestLife] = useLocalStorage('lifefit_guest_life',[]);
  const [guestStreak] = React.useState({count:0,lastDate:null});
  const [guestWeeklyLog] = React.useState({});

  const isGuest = authState==='guest';
  const F = isGuest ? guestFoods : foods;
  const L = isGuest ? guestLife : lifeItems;
  const S = isGuest ? guestStreak : streak;
  const WL = isGuest ? guestWeeklyLog : weeklyLog;

  function addF(f) { isGuest ? setGuestFoods(p=>[...p,f]) : addFood(f); }
  function delF(id) { isGuest ? setGuestFoods(p=>p.filter(x=>x.id!==id)) : deleteFood(id); }
  function editF(id,d) { isGuest ? setGuestFoods(p=>p.map(x=>x.id===id?{...x,...d}:x)) : editFood(id,d); }
  function addL(item) { isGuest ? setGuestLife(p=>[...p,item]) : addLifeItem(item); }
  function togL(id) {
    if(isGuest) {
      const todayStr = getToday();
      setGuestLife(p=>p.map(x=>{
        if(x.id!==id) return x;
        const wasDone = isDoneOn(x, todayStr);
        return {...x, lastDone: wasDone?(x.prevDone||null):todayStr, prevDone: wasDone?x.prevDone:x.lastDone};
      }));
    } else toggleLifeItem(id);
  }
  function delL(id) { isGuest ? setGuestLife(p=>p.filter(x=>x.id!==id)) : deleteLifeItem(id); }
  function editL(id,d) { isGuest ? setGuestLife(p=>p.map(x=>x.id===id?{...x,...d}:x)) : editLifeItem(id,d); }
  function updStreak(done,total) { if(!isGuest) updateStreak(done,total); }

  function handleNav(p) { setPage(p); setSidebarOpen(false); }

  async function handleLogout() {
    if(fb) await fb.signOut(fb.auth);
    setUser(null); setAuthState('guest');
  }

  async function handleOnboardComplete({name,animal:a,period,themeId:t}) {
    setUserName(name); setAnimal(a); setThemeId(t);
    setOnboarded(true);
    if(user&&fb) {
      await fb.updateDoc(fb.doc(fb.db,'users',user.uid),{displayName:name,animal:a,themeId:t}).catch(()=>{
        fb.setDoc(fb.doc(fb.db,'users',user.uid),{displayName:name,animal:a,themeId:t},{merge:true});
      });
    }
    if(period) {
      const presets = ONBOARDING_PRESETS[period]||[];
      presets.forEach((item,i)=>{
        setTimeout(()=>addL({id:Date.now()+i,...item,done:false,lastDone:null,freqDays:[],createdAt:new Date().toISOString()}),i*50);
      });
    }
  }

  function quickCheck(id) { togL(id); }

  if(authState==='loading') {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#f5f3ff,#ede9fe)'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:12,animation:'fadeIn 1s ease infinite alternate'}}>🏠</div>
          <div style={{fontSize:16,fontWeight:700,color:'#7c3aed'}}>LifeFit</div>
          <div style={{fontSize:12,color:'#9ca3af',marginTop:4}}>불러오는 중...</div>
        </div>
      </div>
    );
  }

  if(authState==='authed'&&!onboarded&&!loading) {
    return (
      <ThemeCtx.Provider value={theme}>
        <DarkCtx.Provider value={darkMode}>
          <OnboardingPage onComplete={handleOnboardComplete}/>
        </DarkCtx.Provider>
      </ThemeCtx.Provider>
    );
  }

  if(authState==='guest'&&!onboarded) {
    return (
      <ThemeCtx.Provider value={theme}>
        <DarkCtx.Provider value={darkMode}>
          <WelcomeScreen
            onLogin={()=>setAuthState('auth')}
            onGuest={()=>{ setOnboarded(true); setAuthState('guest'); }}
          />
        </DarkCtx.Provider>
      </ThemeCtx.Provider>
    );
  }

  if(authState==='auth') {
    return (
      <ThemeCtx.Provider value={theme}>
        <DarkCtx.Provider value={darkMode}>
          <AuthScreen onAuth={u=>{setUser(u);if(u.displayName&&!userName)setUserName(u.displayName);setAuthState('authed');}}/>
        </DarkCtx.Provider>
      </ThemeCtx.Provider>
    );
  }

  const activePage = (
    page==='home'?<HomePage foods={F} lifeItems={L} streak={S} weeklyLog={WL} onNav={handleNav} userName={userName} onQuickCheck={quickCheck}/>:
    page==='food'?<FoodPage foods={F} onAdd={addF} onDelete={delF} onEdit={editF} fb={isGuest?null:fb} user={user}/>:
    page==='life'?<LifePage lifeItems={L} onAdd={addL} onToggle={togL} onDelete={delL} onEdit={editL} streak={S} weeklyLog={WL} updateStreak={updStreak} fb={isGuest?null:fb} user={user}/>:
    page==='hub'?<HubPage foods={F} lifeItems={L} onNav={handleNav} userName={userName}/>:
    page==='tips'?<TipsPage/>:
    page==='share'?<SharePage lifeItems={L} foods={F} streak={S} userName={userName} animal={animal} themeId={themeId}/>:
    page==='mission'?<MissionPage streak={S} lifeItems={L} foods={F} missionProgress={missionProgress}/>:
    page==='diary'?<DiaryPage fb={isGuest?null:fb} user={user}/>:
    page==='report'?<ReportPage weeklyLog={WL} lifeItems={L} foods={F} streak={S}/>:
    page==='settings'?<SettingsPage userName={userName} setUserName={setUserName} themeId={themeId} setThemeId={setThemeId} darkMode={darkMode} setDarkMode={setDarkMode} animal={animal} setAnimal={setAnimal} customSections={customSections} setCustomSections={setCustomSections} fb={isGuest?null:fb} user={user} onLogout={!isGuest?handleLogout:null}/>:
    <HomePage foods={F} lifeItems={L} streak={S} weeklyLog={WL} onNav={handleNav} userName={userName} onQuickCheck={quickCheck}/>
  );

  const MOB_NAV = [
    {id:'home',emoji:'🏠',label:'홈'},
    {id:'food',emoji:'🥕',label:'식재료'},
    {id:'life',emoji:'🌀',label:'생활'},
    {id:'hub',emoji:'🔖',label:'추천'},
    {id:'settings',emoji:'⚙️',label:'설정'},
  ];

  return (
    <ThemeCtx.Provider value={theme}>
      <DarkCtx.Provider value={darkMode}>
        <CustomSectionsCtx.Provider value={customSections||{}}>
          <div style={{display:'flex',minHeight:'100vh',background:C.page}}>
            <Sidebar page={page} onNav={handleNav} mobileOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)} userName={userName} onLogout={!isGuest?handleLogout:null} animal={animal} themeId={themeId} streak={S}/>

            <main style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,minHeight:'100vh'}}>
              <div className="mobile-topbar" style={{display:'none',position:'sticky',top:0,zIndex:30,background:C.card,borderBottom:`1px solid ${C.divider}`,padding:'12px 16px',alignItems:'center',gap:12}}>
                <button onClick={()=>setSidebarOpen(true)} style={{background:'none',border:`1.5px solid ${C.border2}`,cursor:'pointer',fontSize:18,color:C.text2,padding:'6px 9px',borderRadius:10,width:'auto',margin:0}}>☰</button>
                <div style={{fontSize:16,fontWeight:800,color:theme.primary,flex:1}}>🏠 LifeFit</div>
                {userName&&<div style={{fontSize:22,fontFamily:"'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif"}}>{animal}</div>}
                <button onClick={()=>setDarkMode(v=>!v)} style={{background:'none',border:`1.5px solid ${C.border2}`,cursor:'pointer',fontSize:16,padding:'5px 8px',borderRadius:10,width:'auto',margin:0}}>{darkMode?'☀️':'🌙'}</button>
              </div>

              <div style={{flex:1,padding:isMob?'16px 14px 90px':'22px 28px',maxWidth:900,width:'100%',margin:'0 auto',boxSizing:'border-box',overflowX:'hidden'}}>
                <div className="fade-in">{activePage}</div>
              </div>
            </main>

            <nav className="mobile-tab-bar" style={{position:'fixed',bottom:0,left:0,right:0,zIndex:40,background:C.card,borderTop:`1px solid ${C.divider}`,display:'flex',padding:'6px 0 max(6px,env(safe-area-inset-bottom))',boxShadow:'0 -4px 20px rgba(0,0,0,0.07)'}}>
              {MOB_NAV.map(n=>(
                <button key={n.id} onClick={()=>handleNav(n.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'5px 2px',background:'none',border:'none',cursor:'pointer',margin:0,width:'auto',transition:'all 0.15s'}}>
                  <div style={{width:36,height:24,borderRadius:12,background:page===n.id?theme.light:'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.15s'}}>
                    <span style={{fontSize:18}}>{n.emoji}</span>
                  </div>
                  <span style={{fontSize:10,fontWeight:page===n.id?700:400,color:page===n.id?theme.primary:'#9ca3af'}}>{n.label}</span>
                </button>
              ))}
            </nav>
          </div>
        </CustomSectionsCtx.Provider>
      </DarkCtx.Provider>
    </ThemeCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
